<script>
/* iOSのdvh計算ズレ対策：実際の画面高さを実測してCSS変数に渡す */
(function(){
  function setVH(){
    var h = window.innerHeight;
    if (window.visualViewport && window.visualViewport.height > h) h = window.visualViewport.height;
    document.documentElement.style.setProperty("--vhpx", h + "px");
  }
  setVH();
  window.addEventListener("resize", setVH);
  window.addEventListener("orientationchange", function(){ setTimeout(setVH, 300); });
  if (window.visualViewport) window.visualViewport.addEventListener("resize", setVH);
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root {
  --primary: #C24E00;
  --chip: #EDE9E0;
  --bg: #F5F2EC;
  --line: #E7E2D8;
  --ink: #1c1b18;
  --text: #4A463E;
  --sub: #8B8578;
  --faint: #C9C4B8;
  --soft: #F4EDE4;
  --soft-text: #6E4F2F;
}
.wcard { background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:12px; }
.sk { background:linear-gradient(90deg, #EDEAE2 25%, #F7F4EE 50%, #EDEAE2 75%); background-size:200% 100%; animation:skm 1.3s infinite; }
@keyframes skm { from { background-position:200% 0; } to { background-position:-200% 0; } }
img.fdin { opacity:0; transition:opacity .35s ease; }
img.fdin.ld { opacity:1; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overscroll-behavior: none; }
html { background: #8FA0B0; }
/* 固定シェル：ページ(window)は一切スクロールさせない。スクロールは #app-scroll の内側だけ。
   これによりiOSのラバーバンドで画面全体がずれる問題を構造的に根絶する。
   高さは 100dvh（動的ビューポート）でアドレスバーの出入りに追従させ、下部のすき間を防ぐ。 */
html, body { position:fixed; inset:0; width:100%; overflow:hidden; overscroll-behavior:none; touch-action:manipulation; }
#root { position:fixed; inset:0; }
#app-scroll { position:fixed; inset:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); }
.min-vh { min-height: 100vh; min-height: 100dvh; }
/* スマホではヘッダーのタイトルを隠してボタンにスペースを譲る */
@media (max-width: 640px) { .app-title { display: none; } }
/* HIG風ボタン：押した瞬間うっすら透明＋わずかに縮む */
.hig-pill { transition: opacity .15s ease, transform .15s ease; -webkit-tap-highlight-color: transparent; }
.hig-pill:active { opacity:.55; transform:scale(.96); }
#splash { position:fixed; inset:0; z-index:9999; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; transition:opacity .45s ease; }
#splash.hide { opacity:0; pointer-events:none; }
#splash .sp-logo { width:190px; height:auto; filter:drop-shadow(0 8px 22px rgba(200,140,0,0.25)); animation:spPop .7s cubic-bezier(.16,1.3,.3,1) both; }
#splash .sp-title { font-size:15px; font-weight:900; color:#333; letter-spacing:.08em; animation:spFade .6s ease .3s both; }
@keyframes spPop { from { transform:scale(.55); opacity:0; } to { transform:scale(1); opacity:1; } }
@keyframes spFade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes radialPulse { 0% { transform:scale(1); } 35% { transform:scale(1.16); } 100% { transform:scale(1); } }
@keyframes liked { 0% { transform:scale(1); } 40% { transform:scale(1.4); } 100% { transform:scale(1); } }
@keyframes spin { to { transform:rotate(360deg); } }
.spinner { width:32px; height:32px; border:3px solid var(--line); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.hscroll::-webkit-scrollbar { display:none; }
.hscroll { scrollbar-width:none; }
@keyframes gneFloat { 0% { opacity:0; transform:translateY(8px) scale(0.5); } 25% { opacity:1; } 100% { opacity:0; transform:translateY(-20px) scale(1.15); } }
@keyframes gneBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
@keyframes gneGlow { 0%,100% { box-shadow:0 3px 12px rgba(194,78,0,0.45); } 50% { box-shadow:0 4px 22px rgba(255,150,40,0.95); } }
.like-btn:active { animation: liked 0.3s ease; }
#barcode-print-portal { display: none; }
@media print {
  @page { size: A4 landscape; margin: 8mm; }
  /* 固定シェル（画面ずれ対策）を印刷時だけ解除：しないと1ページ分で切れて2枚目以降が消える */
  html, body { position: static !important; overflow: visible !important; width: auto !important; height: auto !important; }
  #root { position: static !important; overflow: visible !important; height: auto !important; }
  #app-scroll { position: static !important; overflow: visible !important; height: auto !important; }
  body > #root { display: none !important; }
  #barcode-print-portal { display: block !important; position: static !important; overflow: visible !important; }
  #barcode-print-portal .bc-page { break-after: page; page-break-after: always; }
  #barcode-print-portal .bc-page:last-child { break-after: auto; page-break-after: auto; }
  #barcode-print-portal .bc-label { page-break-inside: avoid; break-inside: avoid; }
}
</style>
