<style>
:root {
  --primary: #C24E00;
  --chip: #EDE9E0;
  --bg: #F5F2EC;
  --line: #E7E2D8;
  --ink: #1c1b18;
  --text: #4A463E;
  --sub: #8B8578;
  --faint: #C9C4B8;
  --soft: #F4EDE4;
  --soft-text: #6E4F2F;
}
.wcard { background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 14px; margin-bottom:12px; }
.sk { background:linear-gradient(90deg, #EDEAE2 25%, #F7F4EE 50%, #EDEAE2 75%); background-size:200% 100%; animation:skm 1.3s infinite; }
@keyframes skm { from { background-position:200% 0; } to { background-position:-200% 0; } }
img.fdin { opacity:0; transition:opacity .35s ease; }
img.fdin.ld { opacity:1; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overscroll-behavior: none; }
html { background: #8FA0B0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); }
.min-vh { min-height: 100vh; min-height: 100dvh; }
#splash { position:fixed; inset:0; z-index:9999; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; transition:opacity .45s ease; }
#splash.hide { opacity:0; pointer-events:none; }
#splash .sp-logo { width:190px; height:auto; filter:drop-shadow(0 8px 22px rgba(200,140,0,0.25)); animation:spPop .7s cubic-bezier(.16,1.3,.3,1) both; }
#splash .sp-title { font-size:15px; font-weight:900; color:#333; letter-spacing:.08em; animation:spFade .6s ease .3s both; }
@keyframes spPop { from { transform:scale(.55); opacity:0; } to { transform:scale(1); opacity:1; } }
@keyframes spFade { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes radialPulse { 0% { transform:scale(1); } 35% { transform:scale(1.16); } 100% { transform:scale(1); } }
@keyframes liked { 0% { transform:scale(1); } 40% { transform:scale(1.4); } 100% { transform:scale(1); } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes gneFloat { 0% { opacity:0; transform:translateY(8px) scale(0.5); } 25% { opacity:1; } 100% { opacity:0; transform:translateY(-20px) scale(1.15); } }
@keyframes gneBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
@keyframes gneGlow { 0%,100% { box-shadow:0 3px 12px rgba(194,78,0,0.45); } 50% { box-shadow:0 4px 22px rgba(255,150,40,0.95); } }
.like-btn:active { animation: liked 0.3s ease; }
#barcode-print-portal { display: none; }
@media print {
  @page { size: A4 landscape; margin: 8mm; }
  body > #root { display: none !important; }
  #barcode-print-portal { display: block !important; }
  #barcode-print-portal .bc-page { break-after: page; page-break-after: always; }
  #barcode-print-portal .bc-page:last-child { break-after: auto; page-break-after: auto; }
  #barcode-print-portal .bc-label { page-break-inside: avoid; break-inside: avoid; }
}
</style>
</head>

  { date:"2026-07-05", type:"改善", title:"ポップの並び順を「左上から横読み」に変更", body:"一覧・検索・売場写真の並び順を、これまでの縦に流れる配置から、新しい順に「左上から右へ 1・2・3…、次の行へ」と横方向に読める配置に変更しました。どれが新しい投稿かひと目で分かりやすくなっています。" },
  { date:"2026-07-05", type:"改善", title:"POP詳細を全画面ビューアに刷新", body:"ポップをタップすると、画像が画面いっぱいに大きく表示されるようになりました（YouTubeショートのようなイメージ）。右側にいいね・コメント・保存・作成・削除のボタンが縦に並び、コメントは下から出るシートで一覧・投稿できます。商品名・店舗・投稿者は画像の上に重ねて表示。ポップを最大限大きく見られます。" },
  { date:"2026-07-05", type:"改善", title:"魚図鑑をタイル表示に＆新機能お知らせバナー", body:"①魚図鑑がタイル（2列グリッド）表示になり、魚をタップすると詳細がボトムシートで開くようになりました。②新機能ができたことをホーム画面上部の緑のバナーでお知らせできるようになりました。管理画面の「お知らせ」から文面と飛び先の機能を設定でき、各自が×で閉じると再表示されません。" },
  { date:"2026-07-05", type:"新機能", title:"「POP診断」機能を追加", body:"☰メニューに「POP診断」を追加しました。POP画像をアップロード（または最近のPOPから選択）すると、色数・明るさ・彩度・コントラスト・情報量・余白を自動で解析し、A〜Dの総合評価・良い点・改善案を日本語コメントで表示します。「色を使いすぎていないか」「ごちゃついていないか」を印刷前にチェックできます。解析はスマホの中だけで行われ、画像が外部に送信されることはありません。" },
  { date:"2026-07-05", type:"改善", title:"魚図鑑が44魚種に大幅拡充", body:"魚図鑑に29魚種を追加しました。さわら・いさき・かます・スルメイカ・飛魚（あご）・白カレイ・赤カレイ・カラスガレイ・カツオ・ヒラメ・石鯛・メバル・キカナ（アオハタ）・連子鯛・チヌ・シイラ・アトランティックサーモン・トラウトサーモン・エイ・パンガシウス・ホタルイカ・ハマグリ・ホンビノス貝・真がき・鱈・クエ・ヒラマサ・しらす・ばとう鯛。山陰の呼び名（キカナ・バトウ・あご）も収録しています。" },
  { date:"2026-07-05", type:"改善", title:"上部の黒帯を解消：天気で変わる空の背景に", body:"iPhoneのホーム画面から開いたとき、画面上部（Dynamic Island周辺）が黒く見えていたのを改善しました。ヘッダーの背景が画面のいちばん上まで伸び、天気に合わせて表情が変わります：晴れ=青空、曇り=グレーの空、雨=雨模様、雪=雪の粒、夜（19時以降）=星空。時計や電池表示に文字が被らないよう、ボタン類の位置は変わっていません。" },
  { date:"2026-07-05", type:"新機能", title:"気象警報の表示＆「魚図鑑」を追加", body:"①「今日の情報」に気象庁の警報・注意報（出雲市）が表示されるようになりました。大雨・波浪・強風などが出ると色つきで表示され、時化のときは「入荷・地物に影響が出るかも」の一言も。猛暑日予想（35°以上）も自動でお知らせします。②☰メニューに「魚図鑑」を追加。真あじ・白いか・ノドグロ・宍道湖しじみ・松葉ガニなど14魚種の旬・売りポイント・調理法・POPフレーズ例をまとめました。今が旬の魚が上に表示され、検索もできます。" },
  { date:"2026-07-04", type:"新機能", title:"行事カレンダー追加・メニュー整理・閉じるボタン改善", body:"①☰メニューに「行事カレンダー」を追加。月ごとに行事（ハレの日）と相性の良い商材が見られます。②「プロンプト集」は「作成」タブの中に統合しました（作成タブ上部で切り替え）。③メニューを開いている時は下の☰マークが✕に変わり、そのままタップで閉じられるようになりました。" },
  { date:"2026-07-04", type:"新機能", title:"「競合情報」タブを追加", body:"鮮魚が強い全国15店舗を「専門店型・大手スーパー型・地域密着型・高級型」の4タイプに整理した競合情報タブを追加しました。各社の特徴・POPで参考にできるポイント・注目度に加え、店名をタップすると公式サイトが開きます。地域密着型（万代・オカムラ・オオゼキなど）は特にうちの売場の参考になります。" },
  { date:"2026-07-04", type:"改善", title:"☰メニューがグリッド型に一新", body:"☰メニューが、下からシートが開いてアイコンが3列に並ぶグリッド型になりました。機能が増えても一覧しやすく、よく使う「作成・売場・ポップ依頼」を上段に配置しています。使いたい機能をタップするだけ、閉じるときは外側をタップしてください。" },
  { date:"2026-07-04", type:"新機能", title:"業界情報が「最新記事の自動表示」に進化", body:"「業界情報」タブが、2つのサイト（ダイヤモンド・チェーンストア／食未来研究室）の最新記事を自動で取得して一覧表示するようになりました。日付・見出し・要約が並び、タップで記事本文が別タブで開きます。売場の行事提案や小売トレンドのチェックがこのアプリの中で完結します。" },
  { date:"2026-07-04", type:"新機能", title:"「業界情報」タブを追加", body:"☰メニューに「業界情報」を追加しました。売場づくりや業界の動きに役立つ外部サイト（ダイヤモンド・チェーンストア オンライン／食未来研究室）にワンタップで飛べます。行事の売場提案や小売のトレンドチェックにどうぞ。" },
  { date:"2026-07-04", type:"新機能", title:"「相場計算」が「便利機能」に進化", body:"☰メニューの相場計算が「便利機能」になり、計算が6種類に増えました。①相場計算（今まで通り）②粗利：原価と売価から粗利率、目標粗利からの売価逆算 ③歩留まり：丸魚の実質原価と推奨売価 ④値引き：◯%引きの値段・◯円引きの%換算 ⑤グラム：100g単価とパック売価の相互計算 ⑥立て塩：塩水に必要な塩の量。すべて入力するだけでパッと答えが出ます。" },
  { date:"2026-07-04", type:"改善", title:"最新iPhoneへの最適化＆検索画面の微調整", body:"①Dynamic Island搭載のiPhoneで、ホーム画面から開いたときに上部が欠けないようセーフエリアに対応。②ヘッダー右端とカードの右端がぴったり揃うように調整。③検索の左の付箋タブの間隔を半分に。④ジャンル「丸魚提案」を「切身提案」に名前変更しました（登録済みのポップもそのまま引き継がれます）。" },
  { date:"2026-07-03", type:"新機能", title:"引っ張って更新＆読み込み表示の改善", body:"ホーム一覧を下に引っ張ると最新の状態に更新できるようになりました（他のSNSと同じ操作）。また、読み込み中は「読み込み中…」の文字ではなく、カードの形をしたプレースホルダーがちらちら光る表示になり、画像も読み込めた順にふわっと表示されます。" },
  { date:"2026-07-03", type:"改善", title:"アプリ全体のデザインを一新", body:"①背景をクラフト紙のような生成り色に、カードは影から細い線の区切りに変更。②文字色を4段階に整理して読みやすく。③タブごとにバラバラだった色をメインカラーに統一。④「あと◯日」はバッジ表示に。⑤ホームに「更新情報」ウィジェットを追加：最新の更新がひと目で分かり、タップでお知らせに移動できます。" },
  { date:"2026-07-03", type:"改善", title:"「今日の情報」の天気を見やすく＆ジャンルに「その他」を追加", body:"天気が「昨日→今日→明日」の流れで表示され、気温の上がり下がりが矢印の色でひと目で分かるようになりました。💡売場ヒントは予定の並びに移動。また、検索とジャンル選別に「その他」を追加しました（あまり使わないポップの置き場に）。「切身・その他」は「切身」に名前を変更しています。" },
  { date:"2026-07-03", type:"新機能", title:"管理画面に「ピン留め」「制作メモ」を追加", body:"【ピン留め】管理画面から最近投稿したPOP一覧を見て、ホーム一覧の最上部に固定するPOPを選べます。【制作メモ】制作時の気づき・失敗点・工夫を�条書きで記録。複数POPの参考がまとめて管理できます。" },
  { date:"2026-07-02", type:"改善", title:"メインカラーを落ち着いたオレンジに", body:"アプリ全体のメインカラー（投稿・保存・作成などの主要ボタンや強調表示のオレンジ）を、少し落ち着いた色合いに調整しました。機能の変更はありません。" },
  { date:"2026-07-02", type:"新機能", title:"起動画面（スプラッシュ）を追加", body:"アプリを開いた瞬間に、ロゴマークとタイトルの起動画面が表示されるようになりました。読み込みが終わると、ふわっと消えてホーム画面に切り替わります。" },
  { date:"2026-07-02", type:"改善", title:"売場情報に明日の天気を追加", body:"「今日の売場情報」に、明日の天気（☀️🌧などのマーク＋晴れ・雨などの文言）と明日の最高気温・今日との差を表示するようにしました。今日の天気にもマークが付いて、ひと目で分かりやすくなっています。" },
  { date:"2026-07-02", type:"改善", title:"天気の観測地点が分かるように", body:"ヘッダーの天気をタップすると、観測地点の説明が出るようになりました。島根県の簡易地図に「出雲」のピンが表示され、出雲市周辺の予報であることが分かります。ホームの「今日の売場情報」の気温も同じ地点です。" },
  { date:"2026-07-02", type:"改善", title:"売場情報に行事（ハレの日）を追加", body:"「今日の売場情報」に、土用の丑・半夏生・節分・ひな祭り・七夕・お盆・彼岸・母の日・父の日・クリスマス・大晦日などの行事を追加しました。次の行事とあと何日か、売場と相性の良い商材〈うなぎ・恵方巻など〉も一緒に表示されます。当日は「今日は土用の丑」と出ます。" },
  { date:"2026-07-02", type:"新機能", title:"ホームに「今日の売場情報」", body:"ホーム画面の上部に、売場づくりに役立つ情報カードを追加しました。今日の最高気温と「昨日との差・先週との差」、次の祝日（連休の場合は期間も）とあと何日かが一目で分かります。気温が大きく変わる日には、おすすめの売り方ヒントも表示されます。" },
  { date:"2026-06-27", type:"改善", title:"扇形フィルターの動作・見た目を調整", body:"検索画面／ホーム画面で開く店舗・カテゴリの扇形フィルターを、スクロールし始めたら自動で閉じるようにしました（タップでも今までどおり閉じます）。ボタンの文字色をグレーから濃い色に、背景を少し透明に、余白も少し狭くしています。" },
  { date:"2026-06-27", type:"改善", title:"共有プリセットの見せ方を調整", body:"発注バーコードの共有プリセットを、商品マスターを読み込むまでは中身を表示しないように変更しました（読み込むと表示されます）。また、PDFとテキストをタブで左右に切り替えられるようにして、スクロールを短くしました。「管理モード（削除する）」の位置は一覧の下に移動しています。" },
  { date:"2026-06-27", type:"改善", title:"ホーム画面の案内メッセージをON/OFF可能に", body:"ホーム画面下に出る「季節のポップは自動でアーカイブされます」という案内（タップ／スクロールで消えるもの）を、管理画面の「お知らせ」からON/OFF・文章編集できるようにしました。緊急お知らせバナーと合わせて、まとめて設定できます。" },
  { date:"2026-06-27", type:"改善", title:"下メニューを低く・表示ズレを軽減", body:"画面下の「一覧／検索／☰」バーの高さを下げて、余白を詰めました。あわせて、iPhoneでスクロール時に画面がずれて見える問題の対策として、表示領域の高さの取り方を改善しています（dvh対応）。※Safariのアドレスバーの出入りによるズレを完全になくすには、ホーム画面に追加してアプリとして開くのが確実です。" },
  { date:"2026-06-27", type:"改善", title:"共有プリセットの削除方法を変更", body:"共有プリセットの削除を、管理モード方式に変えました。「🔧 管理モード（削除する）」に管理パスワードを入力して解除すると、チェックで複数選べるようになり、まとめて一括削除できます。パスワード入力のポップアップは廃止しました。" },
  { date:"2026-06-27", type:"新機能", title:"共有プリセットにPDFを登録できるように", body:"発注バーコードの「共有プリセット」に、完成したバーコード表のPDFを登録できるようにしました。バーコードを自分で生成できない場合でも、PDFを「開く」または「DL」して、そのまま印刷できます。テキスト(.txt)の登録も従来どおり使えます。どちらも商品マスターを読み込むと使用できます。" },
  { date:"2026-06-27", type:"修正", title:"発注バーコードの並びズレを修正", body:"発注バーコードのプレビュー・印刷で、Windowsのパソコンだとマス目が不揃いにズレることがある問題を直しました。商品名や番号の幅に関係なく、必ず等間隔で並ぶようにしています。" },
  { date:"2026-06-27", type:"新機能", title:"一時お知らせバナー（管理者用）", body:"不具合などの際に、メインページの上部へ注意バナーを出せるようにしました。管理画面の「お知らせ」から、表示のON/OFFと文章を設定して保存すると、全店の画面に反映されます。復旧したらOFFにして保存してください。" },
  { date:"2026-06-27", type:"新機能", title:"発注バーコードに「共有プリセット」", body:"よく使う発注プリセットを全店で共有できるようにしました。発注バーコードのタブに一覧が出て、「読込」で発注リストに取り込み、「DL」でファイル保存できます。なお、安全のため商品マスター（エクセル）を読み込むまでは使用できません（一覧は表示されますが、先にマスターの読み込みが必要です）。プリセットは.txtを複数まとめて登録できます。" },
  { date:"2026-06-27", type:"新機能", title:"プロンプト集（記録＆手引き）", body:"☰メニューに「プロンプト集」を追加しました。うまくいったAI画像と、そのプロンプトを画像付きで保存でき、ワンタップでプロンプトをコピーして再利用できます。「手引き」タブには、プロンプトの読み解き方や、画像を再利用するコツをまとめています。" },
  { date:"2026-06-27", type:"改善", title:"ホーム画面に追加でフルスクリーン対応", body:"アプリを「ホーム画面に追加」して起動すると、Safariのバーが消えてフルスクリーンで使えます。スクロール時に下のメニューバーが少しズレる現象（iPhone・Safariのツールバーの開閉が原因）も起きなくなります。iPhoneは共有ボタン→「ホーム画面に追加」から登録できます。" },
  { date:"2026-06-27", type:"新機能", title:"発注バーコード生成（大幅刷新）", body:"☰メニューの「発注バーコード生成」を作り直しました。商品マスタ（エクセル）から、包材・トレー／冷食・たれ／資材／生鮮のカテゴリ別に商品を探し、タップで発注リストに追加できます。ドラッグや▲▼で並べ替え、選んだ内容はテキストのプリセットとして保存・読み込み可能。A4横1枚に16枚（4×4・縦順）のバーコードを印刷でき、商品名は幅に合わせて自動調整、プリセット名は各ページの右下に印刷されます。※この画面はパソコンでの操作を推奨します。" },
  { date:"2026-06-27", type:"新機能", title:"相場計算からPOPをすぐ作成", body:"相場計算で出した「おトク文」や「売価」を、ワンタップでPOP作成に渡せるようになりました。先週比カードの「このおトク文でPOPを作成」や、売価計算カードの「この売価でPOPを作成」を押すと、作成タブの入力欄に自動で入ります。" },
  { date:"2026-06-27", type:"改善", title:"検索の表記ゆれに対応", body:"商品検索とPOP検索で、カタカナ・ひらがな・全角・半角の違いを気にせず探せるようになりました。「マグロ」でも「まぐろ」でも同じものがヒットします。" },
  { date:"2026-06-27", type:"改善", title:"ジャンル「丸魚提案」を追加", body:"検索の左の縦タブに「丸魚提案」を追加しました（行事の下）。振り分けは管理画面の「ジャンル選別」から行えます。" },

function normJa(s) {
  if (s == null) return "";
  return String(s)
    .normalize("NFKC")                                              // 全角→半角・互換文字を標準化

}

function loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement("script");
    s.src = src; s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("load failed: " + src));
    document.head.appendChild(s);
  });
}

      img.onload = () => {
        const c = document.createElement("canvas");
        const max = 1200;
        let w = img.width, wh = img.height;
        if (w > max) { wh = Math.round(wh*max/w); w = max; }
        c.width = w; c.height = wh;
        c.getContext("2d").drawImage(img, 0, 0, w, wh);
        c.toBlob(res, "image/jpeg", 0.85);
      };
      img.src = URL.createObjectURL(file);
    });
    const name = `${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
    const r = await fetch(`${SB_URL}/storage/v1/object/pop-images/${name}`, {

      headers: { ...h(), "Content-Type": "image/jpeg", "x-upsert": "true" },

    return `${SB_URL}/storage/v1/object/public/pop-images/${name}`;

      body: JSON.stringify({ text, updated_at: new Date().toISOString() })
    });
    if (!r.ok) throw new Error(await r.text());
    const result = await r.json();
    return result.length > 0 ? result[0] : { id: 1, text };
  }
};

function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return "たった今";
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
}
// 右下角を起点に、真上(90°)〜真左(178°)へ扇状に並べる座標を計算する（放射状フィルター用）
function arcPositions(n, radius, fromDeg, toDeg) {
  const arr = [];
  for (let i=0;i<n;i++){
    const t = n===1 ? 0.5 : i/(n-1);
    const deg = fromDeg + (toDeg-fromDeg)*t;
    const rad = deg*Math.PI/180;
    arr.push({ tx: Math.cos(rad)*radius, ty: -Math.sin(rad)*radius });
  }
  return arr;
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

  const [deleting, setDeleting] = useState(false);

  const [cStore, setCStore] = useState("バイヤー");
  const [cText, setCText] = useState("");
  const [cSubmitting, setCSubmitting] = useState(false);
  const [cError, setCError] = useState("");

  useEffect(() => {
    api.listComments(pop.id).then(setComments).catch(()=>{});
  }, [pop.id]);

  const handleLike = async () => {
    if (liked) return;
    try {
      const updated = await api.like(pop.id, likes);
      setLikes(updated.likes);
      setLiked(true);
      onLiked && onLiked(pop.id, updated.likes);
    } catch(e) {}
  };

  const handleDownload = () => {
    const a = document.createElement("a");
    a.href = pop.image_url;
    a.download = `${pop.store_name}_${pop.product_name}.jpg`;

        setPwError("パスワードが違います");
        setPwInput("");
        setDeleting(false);
        return;

      await api.del(pop.id);

// ── Board Tab ──
function BoardTab({ currentStore, actionsRef, onCreateFromPop, radialOpen, setRadialOpen, tipEnabled, tipMessage, feat, onFeatGo }) {
  const [pops, setPops] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [showUp, setShowUp] = useState(false);
  const [sel, setSel] = useState(null);
  const [commentedIds, setCommentedIds] = useState(new Set());
  const [radialChanged, setRadialChanged] = useState(false);
  const [hubSpin, setHubSpin] = useState(false);
  const [showNotice, setShowNotice] = useState(true);
  const [featShow, setFeatShow] = useState(() => {
    try { const seen = localStorage.getItem("featSeen"); return !feat || (seen !== (feat.ver || feat.message)); } catch(e) { return true; }
  });
  const tipOn = tipEnabled !== false;
  const tipText = tipMessage || "季節のポップや時期が過ぎたポップは「アーカイブ」に収納されます。";

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await api.listActive();
      setPops(data);
    }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, []);


  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (actionsRef) actionsRef.current = { refresh: load, openUpload: () => setShowUp(true) };
  }, [load, actionsRef]);

  useEffect(() => {
    if (!showNotice) return;
    const onScroll = () => setShowNotice(false);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [showNotice]);

  useEffect(() => {
    if (!radialOpen) return;
    const onScroll = () => { setRadialOpen(false); setRadialChanged(false); };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [radialOpen]);

  const counts = pops.reduce((a,p) => { a[p.store_name]=(a[p.store_name]||0)+1; return a; }, {});
  const filtered = pops.filter(p => (!fStore||p.store_name===fStore) && (!fCat||p.category===fCat)).sort((a,b) => (b.is_pinned ? 1 : 0) - (a.is_pinned ? 1 : 0));

  const handleHubClick = () => {
    if (!radialChanged) { setRadialOpen(v=>!v); return; }   // 未選択時は開閉トグル（写真を広く見たい時用）
    setHubSpin(true);
    load();
    setTimeout(()=>{ setHubSpin(false); setRadialChanged(false); }, 380); // 更新後も輪は開いたまま
  };
  const pickStore = (val) => { setFStore(val); setRadialChanged(true); };
  const pickCat = (val) => { setFCat(val); setRadialChanged(true); };

            <div style={{ minWidth:0, flex:1 }}>
              <div style={{ fontSize:10.5, fontWeight:800, color:"rgba(255,255,255,0.8)" }}>新機能のお知らせ</div>
              <div style={{ fontSize:13, fontWeight:800, color:"#fff", lineHeight:1.4 }}>{feat.message}</div>
            </div>
            {feat.tab && <span style={{ fontSize:11, fontWeight:800, color:"#1a6b3a", background:"#fff", borderRadius:8, padding:"4px 10px", flexShrink:0 }}>ひらく</span>}
            <button onClick={(e) => { e.stopPropagation(); try { localStorage.setItem("featSeen", feat.ver || feat.message); } catch(x){} setFeatShow(false); }}
              style={{ border:"none", background:"rgba(255,255,255,0.2)", color:"#fff", width:26, height:26, borderRadius:"50%", fontSize:14, fontWeight:800, cursor:"pointer", flexShrink:0, lineHeight:1 }}>✕</button>
          </div>

              <span style={{ fontSize:13, fontWeight:700, color:"#a8480a", lineHeight:1.5, flex:1 }}>{tipText}</span>
            </div>
          </div>
        )}
        {loading ? (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(158px, 1fr))", gap:12, alignItems:"start" }}>
            {[210,150,180,230,160,200,140,190].map((h,i) => (
              <div key={i} style={{ background:"#fff", border:"1px solid var(--line)", borderRadius:14, overflow:"hidden" }}>
                <div className="sk" style={{ width:"100%", height:h }} />
                <div style={{ padding:"9px 11px" }}>
                  <div className="sk" style={{ width:"62%", height:11, borderRadius:6 }} />

      {radialOpen && (

      <div style={{ position:"fixed", left:"50%", bottom:FAN_BOTTOM, width:1, height:1, zIndex:165 }}>

          const delay = radialOpen ? (50+i*30) : 0;

            <button key={"s"+it.val} onClick={(e)=>{ e.stopPropagation(); pickStore(it.val); }}

      />}
    </>
  );
}

// ── Search Tab ──
function SearchTab({ onCreateFromPop, radialOpen, setRadialOpen }) {
  const [allPops, setAllPops] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState("");
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [fGenre, setFGenre] = useState("");
  const [sel, setSel] = useState(null);

  // 初回は検索バーにフォーカスが当たった段階 or 文字入力時にロード
  const ensureLoaded = async () => {
    if (loaded || loading) return;
    setLoading(true);
    try { const data = await api.listActive(); setAllPops(data); setLoaded(true); }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  useEffect(() => { ensureLoaded(); }, []);

  useEffect(() => {
    if (!radialOpen) return;
    const onScroll = () => setRadialOpen(false);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [radialOpen]);

  const q = normJa(search.trim());
  const results = !loaded ? [] : allPops.filter(p => {
    const matchStore  = !fStore || p.store_name === fStore;
    const matchCat    = !fCat   || p.category === fCat;
    const matchGenre  = !fGenre || p.genre === fGenre;
    const matchSearch = !q ||
      normJa(p.product_name).includes(q) ||
      normJa(p.store_name).includes(q) ||
      normJa(p.category).includes(q);
    return p.genre !== "除外" && matchStore && matchCat && matchGenre && matchSearch;
  });

  const hasFilter = q || fStore || fCat || fGenre;
  const storeCounts = allPops.reduce((a,p)=>{ a[p.store_name]=(a[p.store_name]||0)+1; return a; }, {});
  const fanStoreItems = STORES.filter(s=>(storeCounts[s]||0)>0).map(s=>({lbl:s,val:s}));
  const fanCatItems = ["",...CATEGORIES.filter(c=>c!=="その他")].map(c=>({lbl:c||"すべて", val:c}));
  const fanStorePos = arcPositions(fanStoreItems.length, 104, 150, 30);
  const fanCatPos = arcPositions(fanCatItems.length, 152, 158, 22);
  const FAN_BOTTOM = "calc(92px + env(safe-area-inset-bottom))";

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:"10px 16px 84px" }}>

      {/* 左端のジャンル付箋タブ（扇フィルターと同時に表示。勝部が選別したジャンルで絞り込み） */}
      <div style={{ position:"fixed", left:0, top:"46%", transform:"translateY(-50%)", zIndex:166, display:"flex", flexDirection:"column", gap:4 }}>
          {GENRES.map(g => {
            const c = GENRE_COLORS[g];
            const on = fGenre === g;
            return (
              <button key={g} onClick={() => { setFGenre(on ? "" : g); ensureLoaded(); }}
                style={{ writingMode:"vertical-rl", height: on ? 100 : 86, width: on ? 40 : 33,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  border:"none", cursor:"pointer", letterSpacing:".08em",
                  background: on ? c.solid : c.soft, color: on ? "#fff" : c.text,
                  fontSize: on ? 15 : 13, fontWeight:800, borderRadius:"0 12px 12px 0",
                  boxShadow: on ? "2px 2px 9px rgba(0,0,0,0.20)" : "1px 1px 4px rgba(0,0,0,0.10)",
                  transition:"all .18s ease" }}>
                {g}
              </button>
            );
          })}
        </div>
      {/* 検索ボックス */}
      <div style={{ background:"white", borderRadius:18, padding:"18px 20px 16px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)", marginBottom:20, marginLeft:46 }}>
        {/* 検索入力（最上部） */}
        <div style={{ position:"relative", marginBottom:12 }}>
          
          <input type="text" value={search} onChange={e=>{ setSearch(e.target.value); ensureLoaded(); }} onFocus={ensureLoaded}
            placeholder="商品名・店舗名・カテゴリで検索..."
            style={{ width:"100%", boxSizing:"border-box", padding:"12px 16px 12px 16px", border:"2px solid var(--line)", borderRadius:12, fontSize:15, outline:"none", background:"var(--bg)" }} />
          {search && (
            <button onClick={()=>setSearch("")} style={{ position:"absolute", right:11, top:"50%", transform:"translateY(-50%)", background:"#ddd", border:"none", borderRadius:"50%", width:24, height:24, cursor:"pointer", fontSize:13, color:"var(--text)", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          )}
        </div>
        {/* 店舗フィルター */}
        <div style={{ display:"flex", gap:"0 15px", marginBottom:11, overflowX:"auto", paddingBottom:4 }}>
          {[{lbl:"全店舗",val:""},...STORES.filter(s=>(storeCounts[s]||0)>0).map(s=>({lbl:s,val:s}))].map(({lbl,val})=>(
            <button key={lbl} onClick={()=>{ setFStore(val); ensureLoaded(); }}
              style={{ border:"none", background:"none", cursor:"pointer", padding:"0 0 3px", flexShrink:0, whiteSpace:"nowrap", fontSize:13, fontWeight:fStore===val?700:600, color:fStore===val?"var(--primary)":"#888", borderBottom:fStore===val?"2px solid var(--primary)":"1px solid #ededef" }}>
              {lbl}
            </button>
          ))}
        </div>

        {/* カテゴリフィルター */}
        <div style={{ display:"flex", gap:"0 15px", flexWrap:"nowrap", overflowX:"auto", paddingBottom:4 }}>
          {["", "その他", ...CATEGORIES.filter(c=>c!=="その他")].map(c=>(
            <button key={c||"all"} onClick={()=>{ setFCat(c); ensureLoaded(); }}
              style={{ border:"none", background:"none", cursor:"pointer", padding:"0 0 3px", flexShrink:0, whiteSpace:"nowrap", fontSize:12.5, fontWeight:fCat===c?700:600, color:fCat===c?"#111":"#999", borderBottom:fCat===c?"2px solid #111":"1px solid #ededef" }}>
              {c||"すべて"}
            </button>
          ))}
        </div>

        {/* よく使う検索ワード（折り返しで全部表示） */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:"9px 15px", alignItems:"baseline", marginTop:12 }}>
          {["刺身","寿司","切身","マグロ","サーモン","ブリ","鯛","エビ","いか","タコ","カニ","ホタテ","真あじ","生食","鮭","対面","夏","鯖","貝"].map(w=>{
            const on = search===w;
            return (
              <button key={w} onClick={()=>{ setSearch(on?"":w); ensureLoaded(); }}
                style={{ border:"none", background:"none", cursor:"pointer", padding:"0 0 3px", flexShrink:0, whiteSpace:"nowrap", fontSize:on?13.5:13, fontWeight:on?700:600, color:on?"var(--primary)":"#7a7a7f", borderBottom:on?"2px solid var(--primary)":"1px solid #e7e7e9" }}>
                {w}
              </button>
            );
          })}
        </div>

      </div>

      {/* 結果エリア */}
      <div style={{ paddingLeft:46 }}>
      {loading ? (
        <div style={{ textAlign:"center", padding:60, color:"var(--faint)" }}>
          
          <div style={{ animation:"pulse 1.5s infinite" }}>読み込み中...</div>
        </div>
      ) : !hasFilter ? (
        allPops.length === 0 ? (
          <div style={{ textAlign:"center", padding:60, color:"var(--faint)" }}>
            
            <div style={{ fontSize:15, fontWeight:700, color:"var(--sub)" }}>まだポップがありません</div>
          </div>
        ) : (
          <div>
            <div style={{ fontSize:13, fontWeight:800, color:"var(--sub)", marginBottom:12, paddingLeft:2 }}>みんなのポップ（{allPops.length}）</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(118px, 1fr))", gap:3 }}>
              {allPops.map(pop=>(
                <img key={pop.id} src={pop.image_url} loading="lazy" onClick={()=>setSel(pop)}
                  style={{ width:"100%", aspectRatio:"1/1", objectFit:"cover", borderRadius:8, cursor:"pointer", background:"var(--chip)", display:"block" }} />
              ))}
            </div>
          </div>
        )
      ) : results.length === 0 ? (
        <div style={{ textAlign:"center", padding:60, color:"var(--faint)" }}>
          
          <div style={{ fontSize:15, fontWeight:700, color:"var(--sub)" }}>一致するポップが見つかりません</div>
          <div style={{ fontSize:13, marginTop:6 }}>別のキーワードで試してみてください</div>
        </div>
      ) : (
        <>
          <div style={{ fontSize:13, color:"var(--sub)", fontWeight:700, marginBottom:12 }}>
            {q && <span>「<span style={{ color:"var(--primary)" }}>{search}</span>」</span>}
            {(fGenre||fStore||fCat) && <span style={{ marginLeft: q?4:0 }}>{[fGenre,fStore,fCat].filter(Boolean).join(" · ")} </span>}
            の検索結果：<span style={{ color:"var(--ink)" }}>{results.length}件</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(158px, 1fr))", gap:12, alignItems:"start" }}>
            {results.map((pop,i)=><PopCard key={pop.id} pop={pop} index={i} onClick={setSel} />)}
          </div>
        </>
      )}
      </div>

      {radialOpen && (
        <div onClick={()=>setRadialOpen(false)} style={{ position:"fixed", inset:0, zIndex:160 }} />
      )}
      <div style={{ position:"fixed", left:"50%", bottom:FAN_BOTTOM, width:1, height:1, zIndex:165 }}>
        {fanStoreItems.map((it,i) => {
          const active = it.val === fStore;
          const delay = radialOpen ? (50+i*30) : 0;
          return (
            <button key={"s"+it.val} onClick={(e)=>{ e.stopPropagation(); setFStore(it.val); ensureLoaded(); }}
              style={{ position:"absolute", left:0, bottom:0, transformOrigin:"50% 100%",
                transform: radialOpen ? `translate(-50%,0) translate(${fanStorePos[i].tx}px, ${fanStorePos[i].ty}px) scale(1)` : "translate(-50%,0) scale(0.2)",
                opacity: radialOpen?1:0, pointerEvents: radialOpen?"auto":"none",
                transitionProperty:"transform, opacity", transitionDuration:"0.6s, 0.4s",
                transitionTimingFunction:"cubic-bezier(.16,1.18,.3,1), ease",
                transitionDelay:`${delay}ms, ${delay}ms`,
                padding:"6px 11px", whiteSpace:"nowrap", fontSize:13, fontWeight: active?800:700, borderRadius:8,
                boxShadow:"0 3px 12px rgba(0,0,0,0.12)", cursor:"pointer",
                background:"rgba(255,255,255,0.7)", backdropFilter:"blur(3px)", color: active?"var(--primary)":"#222", border:"none",
                borderBottom: active?"2.5px solid var(--primary)":"2.5px solid transparent" }}>
              {it.lbl}
            </button>
          );
        })}
        {fanCatItems.map((it,i) => {
          if (it.val === "") return null;   // 「すべて」は左の付箋と重なるため非表示
          const active = it.val === fCat;
          const delay = radialOpen ? (170+i*30) : 0;
          return (
            <button key={"c"+it.val} onClick={(e)=>{ e.stopPropagation(); setFCat(it.val); ensureLoaded(); }}
              style={{ position:"absolute", left:0, bottom:0, transformOrigin:"50% 100%",
                transform: radialOpen ? `translate(-50%,0) translate(${fanCatPos[i].tx}px, ${fanCatPos[i].ty}px) scale(1)` : "translate(-50%,0) scale(0.2)",
                opacity: radialOpen?1:0, pointerEvents: radialOpen?"auto":"none",
                transitionProperty:"transform, opacity", transitionDuration:"0.6s, 0.4s",
                transitionTimingFunction:"cubic-bezier(.16,1.18,.3,1), ease",
                transitionDelay:`${delay}ms, ${delay}ms`,
                padding:"5px 10px", whiteSpace:"nowrap", fontSize:12, fontWeight: active?800:700, borderRadius:8,
                boxShadow:"0 3px 12px rgba(0,0,0,0.12)", cursor:"pointer",
                background:"rgba(255,255,255,0.7)", backdropFilter:"blur(3px)", color: active?"#111":"#222", border:"none",
                borderBottom: active?"2.5px solid #111":"2.5px solid transparent" }}>
              {it.lbl}
            </button>
          );
        })}
      </div>

      {sel && <PopDetail pop={sel} onClose={()=>setSel(null)}
        onDelete={id=>{ setAllPops(p=>p.filter(x=>x.id!==id)); setSel(null); }}
        onLiked={(id,likes)=>setAllPops(p=>p.map(x=>x.id===id?{...x,likes}:x))}
        onCreateFromPop={onCreateFromPop}
      />}

    </div>
  );
}

// ── Blog Tab (売り場ノート) ──
function NewPostForm({ onPost, onCancel }) {
  const [text, setText] = useState("");
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const onFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
  };

  const submit = async () => {
    if (!text.trim() && !file) { setError("テキストまたは画像を入力してください"); return; }
    setLoading(true); setError("");
    try {
      let image_url = null;
      if (file) image_url = await api.upload(file);
      const post = await api.insertPost({ text: text.trim(), image_url });
      onPost(post);
    } catch(e) { setError("エラー: "+e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:20, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
      <div style={{ fontWeight:900, fontSize:15, marginBottom:14, color:"#2d6a4f" }}>新しい投稿</div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="売り場の様子、発見、コツなど..." rows={4} style={{ width:"100%", padding:"10px 12px", border:"2px solid var(--line)", borderRadius:10, fontSize:14, resize:"vertical", fontFamily:"inherit", outline:"none", marginBottom:10 }} />
      <label style={{ display:"block", border:"2px dashed #e0e0e0", borderRadius:10, padding:12, textAlign:"center", cursor:"pointer", marginBottom:10, background:preview?"transparent":"#fafafa" }}>
        {preview ? <img src={preview} style={{ maxWidth:"100%", maxHeight:160, borderRadius:6 }} /> : <div style={{ color:"var(--faint)", fontSize:13 }}>写真を追加（任意）</div>}
        <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
      </label>
      {error && <div style={{ color:"var(--primary)", fontSize:13, marginBottom:8 }}>{error}</div>}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={onCancel} style={{ flex:1, background:"#f5f5f5", color:"var(--text)", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:700, cursor:"pointer" }}>キャンセル</button>
        <button onClick={submit} disabled={loading} style={{ flex:2, background:"#2d6a4f", color:"white", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:900, cursor:"pointer", opacity:loading?0.6:1 }}>
          {loading ? "投稿中..." : "投稿する"}
        </button>
      </div>
    </div>
  );
}

function PostCard({ post, onOpen }) {
  return (
    <div onClick={()=>onOpen(post)} style={{ background:"white", borderRadius:14, overflow:"hidden", cursor:"pointer", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", transition:"all 0.15s" }}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.12)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
      {post.image_url && <img src={post.image_url} style={{ width:"100%", height:200, objectFit:"cover", display:"block" }} />}
      <div style={{ padding:"14px 16px" }}>
        {post.text && <div style={{ fontSize:14, color:"var(--ink)", lineHeight:1.6, marginBottom:8, display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{post.text}</div>}

        </div>

  );
}

function PopCreateInner({ seed, onSeedConsumed }) {
  const isRefSeed = !!(seed && seed.image_url);
  const [mode, setMode] = useState(isRefSeed ? "ref" : "new");
  const [size, setSize] = useState("縦");
  const [fields, setFields] = useState(
    isRefSeed
      ? { product:"", usage:"", price:"", appeal:"", mood:"", refProduct:"", refNoShow: seed.product || "" }
      : seed
        ? { product: seed.product||"", usage: seed.usage||"", price: seed.price||"", appeal: seed.appeal||"", mood: seed.mood||"", refProduct:"", refNoShow:"" }
        : { product:"", usage:"", price:"", appeal:"", mood:"", refProduct:"", refNoShow:"" });
  const [refImage] = useState(isRefSeed ? seed.image_url : null);
  const [prompt, setPrompt] = useState("");
  const [copied, setCopied] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState("");
  const [showTips, setShowTips] = useState(false);
  const scanInputRef = React.useRef(null);

  const setF = (k, v) => setFields(f => ({...f, [k]: v}));

  useEffect(() => { if (seed && onSeedConsumed) onSeedConsumed(); }, []);

  const SIZES = [
    { key:"縦", label:"縦A4（210×297mm）" },
    { key:"横", label:"横A4（297×210mm）" },
  ];
  const sizeLabel = SIZES.find(s=>s.key===size).label;

  const toBase64 = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const handleScan = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setScanning(true); setScanError("");
    try {
      const imageBase64 = await toBase64(file);
      const res = await fetch(`${SB_URL}/functions/v1/extract-pop`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` },
        body: JSON.stringify({ imageBase64, mimeType: file.type }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setFields(f => ({
        ...f,
        product: data.product || f.product,
        usage:   data.usage   || f.usage,
        price:   data.price   || f.price,
        appeal:  data.appeal  || f.appeal,
        mood:    data.mood    || f.mood,
      }));
    } catch(err) { setScanError("読み取りに失敗しました：" + err.message); }
    finally { setScanning(false); e.target.value = ""; }
  };

  const generate = () => {
    if (mode === "new") {
      setPrompt(
        `あなたはスーパーの鮮魚売り場専門のデザイナーです。\n` +
        `【商品】${fields.product}\n` +
        `【用途】${fields.usage}\n` +
        `【価格】${fields.price || "表記なし"}\n` +
        `【一言アピール】${fields.appeal}\n` +
        `【サイズ】${sizeLabel}\n` +
        `【雰囲気】${fields.mood}\n` +
        `このPOPの画像を作ってください。`
      );
    } else if (mode === "bg") {
      setPrompt(size === "縦"
        ? `背景の売り場は必要ないんだ。サイズ縦A4（210×297mm）でポップ部分のみで作成して`
        : `背景の売り場は必要なし、サイズは横A4（297×210mm）でポップ部分のみで作成して`
      );
    } else {
      const p = fields.refProduct || "　";
      const n = fields.refNoShow || p;
      setPrompt(`この画像をレイアウト、配色のみを参考に、「${p}」のポップをサイズ${sizeLabel}で作成してください\n※「${n}」の表記はしないでください`);
    }
  };

  const copy = () => {
    if (!prompt) return;
    navigator.clipboard.writeText(prompt).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = prompt;
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    });
    setCopied(true);
    setTimeout(() => { setCopied(false); setPrompt(""); }, 2000);
  };

  const inp = { width:"100%", padding:"11px 13px", borderRadius:8, border:"1px solid #3a3a3a", background:"#2a2a2a", color:"white", fontSize:14, outline:"none", fontFamily:"inherit" };
  const lbl = { fontSize:12, color:"var(--sub)", marginBottom:5 };
  const MODES = [
    { key:"new", label:"① 新規POP作成" },
    { key:"bg",  label:"② 背景修正" },
    { key:"ref", label:"③ 参考画像あり" },
  ];

  return (
    <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px 60px" }}>
      <div style={{ background:"#111", borderRadius:16, padding:"24px 22px", color:"white" }}>

        <div style={{ fontSize:16, fontWeight:900, marginBottom:20, color:"#eee" }}>鮮魚売り場 POP作成ツール</div>

        {/* モード */}
        <div style={{ fontSize:12, color:"var(--sub)", marginBottom:8 }}>モード選択</div>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {MODES.map(m=>(
            <button key={m.key} onClick={()=>{ setMode(m.key); setPrompt(""); }}
              style={{ flex:1, padding:"11px 6px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: mode===m.key ? "#8B6914" : "#2a2a2a", color: mode===m.key ? "white" : "#aaa", transition:"all 0.15s" }}>
              {m.label}
            </button>
          ))}
        </div>

        {/* サイズ */}
        <div style={{ fontSize:12, color:"var(--sub)", marginBottom:8 }}>サイズ</div>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {SIZES.map(s=>(
            <button key={s.key} onClick={()=>setSize(s.key)}
              style={{ flex:1, padding:"11px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:700,
                border:`2px solid ${size===s.key ? "#8B6914" : "#3a3a3a"}`,
                background:"#1e1e1e", color: size===s.key ? "white" : "#777", transition:"all 0.15s" }}>
              {s.label}
            </button>
          ))}
        </div>

        {/* モード① */}
        {mode === "new" && (
          <>
            <input ref={scanInputRef} type="file" accept="image/*" onChange={handleScan} style={{ display:"none" }} />
            <button onClick={()=>scanInputRef.current.click()} disabled={scanning}
              style={{ width:"100%", padding:"11px", borderRadius:8, border:"1px dashed #8B6914", marginBottom:16,
                background: scanning ? "#1a1a0a" : "#1e1800", color: scanning ? "#888" : "#c8a840",
                fontSize:13, fontWeight:700, cursor: scanning ? "default" : "pointer" }}>
              {scanning ? "AI読み取り中..." : "既存POPから自動入力（AI読み取り）"}
            </button>
            {scanError && <div style={{ fontSize:12, color:"var(--primary)", marginBottom:10 }}>{scanError}</div>}
            <div style={{ fontSize:12, color:"var(--sub)", marginBottom:10 }}>入力</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div><div style={lbl}>商品</div><input value={fields.product} onChange={e=>setF("product",e.target.value)} placeholder="例：天然マダイ（1尾）" style={inp} /></div>
              <div><div style={lbl}>用途</div><input value={fields.usage} onChange={e=>setF("usage",e.target.value)} placeholder="例：お刺身・塩焼き" style={inp} /></div>
              <div><div style={lbl}>価格</div><input value={fields.price} onChange={e=>setF("price",e.target.value)} placeholder="例：980円（税込）" style={inp} /></div>
              <div><div style={lbl}>一言アピール</div><input value={fields.appeal} onChange={e=>setF("appeal",e.target.value)} placeholder="例：産地直送！鮮度抜群" style={inp} /></div>
            </div>
            <div><div style={lbl}>雰囲気</div><input value={fields.mood} onChange={e=>setF("mood",e.target.value)} placeholder="例：夏らしい涼しげなデザイン、和風テイスト" style={inp} /></div>
          </>
        )}

        {/* モード② */}
        {mode === "bg" && (
          <div style={{ background:"#1e1e1e", border:"1px solid #3a3a3a", borderRadius:8, padding:"13px 15px", fontSize:13, color:"var(--sub)", lineHeight:1.8 }}>
            Geminiで修正したいPOP画像を貼り付けてから、下のプロンプトをコピーして送信してください。
          </div>
        )}

        {/* モード③ */}
        {mode === "ref" && (
          <>
            <div style={{ background:"#1a2a1a", border:"1px solid #2d4a2d", borderRadius:8, padding:"11px 13px", fontSize:12, color:"#7ec87e", lineHeight:1.75, marginBottom:14 }}>
              Geminiに参考にしたいPOP画像を先にアップロードしてから、生成したプロンプトを貼り付けてください。
            </div>
            {refImage && (
              <div style={{ background:"#1e1e1e", border:"1px solid #3a3a3a", borderRadius:8, padding:"11px 13px", marginBottom:14, display:"flex", gap:12, alignItems:"center" }}>
                <img src={refImage} style={{ width:64, height:64, objectFit:"cover", borderRadius:6, flexShrink:0, background:"#111" }} />
                <div style={{ fontSize:12, color:"#c8a840", lineHeight:1.7 }}>
                  <div style={{ fontWeight:800, marginBottom:2 }}>このPOPを参照元にします</div>
                  <div style={{ color:"var(--sub)" }}>この画像を長押しで保存し、AIにアップロードしてから下のプロンプトを貼り付けてください。</div>
                </div>
              </div>
            )}
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <div><div style={lbl}>ポップの内容（商品名など）</div><input value={fields.refProduct} onChange={e=>setF("refProduct",e.target.value)} placeholder="例：天然マダイ お刺身用" style={inp} /></div>
              <div><div style={lbl}>表記しない内容 <span style={{ color:"var(--text)" }}>（空欄の場合は上と同じ）</span></div><input value={fields.refNoShow} onChange={e=>setF("refNoShow",e.target.value)} placeholder="例：天然マダイ" style={inp} /></div>
            </div>
          </>
        )}

        {/* 区切り */}
        <div style={{ borderTop:"1px solid #2a2a2a", margin:"18px 0 14px" }} />

        {/* 生成されたプロンプト */}
        <div style={{ fontSize:12, color:"var(--sub)", marginBottom:8 }}>生成されたプロンプト</div>
        <textarea value={prompt} readOnly placeholder="← 上の項目を入力して「プロンプト生成」を押してください" rows={5}
          style={{ width:"100%", padding:"12px 13px", borderRadius:8, border:"1px solid #2a2a2a", background:"#1a1a1a",
            color: prompt ? "#eee" : "#555", fontSize:13, resize:"vertical", fontFamily:"inherit", outline:"none", lineHeight:1.75, marginBottom:12 }} />

        {/* ボタン */}
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <button onClick={generate}
            style={{ flex:3, padding:"14px", borderRadius:8, border:"1px solid #3a3a3a", background:"#222", color:"#ddd", fontSize:14, fontWeight:700, cursor:"pointer" }}
            onMouseEnter={e=>e.currentTarget.style.background="#2e2e2e"}
            onMouseLeave={e=>e.currentTarget.style.background="#222"}>
            プロンプト生成
          </button>
          <button onClick={copy} disabled={!prompt}
            style={{ flex:1, padding:"14px", borderRadius:8, border:"none",
              background: copied ? "#16a34a" : (prompt ? "#8B6914" : "#333"),
              color:"white", fontSize:14, fontWeight:700, cursor: prompt ? "pointer" : "default",
              opacity: !prompt ? 0.4 : 1, transition:"all 0.2s" }}>
            {copied ? "コピー済" : "コピー"}
          </button>
        </div>

        {/* 使い方ヒント（折りたたみ） */}
        <button onClick={()=>setShowTips(t=>!t)}
          style={{ width:"100%", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:8, padding:"10px 14px",
            color:"var(--text)", fontSize:12, fontWeight:700, cursor:"pointer", textAlign:"left", transition:"all 0.15s" }}>
          {showTips ? "▲ 使い方・ヒントを閉じる" : "▼ 使い方・ヒントを見る"}
        </button>
        {showTips && (
          <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ background:"#1a1a0a", border:"1px solid #3a3a00", borderRadius:10, padding:"13px 15px" }}>
              <div style={{ fontSize:12, fontWeight:800, color:"#c8a840", marginBottom:8 }}>使い方（4ステップ）</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px 12px" }}>
                {[["①","モードとサイズを選ぶ"],["②","入力欄を埋める"],["③","「プロンプト生成」を押す"],["④","「コピー」→Geminiに貼り付け"]].map(([n,t])=>(
                  <div key={n} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"var(--sub)" }}>
                    <div style={{ width:20, height:20, background:"#3a3a00", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:"#c8a840", flexShrink:0 }}>{n}</div>
                    <div>{t}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:10, padding:"13px 15px", fontSize:12, color:"#7ec87e", lineHeight:1.75 }}>
              <strong style={{ color:"#52c87e" }}>価格を入れたくない場合</strong>は価格欄を空欄にすると「表記なし」が自動で入ります。
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ドラッグ＋▲▼で並べ替えできるリスト用フック（タッチ対応）
function useDragList(list, setLocal, persist) {
  const containerRef = React.useRef(null);
  const st = React.useRef({ list, idx:-1 });
  st.current.list = list;
  const [dragIdx, setDragIdx] = useState(-1);

  const down = (i) => (e) => {
    e.preventDefault();
    st.current.idx = i; setDragIdx(i);
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_){}
  };
  const move = (e) => {
    const di = st.current.idx;
    if (di < 0) return;
    e.preventDefault();
    const cont = containerRef.current; if (!cont) return;
    const rows = Array.from(cont.querySelectorAll("[data-row]"));
    const y = e.clientY;
    let target = rows.length - 1;
    for (let k=0; k<rows.length; k++) {
      const r = rows[k].getBoundingClientRect();
      if (y < r.top + r.height/2) { target = k; break; }
    }
    if (target !== di && target >= 0) {
      const arr = st.current.list.slice();
      const [m] = arr.splice(di, 1);
      arr.splice(target, 0, m);
      st.current.list = arr; st.current.idx = target;
      setDragIdx(target); setLocal(arr);
    }
  };
  const up = (e) => {
    const di = st.current.idx;
    st.current.idx = -1; setDragIdx(-1);
    if (di >= 0) persist(st.current.list);
  };
  return { containerRef, dragIdx, down, move, up };
}

function BarcodeTab() {
  const ACCENT = "var(--primary)";
  const [libsReady, setLibsReady] = useState(typeof XLSX !== "undefined" && typeof JsBarcode !== "undefined");
  useEffect(() => {
    let alive = true;
    Promise.all([loadScriptOnce(XLSX_SRC), loadScriptOnce(JSBARCODE_SRC)])
      .then(() => { if (alive) setLibsReady(true); }).catch(e => console.error(e));
    return () => { alive = false; };
  }, []);

  const [master, setMaster] = useState([]);            // [{name,bcode,pcode,kubun,haccyu}]（重複除去済み）
  const [cat, setCat] = useState("tray");              // 選択中カテゴリ
  const [fileName, setFileName] = useState("");
  const [err, setErr] = useState("");
  const [over, setOver] = useState(false);
  const [search, setSearch] = useState("");
  const [list, setList] = useState([]);                // 作業リスト（印刷対象・順序つき）
  const [cols, setCols] = useState(4);
  const [showName, setShowName] = useState(true);
  const [listName, setListName] = useState("");
  const [srcOpen, setSrcOpen] = useState(true);
  const fileRef = React.useRef(null);
  const cfgRef = React.useRef(null);
  const sharedRef = React.useRef(null);
  const pdfRef = React.useRef(null);
  const [shAdmin, setShAdmin] = useState(false);
  const [shPwOpen, setShPwOpen] = useState(false);
  const [shPw, setShPw] = useState("");
  const [shPwErr, setShPwErr] = useState("");
  const [shSel, setShSel] = useState(() => new Set());
  const [shConfirm, setShConfirm] = useState(false);
  const [shBusy, setShBusy] = useState(false);
  const [shTab, setShTab] = useState("pdf");
  const [shared, setShared] = useState([]);
  const [sharedLoad, setSharedLoad] = useState(true);
  const previewRef = React.useRef(null);

  const [portalEl] = useState(() => { const el = document.createElement("div"); el.id = "barcode-print-portal"; return el; });
  useEffect(() => { document.body.appendChild(portalEl); return () => { try { document.body.removeChild(portalEl); } catch(e){} }; }, [portalEl]);

  const findCol = (header, cands) => {
    for (const c of cands) { const i = header.findIndex(x => String(x).replace(/\s/g,"") === c); if (i>=0) return i; }
    for (const c of cands) { const key = c.slice(0,6); const i = header.findIndex(x => String(x).includes(key)); if (i>=0) return i; }
    return -1;
  };

  // マスタ（エクセル）読み込み：全シート・スキャニングコードのある全商品を取得（区分は問わない）
  const handleFile = (file) => {
    if (!file) return;
    setErr("");
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        if (typeof XLSX === "undefined") throw new Error("ライブラリ読み込み中です。少し待って再試行してください");
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
        const out = []; const seen = new Set();
        wb.SheetNames.forEach(sheet => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheet], { header:1, defval:"", raw:false });
          if (!rows.length) return;
          const header = rows[0];
          const iScan  = findCol(header, ["スキャニングコード1"]);
          const iKubun = findCol(header, ["スキャニングコード区分1"]);
          const iCode  = findCol(header, ["商品コード"]);
          const iName  = findCol(header, ["商品名(漢字_全角25文字)","商品名(漢字","商品名"]);
          const iHac   = findCol(header, ["発注先コード1"]);
          if (iScan < 0) return;
          for (let r=1; r<rows.length; r++) {
            const row = rows[r]; if (!row) continue;
            const bcode = String(row[iScan]).trim();
            if (!bcode || seen.has(bcode)) continue;
            seen.add(bcode);
            const pcode = iCode>=0 ? String(row[iCode]).trim() : "";
            const haccyu = iHac>=0 ? String(row[iHac]||"").trim() : "";
            const kubun = iKubun>=0 ? String(row[iKubun]).trim() : "";
            let name = iName>=0 ? String(row[iName]||"") : "";
            name = name.replace(/\u3000/g," ").replace(/\s+/g," ").trim();
            out.push({ name, pcode, bcode, kubun, haccyu });
          }
        });
        if (!out.length) throw new Error("スキャニングコードのデータが見つかりませんでした");
        setMaster(out); setFileName(file.name);
      } catch(ex) { setErr(ex.message); setMaster([]); setFileName(""); }
    };
    reader.readAsArrayBuffer(file);
  };

  const inList = (bcode) => list.some(it => it.bcode === bcode);
  const addItem = (it) => { if (inList(it.bcode)) return; setList(prev => [...prev, it]); };
  const removeItem = (bcode) => setList(prev => prev.filter(it => it.bcode !== bcode));
  const moveItem = (i, dir) => {
    setList(prev => { const j=i+dir; if (j<0||j>=prev.length) return prev; const a=prev.slice(); const [m]=a.splice(i,1); a.splice(j,0,m); return a; });
  };

  // 設定の書き出し／読み込み（テキスト）
  const exportCfg = () => {
    if (!list.length) return;
    const nm = (prompt("プリセット名（ファイル名）", listName || "発注リスト") || "発注リスト").trim();
    setListName(nm);
    const data = { type:"tray-list", v:2, name:nm, savedAt:new Date().toISOString(), items:list };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${nm}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };
  const importCfg = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(String(e.target.result));
        const items = Array.isArray(parsed) ? parsed : parsed.items;
        if (!Array.isArray(items)) throw new Error("形式が違います");
        const clean = items.filter(x => x && x.bcode).map(x => ({ name:x.name||"", pcode:x.pcode||"", bcode:String(x.bcode), kubun:x.kubun||"", haccyu:x.haccyu||"" }));
        setList(clean); if (parsed && parsed.name) setListName(parsed.name); setErr("");
      } catch(ex) { setErr("プリセットを読み込めませんでした"); }
    };
    reader.readAsText(file);
    if (cfgRef.current) cfgRef.current.value = "";
  };

  const drag = useDragList(list, setList, setList);

  useEffect(() => {
    api.listSharedPresets().then(d => { setShared(d); setSharedLoad(false); }).catch(() => setSharedLoad(false));
  }, []);
  const cleanItems = (items) => (items || []).filter(x => x && x.bcode).map(x => ({ name:x.name||"", pcode:x.pcode||"", bcode:String(x.bcode), kubun:x.kubun||"", haccyu:x.haccyu||"" }));
  const readText = (f) => new Promise((res, rej) => { const r = new FileReader(); r.onload = e => res(String(e.target.result)); r.onerror = rej; r.readAsText(f); });
  const loadShared = (p) => {
    if (master.length === 0) return;
    setList(cleanItems(p.data && p.data.items));
    setListName(p.name || (p.data && p.data.name) || ""); setErr("");
    window.scrollTo({ top:0, behavior:"smooth" });
  };
  const downloadShared = (p) => {
    if (master.length === 0) return;
    const data = { type:"tray-list", v:2, name:p.name||"preset", items: cleanItems(p.data && p.data.items) };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`${p.name||"preset"}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };
  const uploadShared = async (files) => {
    const arr = Array.from(files || []); if (!arr.length) return;
    let base = shared.length;
    for (const f of arr) {
      try {
        const parsed = JSON.parse(await readText(f));
        const items = Array.isArray(parsed) ? parsed : parsed.items;
        if (!Array.isArray(items)) continue;
        const nm = (parsed && parsed.name) ? parsed.name : f.name.replace(/\.(txt|json)$/i, "");
        const row = await api.insertSharedPreset({ name:nm, data:{ type:"tray-list", v:2, name:nm, items: cleanItems(items) }, sort_order: base++ });
        setShared(s => [...s, row]);
      } catch(ex) {}
    }
    if (sharedRef.current) sharedRef.current.value = "";
  };
  const uploadSharedPdf = async (files) => {
    const arr = Array.from(files || []).filter(f => /pdf/i.test(f.type) || /\.pdf$/i.test(f.name));
    if (!arr.length) return;
    let base = shared.length;
    for (const f of arr) {
      try {
        const url = await api.uploadRaw(f);
        const nm = f.name.replace(/\.pdf$/i, "");
        const row = await api.insertSharedPreset({ name: nm, data: {}, pdf_url: url, sort_order: base++ });
        setShared(s => [...s, row]);
      } catch(ex) { alert("PDFの登録に失敗しました：" + (f.name || "")); }
    }
    if (pdfRef.current) pdfRef.current.value = "";
  };
  const downloadPdf = async (p) => {
    try {
      const res = await fetch(p.pdf_url);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = (p.name || "preset") + ".pdf";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch(ex) { window.open(p.pdf_url, "_blank"); }
  };
  const unlockShAdmin = async () => {
    try {
      const ok = await api.verifyPassword("admin", shPw);
      if (ok) { setShAdmin(true); setShPwOpen(false); setShPw(""); setShPwErr(""); }
      else setShPwErr("パスワードが違います");
    } catch(ex) { setShPwErr("確認に失敗しました"); }
  };
  const toggleShSel = (id) => setShSel(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const bulkDelShared = async () => {
    if (shSel.size === 0) return;
    setShBusy(true);
    try {
      for (const id of Array.from(shSel)) { await api.delSharedPreset(id); }
      setShared(s => s.filter(x => !shSel.has(x.id)));
      setShSel(new Set()); setShConfirm(false);
    } catch(ex) { alert("削除に失敗しました"); }
    setShBusy(false);
  };

  useEffect(() => {
    const draw = (root) => {
      if (!root || typeof JsBarcode === "undefined") return;
      root.querySelectorAll("svg[data-code]").forEach(svg => {
        try {
          JsBarcode(svg, svg.getAttribute("data-code"), { format:"CODE128", displayValue:false, margin:0, height:42, width:2 });
          const w = svg.getAttribute("width"), hh = svg.getAttribute("height");
          if (w && hh) { svg.setAttribute("viewBox", `0 0 ${w} ${hh}`); svg.removeAttribute("width"); svg.removeAttribute("height"); svg.setAttribute("preserveAspectRatio", "none"); }
        } catch(e){}
      });
    };
    draw(previewRef.current); draw(portalEl);
  }, [list, cols, showName, portalEl, libsReady]);

  // カテゴリ別カウント
  const catCount = (c) => c.codes===null ? master.length : master.filter(m => c.codes.includes(m.haccyu)).length;

  // 一覧（カテゴリ＋検索で絞り込み）
  const activeCat = TRAY_CATS.find(c => c.key===cat) || TRAY_CATS[0];
  const q = normJa(search.trim());
  const base = activeCat.codes===null ? master : master.filter(m => activeCat.codes.includes(m.haccyu));
  const srcFiltered = q ? base.filter(it => normJa(it.name).includes(q) || it.bcode.includes(q) || it.pcode.includes(q)) : base;
  const srcShown = srcFiltered;

  const ROWS = 4;
  const perPage = cols * ROWS;                 // 4列×4行＝16枚/ページ
  const pages = [];
  for (let i=0; i<list.length; i+=perPage) pages.push(list.slice(i, i+perPage));

  // 商品名を幅に合わせて自動縮小（全角=1em・半角≒0.55emで概算し、セル幅に収まるptを算出）
  const _emUnits = (name) => { let u=0; for (const c of String(name||"")) u += /[\u3040-\u30ff\u3400-\u9fff\uff00-\uffef\u2e80-\u303f]/.test(c) ? 1.0 : 0.55; return u || 1; };
  const _availMm = 277/cols - 7;                       // セル内で名前に使えるおおよその幅(mm)
  const nameFitPt = (name) => Math.max(7, Math.min(16, (_availMm*2.835)/_emUnits(name)));

  // ページ単位で描画。gridAutoFlow:"column" で「列ごとに上→下」の縦順に並ぶ。
  const renderPages = (forPrint) => pages.map((pg, pi) => (
    <div key={pi} className="bc-page"
      style={ forPrint
        ? { breakAfter:"page", pageBreakAfter:"always", position:"relative", height:"192mm" }
        : { position:"relative", aspectRatio:"297 / 210", border:"1px solid #d8dbe0", borderRadius:6, background:"#fff", padding:"5mm", marginBottom:22, boxShadow:"0 1px 6px rgba(0,0,0,0.07)" } }>
      {!forPrint && <div style={{ position:"absolute", top:-9, left:14, background:"var(--bg)", padding:"0 8px", fontSize:11, fontWeight:800, color:"var(--sub)" }}>{pi+1}ページ目（{pg.length}枚）</div>}
      <div className="bc-grid" style={{ display:"grid", gridTemplateColumns:`repeat(${cols},minmax(0,1fr))`, gridTemplateRows: forPrint?`repeat(${ROWS}, 40mm)`:`repeat(${ROWS}, minmax(0,1fr))`, gridAutoFlow:"column", gap: forPrint?"3mm":"2mm", height: forPrint?"auto":"100%" }}>
        {pg.map(it => (
          <div key={it.bcode} className="bc-label"
            style={{ border:"1px solid #cfd8de", borderRadius:4, padding: forPrint?"2mm 1.5mm":"3px", breakInside:"avoid", display:"grid", minWidth:0, minHeight:0, gridTemplateRows: showName?"auto auto auto":"auto auto", alignContent:"center", justifyItems:"center", rowGap: forPrint?"1.5mm":"2px", background:"#fff", overflow:"hidden", textAlign:"center" }}>
            {showName && <div style={{ fontSize: forPrint ? nameFitPt(it.name)+"pt" : "9.5px", fontWeight:800, lineHeight:1.2, color:"#000", width:"100%", overflow:"hidden", whiteSpace:"normal", wordBreak:"break-word" }}>{it.name}</div>}
            <div style={{ width:"100%", height: forPrint?"16mm":"28px" }}>
              <svg data-code={it.bcode} preserveAspectRatio="none" style={{ width:"100%", height:"100%", display:"block" }}></svg>
            </div>
            <div style={{ fontSize: forPrint?"15pt":"9px", fontWeight:700, letterSpacing: forPrint?"0.4mm":"0.2px", color:"var(--ink)", lineHeight:1 }}>{it.bcode}</div>
          </div>
        ))}
      </div>
      {listName && <div style={{ position:"absolute", right: forPrint?"4mm":"8px", bottom: forPrint?"2mm":"7px", fontSize: forPrint?"20pt":"18px", fontWeight:800, color:"var(--text)", letterSpacing:".02em" }}>{listName}</div>}
    </div>
  ));

  const seg = (active) => ({ padding:"7px 14px", border:"none", fontSize:13, fontWeight:700, cursor:"pointer", background: active?ACCENT:"#fff", color: active?"#fff":"#888" });
  const card = { background:"white", borderRadius:16, padding:"18px 20px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:16 };

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:"20px 16px 80px" }}>

      {/* 設定の保存・読み込み */}
      <div style={card}>
        <div style={{ fontSize:14, fontWeight:900, color:"var(--ink)", marginBottom:10 }}>発注バーコード生成</div>
        <div style={{ fontSize:12, color:"#8a6d00", background:"#fff8e1", border:"1px solid #ffe6a0", borderRadius:8, padding:"7px 11px", marginBottom:13, lineHeight:1.55 }}>※ この画面はパソコンのブラウザでの操作を推奨します（スマートフォンでは一覧が多いと動作が重くなる場合があります）。</div>
        <div style={{ display:"flex", gap:9, flexWrap:"wrap" }}>
          <button onClick={()=>cfgRef.current && cfgRef.current.click()} style={{ border:`1.5px solid ${ACCENT}`, background:"#fff", color:ACCENT, borderRadius:9, padding:"9px 14px", fontSize:13, fontWeight:800, cursor:"pointer" }}>プリセット読み込み</button>
          <button onClick={exportCfg} disabled={!list.length} style={{ border:"none", background: list.length?ACCENT:"#ccc", color:"#fff", borderRadius:9, padding:"9px 14px", fontSize:13, fontWeight:800, cursor: list.length?"pointer":"not-allowed" }}>プリセット保存（{list.length}）</button>
          <input ref={cfgRef} type="file" accept=".txt,.json,text/plain" onChange={e=>importCfg(e.target.files[0])} style={{ display:"none" }} />
        </div>
        <input value={listName} onChange={e=>setListName(e.target.value)} placeholder="プリセット名（印刷の右下に表示されます）"
          style={{ width:"100%", boxSizing:"border-box", marginTop:11, padding:"9px 12px", border:"1px solid #e2e2e4", borderRadius:9, fontSize:14, outline:"none" }} />
        {err && <div style={{ fontSize:13, color:"var(--primary)", fontWeight:700, marginTop:10 }}>{err}</div>}
      </div>

      {/* 共有プリセット */}
      <div style={card}>
        <div style={{ fontSize:14, fontWeight:900, color:"var(--ink)", marginBottom:4 }}>共有プリセット</div>
        <div style={{ fontSize:12, color:"var(--text)", marginBottom:12, lineHeight:1.55 }}>みんなで使う発注プリセットです。商品マスターを読み込むと使えるようになります。</div>

        {master.length===0 ? null : (
          <>
            <div style={{ display:"flex", borderRadius:10, overflow:"hidden", border:"1px solid var(--line)", marginBottom:12 }}>
              <button onClick={()=>setShTab("pdf")}
                style={{ flex:1, border:"none", padding:"9px", fontSize:13, fontWeight:800, cursor:"pointer", background: shTab==="pdf"?"#222":"#fff", color: shTab==="pdf"?"#fff":"#888" }}>PDF（すぐ印刷）</button>
              <button onClick={()=>setShTab("text")}
                style={{ flex:1, border:"none", padding:"9px", fontSize:13, fontWeight:800, cursor:"pointer", background: shTab==="text"?"#222":"#fff", color: shTab==="text"?"#fff":"#888" }}>テキスト・プリセット</button>
            </div>

            {sharedLoad ? (
              <div style={{ textAlign:"center", color:"var(--faint)", padding:"18px 0", fontSize:13 }}>読み込み中…</div>
            ) : (() => {
              const rows = shared.filter(p => !!p.pdf_url === (shTab==="pdf"));
              return rows.length===0 ? (
                <div style={{ textAlign:"center", color:"var(--faint)", padding:"18px 0", fontSize:13 }}>まだ登録がありません</div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  {rows.map(p => {
                    const isPdf = !!p.pdf_url;
                    const cnt = ((p.data && p.data.items) || []).length;
                    const checked = shSel.has(p.id);
                    return (
                      <div key={p.id} onClick={ shAdmin ? ()=>toggleShSel(p.id) : undefined }
                        style={{ display:"flex", alignItems:"center", gap:8, background: shAdmin&&checked?"#eaf2ff":(isPdf?"#fef6ef":"#fafbfc"), border:`1px solid ${shAdmin&&checked?"#8ab4ff":(isPdf?"#f4d9c4":"#eef0f2")}`, borderRadius:10, padding:"8px 11px", cursor: shAdmin?"pointer":"default" }}>
                        {shAdmin && <input type="checkbox" checked={checked} readOnly style={{ width:18, height:18, accentColor:"#2f6fed", pointerEvents:"none" }} />}
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13.5, fontWeight:800, color:"#2c2c30", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name || "（無名）"}</div>
                          <div style={{ fontSize:11, color:"var(--sub)" }}>{isPdf ? "完成PDF（開く／DLして印刷）" : cnt+"点"}</div>
                        </div>
                        {!shAdmin && (isPdf ? (
                          <>
                            <button onClick={()=>window.open(p.pdf_url, "_blank")}
                              style={{ border:"none", background:ACCENT, color:"#fff", borderRadius:8, padding:"7px 13px", fontSize:13, fontWeight:800, cursor:"pointer" }}>開く</button>
                            <button onClick={()=>downloadPdf(p)}
                              style={{ border:`1.5px solid ${ACCENT}`, background:"#fff", color:ACCENT, borderRadius:8, padding:"7px 11px", fontSize:13, fontWeight:800, cursor:"pointer" }}>DL</button>
                          </>
                        ) : (
                          <>
                            <button onClick={()=>loadShared(p)}
                              style={{ border:"none", background:ACCENT, color:"#fff", borderRadius:8, padding:"7px 13px", fontSize:13, fontWeight:800, cursor:"pointer" }}>読込</button>
                            <button onClick={()=>downloadShared(p)}
                              style={{ border:`1.5px solid ${ACCENT}`, background:"#fff", color:ACCENT, borderRadius:8, padding:"7px 11px", fontSize:13, fontWeight:800, cursor:"pointer" }}>DL</button>
                          </>
                        ))}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            <div style={{ marginTop:12, borderTop:"1px solid #f0f0f2", paddingTop:12 }}>
              {shTab==="pdf" ? (
                <>
                  <button onClick={()=>pdfRef.current && pdfRef.current.click()}
                    style={{ border:"1.5px dashed #f0b48a", background:"#fff", color:"#c2410c", borderRadius:9, padding:"9px 14px", fontSize:13, fontWeight:800, cursor:"pointer" }}>＋ PDFを登録（完成表・複数可）</button>
                  <input ref={pdfRef} type="file" accept="application/pdf,.pdf" multiple onChange={e=>uploadSharedPdf(e.target.files)} style={{ display:"none" }} />
                  <div style={{ fontSize:11, color:"var(--sub)", marginTop:8, lineHeight:1.6 }}>完成したバーコード表のPDFです。生成せず、開く・DLしてそのまま印刷できます。全店で共有されます。</div>
                </>
              ) : (
                <>
                  <button onClick={()=>sharedRef.current && sharedRef.current.click()}
                    style={{ border:"1.5px dashed #c9c9d2", background:"#fff", color:"var(--text)", borderRadius:9, padding:"9px 14px", fontSize:13, fontWeight:800, cursor:"pointer" }}>＋ テキストを登録（.txt・複数可）</button>
                  <input ref={sharedRef} type="file" accept=".txt,.json,text/plain" multiple onChange={e=>uploadShared(e.target.files)} style={{ display:"none" }} />
                  <div style={{ fontSize:11, color:"var(--sub)", marginTop:8, lineHeight:1.6 }}>「プリセット保存」で書き出した.txtです。読込・DLできます。全店で共有されます。</div>
                </>
              )}
            </div>

            <div style={{ marginTop:12, borderTop:"1px solid #f0f0f2", paddingTop:12 }}>
              {!shAdmin && !shPwOpen && (
                <button onClick={()=>{ setShPwOpen(true); setShPwErr(""); }} style={{ border:"none", background:"none", color:"var(--sub)", fontSize:12, fontWeight:800, cursor:"pointer", padding:0, textDecoration:"underline" }}>🔧 管理モード（削除する）</button>
              )}
              {!shAdmin && shPwOpen && (
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <input type="password" value={shPw} onChange={e=>{ setShPw(e.target.value); setShPwErr(""); }} onKeyDown={e=>{ if(e.key==="Enter") unlockShAdmin(); }} placeholder="管理パスワード"
                    style={{ padding:"8px 11px", border:"1px solid #e2e2e6", borderRadius:8, fontSize:14, width:160, outline:"none" }} />
                  <button onClick={unlockShAdmin} style={{ border:"none", background:"#222", color:"#fff", borderRadius:8, padding:"8px 15px", fontSize:13, fontWeight:800, cursor:"pointer" }}>解除</button>
                  <button onClick={()=>{ setShPwOpen(false); setShPw(""); setShPwErr(""); }} style={{ border:"none", background:"none", color:"var(--sub)", fontSize:12, fontWeight:700, cursor:"pointer" }}>やめる</button>
                  {shPwErr && <span style={{ fontSize:12, color:"#e11", fontWeight:700 }}>{shPwErr}</span>}
                </div>
              )}
              {shAdmin && (
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", background:"#fff4e5", border:"1px solid #ffc98a", borderRadius:10, padding:"9px 11px" }}>
                  <span style={{ fontSize:12.5, fontWeight:900, color:"#8a4b00" }}>管理モード：チェックで選択（今表示中のタブのみ）</span>
                  <button onClick={()=>setShSel(new Set(shared.filter(p=>!!p.pdf_url===(shTab==="pdf")).map(x=>x.id)))} style={{ border:"1px solid #e6c9a3", background:"#fff", color:"#8a4b00", borderRadius:7, padding:"6px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>全選択</button>
                  <button onClick={()=>setShSel(new Set())} style={{ border:"1px solid #e6c9a3", background:"#fff", color:"#8a4b00", borderRadius:7, padding:"6px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>選択解除</button>
                  <div style={{ flex:1 }} />
                  {!shConfirm ? (
                    <button onClick={()=> shSel.size>0 && setShConfirm(true)} disabled={shSel.size===0}
                      style={{ border:"none", background: shSel.size?"#c62828":"#e6bcbc", color:"#fff", borderRadius:8, padding:"8px 13px", fontSize:13, fontWeight:800, cursor: shSel.size?"pointer":"default" }}>選択した{shSel.size>0?`${shSel.size}件`:""}を削除</button>
                  ) : (
                    <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ fontSize:12.5, fontWeight:800, color:"#8a4b00" }}>{shSel.size}件を削除？</span>
                      <button onClick={bulkDelShared} disabled={shBusy} style={{ border:"none", background:"#c62828", color:"#fff", borderRadius:8, padding:"8px 12px", fontSize:13, fontWeight:800, cursor:"pointer" }}>{shBusy?"削除中…":"実行"}</button>
                      <button onClick={()=>setShConfirm(false)} style={{ border:"none", background:"none", color:"var(--sub)", fontSize:12, fontWeight:700, cursor:"pointer" }}>キャンセル</button>
                    </span>
                  )}
                  <button onClick={()=>{ setShAdmin(false); setShSel(new Set()); setShConfirm(false); }} style={{ border:"1px solid #ffc98a", background:"#fff", color:"#8a4b00", borderRadius:8, padding:"8px 12px", fontSize:12.5, fontWeight:800, cursor:"pointer" }}>終了</button>
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* 作業リスト */}
      <div style={card}>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:12 }}>
          <div style={{ fontSize:14, fontWeight:900, color:"var(--ink)" }}>発注リスト <span style={{ color:ACCENT }}>{list.length}</span></div>
          {list.length>0 && <button onClick={()=>{ if(confirm("リストを空にしますか？")) setList([]); }} style={{ border:"none", background:"none", color:"var(--faint)", fontSize:12, fontWeight:700, cursor:"pointer" }}>すべて消去</button>}
        </div>
        {list.length===0 ? (
          <div style={{ textAlign:"center", color:"var(--faint)", padding:"26px 0", fontSize:13, lineHeight:1.7 }}>
            下の一覧からタップで追加、または「プリセット読み込み」で復元してください
          </div>
        ) : (
          <div ref={drag.containerRef} style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {list.map((it,i) => (
              <div key={it.bcode} data-row
                style={{ display:"flex", alignItems:"center", gap:10, background: drag.dragIdx===i?"#eef4ff":"#fafbfc", border:"1px solid #eef0f2", borderRadius:10, padding:"9px 11px", boxShadow: drag.dragIdx===i?"0 4px 14px rgba(0,0,0,0.12)":"none" }}>
                <button onPointerDown={drag.down(i)} onPointerMove={drag.move} onPointerUp={drag.up}
                  style={{ border:"none", background:"none", cursor:"grab", color:"#c4c4c8", fontSize:18, letterSpacing:"-3px", padding:"0 2px", touchAction:"none", lineHeight:1 }}>⋮⋮</button>
                <span style={{ width:18, textAlign:"center", fontSize:12, fontWeight:800, color:"#bfbfc4" }}>{i+1}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13.5, fontWeight:700, color:"#2c2c30", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{it.name || "（名称なし）"}</div>

function PromptCard({ it, accent, onDelete }) {
  const [copied, setCopied] = useState(false);
  const [open, setOpen] = useState(false);
  const longText = (it.prompt || "").length > 180;
  const copy = () => {
    const t = it.prompt || "";
    const done = () => { setCopied(true); setTimeout(()=>setCopied(false), 1500); };
    const fb = () => { const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); done(); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done).catch(fb);
    else fb();
  };
  return (
    <div style={{ background:"white", borderRadius:16, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:16, overflow:"hidden" }}>
      {it.image_url && <img src={it.image_url} alt="" onClick={()=>setOpen(o=>!o)} style={{ width:"100%", maxHeight: open?"none":340, objectFit:"cover", display:"block", cursor:"zoom-in" }} />}
      <div style={{ padding:"13px 15px 15px" }}>
        {it.title && <div style={{ fontSize:15, fontWeight:800, color:"var(--ink)", marginBottom:9 }}>{it.title}</div>}
        <div style={{ position:"relative", background:"var(--bg)", border:"1px solid var(--line)", borderRadius:10, padding:"11px 12px", fontSize:13, lineHeight:1.6, color:"var(--ink)", whiteSpace:"pre-wrap", wordBreak:"break-word", maxHeight: open?"none":150, overflow:"hidden" }}>
          {it.prompt}
          {!open && longText && <div style={{ position:"absolute", left:0, right:0, bottom:0, height:42, background:"linear-gradient(transparent,#f7f7fa)" }} />}
        </div>
        {longText && <button onClick={()=>setOpen(o=>!o)} style={{ border:"none", background:"none", color:"var(--sub)", fontSize:12, fontWeight:700, cursor:"pointer", marginTop:6, padding:0 }}>{open?"閉じる":"全文を見る"}</button>}
        <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:11 }}>

function PromptAddModal({ accent, onClose, onPosted }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [title, setTitle] = useState("");
  const [ptext, setPtext] = useState("");
  const [author, setAuthor] = useState("");
  const [busy, setBusy] = useState(false);
  const input = { width:"100%", boxSizing:"border-box", padding:"11px 13px", border:"1px solid #e2e2e6", borderRadius:10, fontSize:14, outline:"none", marginBottom:11 };
  const pick = (f) => { if(!f) return; setFile(f); setPreview(URL.createObjectURL(f)); };
  const submit = async () => {
    if (!ptext.trim()) { alert("プロンプトを入力してください"); return; }
    setBusy(true);
    try {
      let image_url = null;
      if (file) image_url = await api.upload(file);
      const row = await api.insertPrompt({ title:title.trim(), prompt:ptext.trim(), image_url, author:author.trim()||"匿名" });
      onPosted(row);
    } catch(e){ alert("保存に失敗しました"); setBusy(false); }
  };
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:1000, display:"flex", alignItems:"flex-end" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", width:"100%", borderRadius:"20px 20px 0 0", padding:"10px 18px calc(20px + env(safe-area-inset-bottom))", maxHeight:"90vh", overflowY:"auto", animation:"sheetUp 0.28s ease" }}>

        <label style={{ display:"block", border:"2px dashed #d8d8e0", borderRadius:12, padding: preview?0:"22px", textAlign:"center", cursor:"pointer", overflow:"hidden", marginBottom:13 }}>
          {preview ? <img src={preview} alt="" style={{ width:"100%", display:"block" }} /> : <div style={{ color:"var(--sub)", fontWeight:700 }}>画像を選ぶ（任意）</div>}
          <input type="file" accept="image/*" onChange={e=>pick(e.target.files[0])} style={{ display:"none" }} />
        </label>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="タイトル（例：刺身盛り 縦POP）" style={input} />
        <textarea value={ptext} onChange={e=>setPtext(e.target.value)} placeholder="使ったプロンプトをここに貼り付け" rows={6} style={{ ...input, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }} />
        <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="お名前（任意）" style={input} />

      </div>
    </div>
  );
}
