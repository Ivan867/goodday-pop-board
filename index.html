<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoodDay ポップ共有ボード</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f7; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const STORES = ["北部店","木次店","大田店","斐川店","医大通り店","平田店","バイヤー"];
    const CATEGORIES = ["鮮魚","刺身","惣菜","特売","旬の魚","その他"];
    const CFG_KEY = "goodday_cfg";

    const SUPABASE_URL = "https://pxstuticccflzqoqvfvx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4c3R1dGljY2NmbHpxb3F2ZnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODM0MzEsImV4cCI6MjA5MzQ1OTQzMX0.NQjAkqpa04d6Kx0DTYfaAgahtiHJ2iXbjVyspFc9cS0";

    function timeAgo(d) {
      const s = (Date.now() - new Date(d)) / 1000;
      if (s < 60) return "たった今";
      if (s < 3600) return `${Math.floor(s/60)}分前`;
      if (s < 86400) return `${Math.floor(s/3600)}時間前`;
      return `${Math.floor(s/86400)}日前`;
    }

    async function compressToBlob(file, maxW = 1200) {
      return new Promise(res => {
        const r = new FileReader();
        r.onload = e => {
          const img = new Image();
          img.onload = () => {
            const c = document.createElement("canvas");
            let w = img.width, h = img.height;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            c.width = w; c.height = h;
            c.getContext("2d").drawImage(img, 0, 0, w, h);
            c.toBlob(res, "image/jpeg", 0.82);
          };
          img.src = e.target.result;
        };
        r.readAsDataURL(file);
      });
    }

    /* ─── 設定画面 ─── */
    function SetupScreen({ onConnect }) {
      const [url, setUrl] = useState("");
      const [key, setKey] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      const connect = async () => {
        if (!url || !key) return;
        setBusy(true); setErr("");
        try {
          const sb = supabase.createClient(url.trim(), key.trim());
          const { error } = await sb.from("pops").select("id").limit(1);
          if (error) throw new Error(error.message);
          const cfg = { url: url.trim(), key: key.trim() };
          localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
          onConnect(cfg);
        } catch(e) {
          setErr("接続失敗: " + e.message);
        }
        setBusy(false);
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#fff8f0,#f0f4ff)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"white", borderRadius:24, maxWidth:480, width:"100%", boxShadow:"0 20px 80px rgba(0,0,0,0.13)", overflow:"hidden" }}>
            <div style={{ background:"linear-gradient(135deg,#e05c00,#ff8c42)", padding:"28px 32px" }}>
              <div style={{ fontSize:10, fontWeight:800, color:"rgba(255,255,255,0.7)", letterSpacing:3, marginBottom:4 }}>SETUP</div>
              <div style={{ fontSize:22, fontWeight:900, color:"white" }}>🐟 GoodDay ポップ共有</div>
              <div style={{ fontSize:13, color:"rgba(255,255,255,0.8)", marginTop:6 }}>Supabase接続設定</div>
            </div>
            <div style={{ padding:"28px 32px 32px" }}>
              <p style={{ fontSize:13, color:"#666", lineHeight:1.7, marginBottom:20 }}>
                SupabaseプロジェクトのSettings → APIから<br/>URLとAnon Keyを入力してください。
              </p>
              {[
                { label:"Project URL", val:url, set:setUrl, ph:"https://xxxxxxxx.supabase.co" },
                { label:"Anon Key", val:key, set:setKey, ph:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." },
              ].map(f => (
                <div key={f.label} style={{ marginBottom:16 }}>
                  <label style={{ fontSize:12, fontWeight:700, color:"#444", display:"block", marginBottom:6 }}>{f.label}</label>
                  <input value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.ph}
                    style={{ width:"100%", padding:"11px 14px", border:"2px solid #eee", borderRadius:10, fontSize:12, outline:"none", fontFamily:"monospace" }}
                    onFocus={e => e.target.style.borderColor="#e05c00"}
                    onBlur={e => e.target.style.borderColor="#eee"} />
                </div>
              ))}
              {err && <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:10, padding:"12px 14px", marginBottom:14, fontSize:12, color:"#cc0000" }}>⚠️ {err}</div>}
              <button onClick={connect} disabled={!url||!key||busy}
                style={{ width:"100%", padding:15, background:url&&key?"#e05c00":"#ddd", color:"white", border:"none", borderRadius:12, fontSize:15, fontWeight:900, cursor:url&&key?"pointer":"default" }}>
                {busy ? "接続確認中..." : "🚀 接続してスタート"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─── アップロードモーダル ─── */
    function UploadModal({ sb, currentStore, onClose, onDone }) {
      const [step, setStep] = useState("pick");
      const [preview, setPreview] = useState(null);
      const [blob, setBlob] = useState(null);
      const [form, setForm] = useState({ productName:"", category:"鮮魚", comment:"", author:"" });
      const [drag, setDrag] = useState(false);
      const [prog, setProg] = useState("");
      const ref = useRef();

      const pick = async file => {
        if (!file?.type.startsWith("image/")) return;
        const b = await compressToBlob(file);
        setBlob(b); setPreview(URL.createObjectURL(b)); setStep("form");
      };

      const submit = async () => {
        if (!form.productName || !form.author) { alert("商品名と担当者名を入力してください"); return; }
        setStep("up");
        try {
          setProg("画像をアップロード中...");
          const fn = `${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
          const { error: upErr } = await sb.storage.from("pop-images").upload(fn, blob, { contentType:"image/jpeg", upsert:true });
          if (upErr) throw new Error(upErr.message);
          const { data: { publicUrl } } = sb.storage.from("pop-images").getPublicUrl(fn);

          setProg("データを保存中...");
          const { data, error } = await sb.from("pops").insert({
            store_name: currentStore,
            product_name: form.productName,
            category: form.category,
            comment: form.comment,
            author: form.author,
            image_url: publicUrl
          }).select().single();
          if (error) throw new Error(error.message);
          onDone(data); onClose();
        } catch(e) {
          alert("エラー: " + e.message);
          setStep("form");
        }
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(10,10,20,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
          <div style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:480, maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 80px rgba(0,0,0,0.3)" }}>
            <div style={{ padding:"22px 24px 0", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:11, fontWeight:800, color:"#e05c00", letterSpacing:2 }}>📌 {currentStore}</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#1a1a1a" }}>ポップをアップロード</div>
              </div>
              <button onClick={onClose} style={{ background:"#f0f0f0", border:"none", borderRadius:10, width:36, height:36, fontSize:18, cursor:"pointer" }}>×</button>
            </div>
            <div style={{ padding:"20px 24px 28px" }}>
              {step === "pick" && (
                <>
                  <div onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
                    onDrop={e=>{e.preventDefault();setDrag(false);pick(e.dataTransfer.files[0])}}
                    onClick={()=>ref.current.click()}
                    style={{ border:`3px dashed ${drag?"#e05c00":"#ddd"}`, borderRadius:16, padding:"52px 24px", textAlign:"center", cursor:"pointer", background:drag?"#fff8f0":"#fafafa" }}>
                    <div style={{ fontSize:52, marginBottom:14 }}>📷</div>
                    <div style={{ fontWeight:800, fontSize:16, color:"#1a1a1a", marginBottom:6 }}>写真を選択またはドラッグ</div>
                    <div style={{ fontSize:13, color:"#aaa", marginBottom:18 }}>作成したポップの写真をアップロードしてください</div>
                    <div style={{ display:"inline-block", background:"#e05c00", color:"white", padding:"11px 28px", borderRadius:12, fontWeight:800, fontSize:14 }}>ファイルを選択</div>
                  </div>
                  <input ref={ref} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>pick(e.target.files[0])} />
                </>
              )}
              {step === "form" && (
                <>
                  <div style={{ borderRadius:12, overflow:"hidden", marginBottom:18, position:"relative", background:"#111" }}>
                    <img src={preview} style={{ width:"100%", maxHeight:240, objectFit:"contain", display:"block" }} />
                    <button onClick={()=>{setPreview(null);setBlob(null);setStep("pick")}} style={{ position:"absolute", top:10, right:10, background:"rgba(0,0,0,0.65)", color:"white", border:"none", borderRadius:8, padding:"4px 12px", fontSize:12, cursor:"pointer", fontWeight:700 }}>変更</button>
                  </div>
                  {[
                    { label:"商品名 *", key:"productName", ph:"例：天然鯛" },
                    { label:"担当者名 *", key:"author", ph:"例：田中" },
                    { label:"コメント（任意）", key:"comment", ph:"例：本日特売！脂のりバツグンです" },
                  ].map(({label,key,ph}) => (
                    <div key={key} style={{ marginBottom:14 }}>
                      <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:6 }}>{label}</label>
                      <input value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} placeholder={ph}
                        style={{ width:"100%", padding:"10px 14px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }}
                        onFocus={e=>e.target.style.borderColor="#e05c00"} onBlur={e=>e.target.style.borderColor="#eee"} />
                    </div>
                  ))}
                  <div style={{ marginBottom:20 }}>
                    <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:8 }}>カテゴリ</label>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {CATEGORIES.map(c => (
                        <button key={c} onClick={()=>setForm(p=>({...p,category:c}))}
                          style={{ padding:"6px 14px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, borderColor:form.category===c?"#e05c00":"#eee", background:form.category===c?"#e05c00":"white", color:form.category===c?"white":"#666" }}>{c}</button>
                      ))}
                    </div>
                  </div>
                  <button onClick={submit} style={{ width:"100%", padding:15, background:"#e05c00", color:"white", border:"none", borderRadius:12, fontSize:16, fontWeight:900, cursor:"pointer" }}>
                    🚀 全店舗に共有する
                  </button>
                </>
              )}
              {step === "up" && (
                <div style={{ textAlign:"center", padding:"56px 0" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>⏳</div>
                  <div style={{ fontWeight:700, color:"#888" }}>{prog}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ─── 詳細モーダル ─── */
    function DetailModal({ pop, onClose, onDelete, currentStore }) {
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(5,5,15,0.82)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }} onClick={onClose}>
          <div style={{ background:"#18181f", borderRadius:20, width:"100%", maxWidth:500, overflow:"hidden", boxShadow:"0 32px 100px rgba(0,0,0,0.6)" }} onClick={e=>e.stopPropagation()}>
            <div style={{ position:"relative", background:"#0f0f18" }}>
              {pop.image_url
                ? <img src={pop.image_url} style={{ width:"100%", maxHeight:420, objectFit:"contain", display:"block" }} />
                : <div style={{ height:220, display:"flex", alignItems:"center", justifyContent:"center", color:"#444", fontSize:40 }}>🖼</div>}
              <button onClick={onClose} style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.7)", color:"white", border:"none", borderRadius:10, width:36, height:36, fontSize:20, cursor:"pointer" }}>×</button>
              <div style={{ position:"absolute", bottom:12, left:12, background:"#e05c00", color:"white", borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:800 }}>{pop.category}</div>
            </div>
            <div style={{ padding:"18px 22px 24px" }}>
              <div style={{ fontSize:22, fontWeight:900, color:"white", marginBottom:6 }}>{pop.product_name}</div>
              {pop.comment && <div style={{ fontSize:13, color:"#aaa", marginBottom:14, lineHeight:1.6 }}>{pop.comment}</div>}
              <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
                <span style={{ background:"#252540", color:"#8899ff", padding:"4px 12px", borderRadius:8, fontSize:12, fontWeight:800 }}>{pop.store_name}</span>
                <span style={{ color:"#666", fontSize:12 }}>{pop.author} · {timeAgo(pop.created_at)}</span>
                {pop.store_name === currentStore && (
                  <button onClick={()=>onDelete(pop.id)} style={{ marginLeft:"auto", background:"#3a1010", color:"#ff7070", border:"none", borderRadius:8, padding:"5px 14px", fontSize:12, cursor:"pointer", fontWeight:800 }}>削除</button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── メイン ─── */
    function App() {
      const [cfg, setCfg] = useState(null);
      const [sb, setSb] = useState(null);
      const [currentStore, setCurrentStore] = useState(STORES[0]);
      const [pops, setPops] = useState([]);
      const [showUp, setShowUp] = useState(false);
      const [sel, setSel] = useState(null);
      const [fStore, setFStore] = useState("");
      const [fCat, setFCat] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);

      useEffect(() => {
        const c = { url: SUPABASE_URL, key: SUPABASE_KEY };
        setCfg(c);
        setSb(supabase.createClient(c.url, c.key));
      }, []);

      const onConnect = c => { setCfg(c); setSb(supabase.createClient(c.url, c.key)); };

      const load = useCallback(async () => {
        if (!sb) return;
        setLoading(true); setErr(null);
        try {
          let q = sb.from("pops").select("*").order("created_at", { ascending: false });
          if (fStore) q = q.eq("store_name", fStore);
          if (fCat)   q = q.eq("category", fCat);
          const { data, error } = await q;
          if (error) throw new Error(error.message);
          setPops(data || []);
        } catch(e) { setErr(e.message); }
        setLoading(false);
      }, [sb, fStore, fCat]);

      useEffect(() => { if (sb) load(); }, [load]);

      const onDone = p => setPops(prev => [p, ...prev]);

      const onDelete = async id => {
        if (!confirm("このポップを削除しますか？")) return;
        const { error } = await sb.from("pops").delete().eq("id", id);
        if (error) { alert("削除失敗: " + error.message); return; }
        setPops(p => p.filter(x => x.id !== id)); setSel(null);
      };

      const disconnect = () => { localStorage.removeItem(CFG_KEY); setCfg(null); setSb(null); setPops([]); };

      if (!cfg) return <SetupScreen onConnect={onConnect} />;

      const counts = STORES.reduce((a,s)=>({...a,[s]:pops.filter(p=>p.store_name===s).length}),{});

      return (
        <div style={{ minHeight:"100vh", background:"#f5f5f7" }}>
          {/* ヘッダー */}
          <div style={{ background:"white", borderBottom:"1px solid #e8e8e8", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 10px rgba(0,0,0,0.06)" }}>
            <div style={{ maxWidth:1080, margin:"0 auto", padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, flexWrap:"wrap" }}>
              <div>
                <div style={{ fontSize:10, fontWeight:800, color:"#e05c00", letterSpacing:3, marginBottom:1 }}>GoodDay 鮮魚部</div>
                <div style={{ fontSize:19, fontWeight:900, color:"#111" }}>🐟 ポップ共有ボード</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <select value={currentStore} onChange={e=>setCurrentStore(e.target.value)}
                  style={{ padding:"8px 12px", border:"2px solid #e05c00", borderRadius:10, fontSize:13, fontWeight:700, color:"#e05c00", background:"#fff9f5", cursor:"pointer", outline:"none" }}>
                  {STORES.map(s=><option key={s}>{s}</option>)}
                </select>
                <button onClick={()=>setShowUp(true)} style={{ background:"#e05c00", color:"white", border:"none", borderRadius:10, padding:"9px 18px", fontSize:13, fontWeight:900, cursor:"pointer" }}>＋ アップロード</button>
                <button onClick={load} style={{ background:"#f5f5f5", color:"#666", border:"none", borderRadius:10, padding:"9px 12px", fontSize:15, cursor:"pointer" }}>↺</button>
                <button onClick={disconnect} title="設定リセット" style={{ background:"#f5f5f5", color:"#999", border:"none", borderRadius:10, padding:"9px 12px", fontSize:14, cursor:"pointer" }}>⚙</button>
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1080, margin:"0 auto", padding:"20px 16px" }}>
            {/* 店舗タブ */}
            <div style={{ display:"flex", gap:10, marginBottom:20, overflowX:"auto", paddingBottom:4 }}>
              {[{lbl:"全店舗",cnt:pops.length,val:""},...STORES.map(s=>({lbl:s,cnt:counts[s]||0,val:s}))].map(({lbl,cnt,val})=>(
                <div key={lbl} onClick={()=>setFStore(val)}
                  style={{ background:fStore===val?"#e05c00":"white", borderRadius:12, padding:"10px 16px", minWidth:70, textAlign:"center", cursor:"pointer", border:"2px solid", borderColor:fStore===val?"#e05c00":"#e8e8e8", flexShrink:0 }}>
                  <div style={{ fontSize:20, fontWeight:900, color:fStore===val?"white":"#111" }}>{cnt}</div>
                  <div style={{ fontSize:10, fontWeight:700, color:fStore===val?"rgba(255,255,255,0.8)":"#aaa", whiteSpace:"nowrap" }}>{lbl}</div>
                </div>
              ))}
            </div>

            {/* カテゴリ */}
            <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
              {["",...CATEGORIES].map(c=>(
                <button key={c||"all"} onClick={()=>setFCat(c)}
                  style={{ padding:"6px 14px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, borderColor:fCat===c?"#111":"#ddd", background:fCat===c?"#111":"white", color:fCat===c?"white":"#666" }}>
                  {c||"すべて"}
                </button>
              ))}
            </div>

            {err && (
              <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:12, padding:"14px 18px", marginBottom:20, color:"#cc0000", fontSize:13 }}>
                ⚠️ {err} <button onClick={load} style={{ marginLeft:12, background:"#cc0000", color:"white", border:"none", borderRadius:6, padding:"4px 12px", fontSize:12, cursor:"pointer" }}>再試行</button>
              </div>
            )}

            {loading ? (
              <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
                <div style={{ fontSize:36, marginBottom:12 }}>🐠</div>
                <div style={{ fontWeight:600 }}>読み込み中...</div>
              </div>
            ) : pops.length === 0 ? (
              <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
                <div style={{ fontSize:56, marginBottom:16 }}>📌</div>
                <div style={{ fontWeight:800, fontSize:16, marginBottom:8, color:"#888" }}>ポップがまだありません</div>
                <div style={{ fontSize:13 }}>「アップロード」ボタンから最初のポップを共有しましょう！</div>
              </div>
            ) : (
              <div style={{ columns:"200px 4", gap:14 }}>
                {pops.map((pop,i)=>(
                  <div key={pop.id}
                    style={{ breakInside:"avoid", marginBottom:14, borderRadius:14, overflow:"hidden", background:"white", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", cursor:"pointer", animation:`fadeUp 0.3s ease ${Math.min(i,10)*0.04}s both` }}
                    onClick={()=>setSel(pop)}
                    onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.14)"}}
                    onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
                    <div style={{ background:"#efefef", minHeight:120, position:"relative" }}>
                      {pop.image_url
                        ? <img src={pop.image_url} alt={pop.product_name} style={{ width:"100%", display:"block", objectFit:"cover" }} loading="lazy" />
                        : <div style={{ height:120, display:"flex", alignItems:"center", justifyContent:"center", color:"#ccc", fontSize:28 }}>🖼</div>}
                      <div style={{ position:"absolute", top:8, left:8, background:"#e05c00", color:"white", fontSize:9, fontWeight:800, padding:"2px 8px", borderRadius:6 }}>{pop.category}</div>
                    </div>
                    <div style={{ padding:"10px 12px 12px" }}>
                      <div style={{ fontWeight:800, fontSize:13, color:"#111", marginBottom:3 }}>{pop.product_name}</div>
                      {pop.comment && <div style={{ fontSize:11, color:"#888", lineHeight:1.45, marginBottom:7, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{pop.comment}</div>}
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ background:"#f0f2ff", color:"#4055d4", fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:6 }}>{pop.store_name}</span>
                        <span style={{ fontSize:10, color:"#ccc" }}>{timeAgo(pop.created_at)}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {showUp && <UploadModal sb={sb} currentStore={currentStore} onClose={()=>setShowUp(false)} onDone={onDone} />}
          {sel && <DetailModal pop={sel} onClose={()=>setSel(null)} onDelete={onDelete} currentStore={currentStore} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
