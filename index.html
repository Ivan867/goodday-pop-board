    catch (e) { /* クリップボード不可環境は無視 */ }
  };

  // 売価計算（利益率＝売価に対する割合＝値入率）
  const C = parseFloat(cost), M = parseFloat(margin);
  const sellValid = !isNaN(C) && C > 0 && !isNaN(M) && M >= 0 && M < 100;
  const sell = sellValid ? Math.ceil(C / (1 - M / 100)) : null;
  const profit = sellValid ? sell - Math.round(C) : null;
  const sellTax = sellValid ? Math.ceil(sell * 1.08) : null;

  const card = { background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" };
  const lbl = { fontSize:12, color:"var(--sub)", marginBottom:6 };
  const inp = { width:"100%", boxSizing:"border-box", border:"1px solid var(--line)", borderRadius:10, padding:"12px", fontSize:18, fontWeight:800, textAlign:"center", outline:"none" };
  const cell = (t, v, c) => (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:11, color:"var(--sub)" }}>{t}</div>
      <div style={{ fontSize:22, fontWeight:900, color:c }}>{v}</div>
    </div>
  );

  return (
    <div className="min-vh" style={{ background:"var(--bg)", paddingBottom:100 }}>
      <div style={{ background:"linear-gradient(135deg,#1a6b3a 0%,#2d9e5f 100%)", padding:"16px" }}>
        <div style={{ maxWidth:560, margin:"0 auto" }}>
          <div style={{ color:"#fff", fontSize:18, fontWeight:900 }}>便利機能</div>
          <div style={{ color:"rgba(255,255,255,0.85)", fontSize:12, marginTop:2 }}>売場の計算をぜんぶここで。入力するだけでパッと答え</div>
          <div style={{ display:"flex", gap:6, marginTop:12, overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:2 }}>
            {[["souba","相場計算"],["arari","粗利"],["budomari","歩留まり"],["nebiki","値引き"],["gram","グラム"],["shio","立て塩"]].map(([k,l]) => (
              <button key={k} onClick={() => setSub(k)}
                style={{ flexShrink:0, border:"none", borderRadius:16, padding:"7px 14px", fontSize:13, fontWeight:800, cursor:"pointer",
                  background: sub===k ? "#fff" : "rgba(255,255,255,0.22)", color: sub===k ? "#1a6b3a" : "#fff" }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:560, margin:"0 auto", padding:"16px" }}>

        {sub === "souba" && (<>
        {/* 先週比 */}
        <div style={card}>
          <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>先週とくらべて何割 相場安？</div>
          <div style={{ display:"flex", gap:10 }}>
            <div style={{ flex:1 }}>
              <div style={lbl}>先週の売価（100g 円）</div>
              <input value={last} onChange={e => setLast(e.target.value)} inputMode="decimal" style={inp} />
            </div>
            <div style={{ alignSelf:"center", paddingTop:18, fontSize:20, color:"var(--faint)" }}>→</div>
            <div style={{ flex:1 }}>
              <div style={lbl}>今週の売価（100g 円）</div>
              <input value={now} onChange={e => setNow(e.target.value)} inputMode="decimal" style={inp} />
            </div>
          </div>

          {valid && (
            <div style={{ marginTop:14, background: same ? "#f3f4f6" : cheaper ? "#eafaf0" : "#fff4ed", border:`1px solid ${same ? "#e5e7eb" : cheaper ? "#bde9cd" : "#ffd9bf"}`, borderRadius:12, padding:"14px 16px" }}>
              {!same && (
                <div style={{ display:"flex", justifyContent:"space-around", marginBottom:12 }}>
                  {cell("差額", `${Math.round(Math.abs(diff))}円`, cheaper ? "#1a6b3a" : "var(--primary)")}
                  {cell(cheaper ? "値引率" : "値上率", `${Math.abs(pct).toFixed(1)}%`, cheaper ? "#1a6b3a" : "var(--primary)")}
                  {cell("割", wari || "—", cheaper ? "#1a6b3a" : "var(--primary)")}
                </div>
              )}
              <div style={{ fontSize:16, fontWeight:900, color:"var(--ink)", textAlign:"center", lineHeight:1.5 }}>{phrase}</div>
              {!same && (
                <>
                <button onClick={copyPhrase} style={{ marginTop:12, width:"100%", border:"none", background: copied ? "#1a6b3a" : "#2d9e5f", color:"#fff", borderRadius:10, padding:"10px", fontSize:14, fontWeight:800, cursor:"pointer" }}>
                  {copied ? "✓ コピーしました" : "POP用の文言をコピー"}
                </button>
                {cheaper && onCreatePop && (
                  <button onClick={()=>onCreatePop({ appeal: phrase })} style={{ marginTop:8, width:"100%", border:"1px solid #2d9e5f", background:"#fff", color:"#1a6b3a", borderRadius:10, padding:"10px", fontSize:14, fontWeight:800, cursor:"pointer" }}>
                    このおトク文でPOPを作成 →
                  </button>
                )}
                </>
              )}
            </div>
          )}
        </div>

        {/* 売価計算 */}
        <div style={card}>
          <div style={{ fontSize:15, fontWeight:900, color:"#8B6914", marginBottom:4 }}>原価＋利益率 → 売価</div>
          <div style={{ fontSize:11, color:"var(--sub)", marginBottom:14 }}>売価 = 原価 ÷（1 − 利益率）。利益率は売価に対する割合（値入率）。</div>
          <div style={{ display:"flex", gap:10 }}>
            <div style={{ flex:1 }}>
              <div style={lbl}>原価（100g 円）</div>
              <input value={cost} onChange={e => setCost(e.target.value)} inputMode="decimal" placeholder="例：120" style={inp} />
            </div>
            <div style={{ flex:1 }}>
              <div style={lbl}>利益率（%）</div>
              <input value={margin} onChange={e => setMargin(e.target.value)} inputMode="decimal" style={inp} />
            </div>
          </div>
          {sellValid && (
            <>
            <div style={{ marginTop:14, background:"#fffaf0", border:"1px solid #f0e0c0", borderRadius:12, padding:"14px 16px", display:"flex", justifyContent:"space-around" }}>
              {cell("売価（税抜）", `${sell}円`, "#8B6914")}
              {cell("税込（8%）", `${sellTax}円`, "#b8860b")}
              {cell("利益額", `${profit}円`, "#1a6b3a")}
            </div>
            {onCreatePop && (
              <button onClick={()=>onCreatePop({ price: `${sell}円（税込${sellTax}円）` })} style={{ marginTop:10, width:"100%", border:"1px solid #b8860b", background:"#fff", color:"#8B6914", borderRadius:10, padding:"10px", fontSize:14, fontWeight:800, cursor:"pointer" }}>
                この売価でPOPを作成 →
              </button>
            )}
            </>
          )}
        </div>
        </>)}

        {sub === "arari" && (() => {
          const c = parseFloat(aCost), v = parseFloat(aSell);
          const ok = !isNaN(c) && !isNaN(v) && c > 0 && v > 0;
          const rate = ok ? (v - c) / v * 100 : null;
          const gc = parseFloat(gCost), gr = parseFloat(gRate);
          const gok = !isNaN(gc) && gc > 0 && !isNaN(gr) && gr >= 0 && gr < 100;
          const gsell = gok ? Math.ceil(gc / (1 - gr / 100)) : null;
          return (<>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>粗利率をチェック</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>原価（円）</div><input value={aCost} onChange={e=>setACost(e.target.value)} inputMode="decimal" style={inp} placeholder="120" /></div>
                <div style={{ flex:1 }}><div style={lbl}>売価（円）</div><input value={aSell} onChange={e=>setASell(e.target.value)} inputMode="decimal" style={inp} placeholder="198" /></div>
              </div>
              {ok && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("粗利率", `${rate.toFixed(1)}%`, rate >= 30 ? "#1a6b3a" : "var(--primary)")}
                  {cell("値入額", `${Math.round(v - c)}円`, "var(--ink)")}
                  {cell("原価率", `${(c / v * 100).toFixed(1)}%`, "var(--sub)")}
                </div>
              )}
            </div>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>目標の粗利率から売価を逆算</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>原価（円）</div><input value={gCost} onChange={e=>setGCost(e.target.value)} inputMode="decimal" style={inp} placeholder="120" /></div>
                <div style={{ flex:1 }}><div style={lbl}>目標粗利率（%）</div><input value={gRate} onChange={e=>setGRate(e.target.value)} inputMode="decimal" style={inp} /></div>
              </div>
              {gok && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("売価（税抜）", `${gsell}円`, "#1a6b3a")}
                  {cell("税込（8%）", `${Math.ceil(gsell * 1.08)}円`, "var(--sub)")}
                </div>
              )}
            </div>
          </>);
        })()}

        {sub === "budomari" && (() => {
          const u = parseFloat(yUnit), r = parseFloat(yRate), m = parseFloat(yMargin);
          const ok = !isNaN(u) && u > 0 && !isNaN(r) && r > 0 && r <= 100;
          const real = ok ? u / (r / 100) : null;
          const mok = ok && !isNaN(m) && m >= 0 && m < 100;
          const rec = mok ? real / (1 - m / 100) : null;
          return (
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:4 }}>歩留まりから実質原価を計算</div>
              <div style={{ fontSize:11.5, color:"var(--sub)", marginBottom:14 }}>丸魚を捌いたあとの「使える部分」あたりの原価が出ます（目安：ブリのフィレ 約55%、三枚おろし 約45〜50%）</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>仕入単価（円/kg）</div><input value={yUnit} onChange={e=>setYUnit(e.target.value)} inputMode="decimal" style={inp} placeholder="800" /></div>
                <div style={{ flex:1 }}><div style={lbl}>歩留まり（%）</div><input value={yRate} onChange={e=>setYRate(e.target.value)} inputMode="decimal" style={inp} /></div>
              </div>
              {ok && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("実質原価", `${Math.round(real)}円/kg`, "var(--ink)")}
                  {cell("100gあたり", `${Math.round(real / 10)}円`, "var(--sub)")}
                </div>
              )}
              <div style={{ height:1, background:"var(--line)", margin:"16px 0" }} />
              <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
                <div style={{ flex:1 }}><div style={lbl}>目標粗利率（%）</div><input value={yMargin} onChange={e=>setYMargin(e.target.value)} inputMode="decimal" style={inp} /></div>
                <div style={{ flex:2 }}>
                  {rec != null && (
                    <div style={{ display:"flex", justifyContent:"space-around" }}>
                      {cell("推奨売価", `${Math.ceil(rec / 10)}円/100g`, "#1a6b3a")}
                      {cell("kgあたり", `${Math.ceil(rec)}円`, "var(--sub)")}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        {sub === "nebiki" && (() => {
          const p1 = parseFloat(nPrice), r1 = parseFloat(nPct);
          const ok1 = !isNaN(p1) && p1 > 0 && !isNaN(r1) && r1 >= 0 && r1 <= 100;
          const after1 = ok1 ? Math.round(p1 * (1 - r1 / 100)) : null;
          const p2 = parseFloat(n2Price), y2 = parseFloat(n2Yen);
          const ok2 = !isNaN(p2) && p2 > 0 && !isNaN(y2) && y2 >= 0;
          return (<>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>◯%引きの値段は？</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>元の売価（円）</div><input value={nPrice} onChange={e=>setNPrice(e.target.value)} inputMode="decimal" style={inp} placeholder="298" /></div>
                <div style={{ flex:1 }}><div style={lbl}>割引率（%）</div><input value={nPct} onChange={e=>setNPct(e.target.value)} inputMode="decimal" style={inp} /></div>
              </div>
              {ok1 && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("値引き後", `${after1}円`, "var(--primary)")}
                  {cell("値引き額", `${Math.round(p1 - after1)}円`, "var(--sub)")}
                </div>
              )}
            </div>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>◯円引きは何%相当？</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>元の売価（円）</div><input value={n2Price} onChange={e=>setN2Price(e.target.value)} inputMode="decimal" style={inp} placeholder="398" /></div>
                <div style={{ flex:1 }}><div style={lbl}>値引き額（円）</div><input value={n2Yen} onChange={e=>setN2Yen(e.target.value)} inputMode="decimal" style={inp} /></div>
              </div>
              {ok2 && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("割引率相当", `${(y2 / p2 * 100).toFixed(0)}%引き`, "var(--primary)")}
                  {cell("値引き後", `${Math.round(p2 - y2)}円`, "var(--sub)")}
                </div>
              )}
            </div>
          </>);
        })()}

        {sub === "gram" && (() => {
          const a = parseFloat(g100), b = parseFloat(gWt);
          const ok1 = !isNaN(a) && a > 0 && !isNaN(b) && b > 0;
          const c2 = parseFloat(g2Sell), d2 = parseFloat(g2Wt);
          const ok2 = !isNaN(c2) && c2 > 0 && !isNaN(d2) && d2 > 0;
          return (<>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>100g単価 → パック売価</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>100g単価（円）</div><input value={g100} onChange={e=>setG100(e.target.value)} inputMode="decimal" style={inp} placeholder="298" /></div>
                <div style={{ flex:1 }}><div style={lbl}>内容量（g）</div><input value={gWt} onChange={e=>setGWt(e.target.value)} inputMode="decimal" style={inp} placeholder="240" /></div>
              </div>
              {ok1 && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("売価", `${Math.ceil(a * b / 100)}円`, "#1a6b3a")}
                  {cell("税込（8%）", `${Math.ceil(a * b / 100 * 1.08)}円`, "var(--sub)")}
                </div>
              )}
            </div>
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:14 }}>パック売価 → 100g単価</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>売価（円）</div><input value={g2Sell} onChange={e=>setG2Sell(e.target.value)} inputMode="decimal" style={inp} placeholder="698" /></div>
                <div style={{ flex:1 }}><div style={lbl}>内容量（g）</div><input value={g2Wt} onChange={e=>setG2Wt(e.target.value)} inputMode="decimal" style={inp} placeholder="240" /></div>
              </div>
              {ok2 && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("100gあたり", `${Math.round(c2 / d2 * 100)}円`, "#1a6b3a")}
                </div>
              )}
            </div>
          </>);
        })()}

        {sub === "shio" && (() => {
          const w = parseFloat(sWater), pc = parseFloat(sPct);
          const ok = !isNaN(w) && w > 0 && !isNaN(pc) && pc > 0 && pc <= 30;
          const salt = ok ? w * pc / 100 : null;
          return (
            <div style={card}>
              <div style={{ fontSize:15, fontWeight:900, color:"#1a6b3a", marginBottom:4 }}>立て塩（塩水）の塩の量</div>
              <div style={{ fontSize:11.5, color:"var(--sub)", marginBottom:14 }}>目安：立て塩は3%前後（海水と同じくらい）。魚の下処理・臭み抜きに</div>
              <div style={{ display:"flex", gap:10 }}>
                <div style={{ flex:1 }}><div style={lbl}>水の量（ml）</div><input value={sWater} onChange={e=>setSWater(e.target.value)} inputMode="decimal" style={inp} /></div>
                <div style={{ flex:1 }}><div style={lbl}>濃度（%）</div><input value={sPct} onChange={e=>setSPct(e.target.value)} inputMode="decimal" style={inp} /></div>
              </div>
              {ok && (
                <div style={{ display:"flex", justifyContent:"space-around", marginTop:16 }}>
                  {cell("塩の量", `${salt.toFixed(salt < 10 ? 1 : 0)}g`, "#1a6b3a")}
                  {cell("大さじ換算", `約${(salt / 18).toFixed(1)}杯`, "var(--sub)")}
                </div>
              )}
            </div>
          );
        })()}

        <div style={{ fontSize:11, color:"var(--faint)", textAlign:"center", marginTop:4 }}>※ プロトタイプです。計算方法・表示・項目はご要望に合わせて調整できます。</div>
      </div>
    </div>
  );
}


// ===== 管理画面：パスワードで解錠 → 依頼一覧／アーカイブ管理 =====
function AdminTab({ onNoticeChange }) {
  const [unlocked, setUnlocked] = useState(false);
  const [gpw, setGpw] = useState("");
  const [gErr, setGErr] = useState("");
  const [gChecking, setGChecking] = useState(false);
  const [section, setSection] = useState("req"); // req | archive

  // アーカイブ管理用
  const [pops, setPops] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("active"); // active | archived
  const [sel, setSel] = useState({});
  const [applying, setApplying] = useState(false);
  const [gFilter, setGFilter] = useState("未分類"); // ジャンル選別の表示フィルタ

  // 依頼一覧用
  const [reqs, setReqs] = useState([]);
  const [reqLoading, setReqLoading] = useState(true);

  // ピン留め・制作メモ用
  const [pinnedPopId, setPinnedPopId] = useState(null);
  const [memoText, setMemoText] = useState("");
  const [memoLoading, setMemoLoading] = useState(false);
  const [memoDirty, setMemoDirty] = useState(false);
  const [pinnedBusy, setPinnedBusy] = useState(false);

  const setPinned = async (popId) => {
    setPinnedBusy(true);
    try {
      await api.setPinned(popId);
      setPinnedPopId(popId);
      await load();
    } catch(e) {
      alert("ピン留め更新に失敗しました");
      console.error(e);
    } finally {
      setPinnedBusy(false);
    }
  };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await api.listAll(); setPops(d);
      // ピン留めPOPを取得
      const pp = d.find(x => x.is_pinned);
      setPinnedPopId(pp ? pp.id : null);
      // 制作メモを取得
      try {
        const memo = await api.getMemo();
        setMemoText(memo?.text || "");
      } catch(e) {}
    }
    catch (e) { console.error(e); } finally { setLoading(false); }
  }, []);
  const loadReqs = useCallback(async () => {
    setReqLoading(true);
    try { const d = await api.listRequests(); setReqs(d); }
    catch (e) { console.error(e); } finally { setReqLoading(false); }
  }, []);
  useEffect(() => { if (unlocked) { load(); loadReqs(); } }, [unlocked, load, loadReqs]);

  const tryUnlock = async () => {
    if (gChecking) return;
    setGChecking(true); setGErr("");
    try {
      const ok = await api.verifyPassword("admin", gpw);
      if (ok) { setUnlocked(true); setGErr(""); }
      else { setGErr("パスワードが違います"); }
    } catch (e) {
      setGErr("通信に失敗しました。電波を確認してください");
    } finally {
      setGChecking(false);
    }
  };

  if (!unlocked) {
    return (
      <div style={{ maxWidth:420, margin:"0 auto", padding:"60px 20px", animation:"fadeUp .3s ease" }}>
        <div style={{ background:"#fff", borderRadius:16, boxShadow:"0 2px 14px rgba(0,0,0,0.07)", padding:24, textAlign:"center" }}>
          
          <div style={{ fontSize:17, fontWeight:900, color:"var(--ink)", marginBottom:6 }}>管理画面</div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:18 }}>パスワードを入力してください</div>
          <input type="password" value={gpw} autoFocus inputMode="numeric"
            onChange={e => { setGpw(e.target.value); setGErr(""); }}
            onKeyDown={e => { if (e.key === "Enter") tryUnlock(); }}
            placeholder="パスワード" disabled={gChecking}
            style={{ width:"100%", boxSizing:"border-box", border:"2px solid var(--line)", borderRadius:10, padding:"12px", fontSize:16, textAlign:"center", outline:"none", marginBottom: gErr ? 8 : 16 }} />
          {gErr && <div style={{ fontSize:13, color:"var(--primary)", fontWeight:700, marginBottom:12 }}>{gErr}</div>}
          <button onClick={tryUnlock} disabled={gChecking}
            style={{ width:"100%", border:"none", background: gChecking ? "#f0b48a" : "var(--primary)", color:"#fff", borderRadius:10, padding:"12px", fontSize:15, fontWeight:800, cursor: gChecking ? "default" : "pointer" }}>{gChecking ? "確認中…" : "解錠する"}</button>
        </div>
      </div>
    );
  }

  // ---- アーカイブ管理 ----
  const list = pops.filter(p => view === "archived" ? p.archived : !p.archived);
  const selIds = Object.keys(sel).filter(k => sel[k]);
  const toArchive = view === "active";
  const aCount = pops.filter(p => !p.archived).length;
  const arCount = pops.filter(p => p.archived).length;
  const toggle = (id) => setSel(s => ({ ...s, [id]: !s[id] }));
  const switchView = (v) => { setView(v); setSel({}); };
  const apply = async () => {
    if (!selIds.length) return;
    setApplying(true);
    try { await api.setArchivedMany(selIds, toArchive); setSel({}); await load(); }
    catch (e) { alert("更新に失敗しました（archived列の追加SQLは実行済みですか？）"); }
    finally { setApplying(false); }
  };
  const seg = (v, label, n) => (
    <button onClick={() => switchView(v)}
      style={{ flex:1, border:"none", padding:"10px", fontSize:14, fontWeight:800,
        background: view===v ? "var(--primary)" : "#fff", color: view===v ? "#fff" : "#888", cursor:"pointer" }}>
      {label}（{n}）
    </button>
  );

  // ---- ジャンル選別 ----
  const activePops = pops.filter(p => !p.archived);
  const genreCount = (g) => g === "未分類" ? activePops.filter(p => !p.genre).length : activePops.filter(p => p.genre === g).length;
  const genreList = activePops.filter(p => gFilter === "未分類" ? !p.genre : p.genre === gFilter);
  const assignGenre = async (p, genre) => {
    const next = p.genre === genre ? null : genre; // 同じものを再タップで未分類に戻す
    setPops(ps => ps.map(x => x.id === p.id ? { ...x, genre: next } : x)); // 先に画面反映
    try { await api.setGenre(p.id, next); }
    catch (e) {
      setPops(ps => ps.map(x => x.id === p.id ? { ...x, genre: p.genre } : x)); // 失敗したら戻す
      alert("更新に失敗しました（genre列の追加SQLは実行済みですか？）");
    }
  };

  // ---- 依頼 ----
  const openReqs = reqs.filter(r => r.status !== "対応済み").length;
  const setReqStatus = async (r, status) => {
    try { await api.updateRequest(r.id, { status }); setReqs(rs => rs.map(x => x.id === r.id ? { ...x, status } : x)); }
    catch (e) { alert("更新に失敗しました"); }
  };
  const delReq = async (r) => {
    if (!confirm("この依頼を削除しますか？")) return;
    try { await api.delRequest(r.id); setReqs(rs => rs.filter(x => x.id !== r.id)); }
    catch (e) { alert("削除に失敗しました"); }
  };
  const fmtDate = (s) => { try { const d = new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; } catch(e){ return ""; } };

  const mainSeg = (v, label) => (
    <button onClick={() => setSection(v)}
      style={{ flex:1, border:"none", padding:"11px", fontSize:14, fontWeight:800,
        background: section===v ? "#222" : "#fff", color: section===v ? "#fff" : "#888", cursor:"pointer" }}>{label}</button>
  );

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:16, paddingBottom:140, animation:"fadeUp .3s ease" }}>
      <div style={{ fontSize:22, fontWeight:900, color:"var(--ink)", marginBottom:12 }}>管理画面</div>

      <div style={{ display:"flex", borderRadius:10, overflow:"hidden", border:"1px solid var(--line)", marginBottom:16, flexWrap:"wrap" }}>
        {mainSeg("req", `依頼${openReqs ? `（${openReqs}）` : ""}`)}
        {mainSeg("genre", `ジャンル選別${genreCount("未分類") ? `（${genreCount("未分類")}）` : ""}`)}
        {mainSeg("archive", "アーカイブ")}
        {mainSeg("notice", "お知らせ")}
        {mainSeg("pinned", "ピン留め")}
        {mainSeg("memo", "制作メモ")}
      </div>

      {section === "notice" && <NoticeAdmin onNoticeChange={onNoticeChange} />}

      {section === "req" && (
        reqLoading ? (
          <div style={{ textAlign:"center", color:"var(--sub)", padding:"40px 0", fontSize:14 }}>読み込み中…</div>
        ) : reqs.length === 0 ? (
          <div style={{ textAlign:"center", padding:50, color:"var(--faint)" }}>
            
            <div style={{ fontSize:15, fontWeight:700, color:"var(--sub)" }}>依頼はまだありません</div>
            <div style={{ fontSize:13, marginTop:6, color:"var(--faint)" }}>「ポップ依頼」からみんなが投稿できます</div>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {reqs.map(r => {
              const done = r.status === "対応済み";
              const urgent = r.priority === "急ぎ";
              return (
                <div key={r.id} style={{ background:"#fff", borderRadius:14, border:"1px solid var(--line)", padding:14, borderLeft:`5px solid ${done?"#bbb":urgent?"#e01010":"var(--primary)"}`, opacity:done?0.6:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:6, flexWrap:"wrap" }}>
                    {urgent && !done && <span style={{ background:"#e01010", color:"#fff", fontSize:10, fontWeight:900, padding:"2px 7px", borderRadius:7 }}>急ぎ</span>}
                    {done && <span style={{ background:"#bbb", color:"#fff", fontSize:10, fontWeight:900, padding:"2px 7px", borderRadius:7 }}>対応済み</span>}
                    <span style={{ fontSize:15, fontWeight:900, color:"var(--ink)" }}>{r.product_name}</span>
                    <span style={{ marginLeft:"auto", fontSize:11, color:"var(--faint)" }}>{fmtDate(r.created_at)}</span>
                  </div>
                  <div style={{ fontSize:12, color:"var(--sub)", marginBottom: r.reason ? 8 : 10 }}>{r.store_name}</div>
                  {r.reason && <div style={{ fontSize:13, color:"var(--text)", lineHeight:1.5, background:"var(--bg)", borderRadius:8, padding:"8px 10px", marginBottom:10, whiteSpace:"pre-wrap" }}>{r.reason}</div>}
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={()=>setReqStatus(r, done?"未対応":"対応済み")}
                      style={{ flex:1, border:"none", background:done?"#eee":"#1a6b3a", color:done?"#888":"#fff", fontWeight:800, fontSize:13, borderRadius:9, padding:"9px", cursor:"pointer" }}>
                      {done?"未対応に戻す":"対応済みにする"}
                    </button>
                    <button onClick={()=>delReq(r)}
                      style={{ border:"1px solid #f0d0d0", background:"#fff", color:"#d33", fontWeight:800, fontSize:13, borderRadius:9, padding:"9px 14px", cursor:"pointer" }}>削除</button>
                  </div>
                </div>
              );
            })}
          </div>
        )
      )}

      {section === "genre" && (
        <div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:14, lineHeight:1.6 }}>
            検索画面の左タブで使うジャンルを、ここで振り分けます。ボタンをタップで設定（同じものをもう一度タップで未分類に戻す）。公開中のPOPのみ表示。「除外」を選ぶと、そのPOPは検索結果に出なくなります（一覧には残り、左タブにも出ません）。
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
            {["未分類", ...GENRES, "除外"].map(g => {
              const on = gFilter === g;
              const c = GENRE_COLORS[g];
              return (
                <button key={g} onClick={() => setGFilter(g)}
                  style={{ border: on ? "none" : "1px solid var(--line)",
                    background: on ? (c ? c.solid : "#222") : "#fff",
                    color: on ? "#fff" : "#777", fontSize:13, fontWeight:800,
                    padding:"8px 12px", borderRadius:9, cursor:"pointer" }}>
                  {g}（{genreCount(g)}）
                </button>
              );
            })}
          </div>
          {loading ? (
            <div style={{ textAlign:"center", color:"var(--sub)", padding:"40px 0", fontSize:14 }}>読み込み中…</div>
          ) : genreList.length === 0 ? (
            <div style={{ textAlign:"center", color:"var(--faint)", padding:"40px 0", fontSize:14 }}>
              {gFilter === "未分類" ? "未分類のPOPはありません（すべて振り分け済み）" : `「${gFilter}」のPOPはありません`}
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {genreList.map(p => (
                <div key={p.id} style={{ background:"#fff", borderRadius:12, boxShadow:"0 1px 8px rgba(0,0,0,0.06)", padding:10, display:"flex", gap:11, alignItems:"flex-start" }}>
                  <img src={p.image_url} alt="" style={{ width:52, height:68, objectFit:"cover", borderRadius:8, background:"var(--chip)", flexShrink:0 }} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:800, color:"var(--ink)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.product_name}</div>
                    <div style={{ fontSize:12, color:"var(--sub)", marginBottom:8 }}>{p.store_name}{p.category ? ` ・ ${p.category}` : ""}</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {[...GENRES, "除外"].map(g => {
                        const gc = GENRE_COLORS[g];
                        const on = p.genre === g;
                        return (
                          <button key={g} onClick={() => assignGenre(p, g)}
                            style={{ border:`1.5px solid ${gc.solid}`, background: on ? gc.solid : "#fff",
                              color: on ? "#fff" : gc.solid, fontSize:12, fontWeight:800,
                              padding:"7px 11px", borderRadius:8, cursor:"pointer", whiteSpace:"nowrap" }}>
                            {g}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {section === "archive" && (
        <div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:14 }}>写真をタップして選び、まとめてアーカイブ／公開に戻せます。</div>
          <div style={{ display:"flex", borderRadius:10, overflow:"hidden", border:"1px solid var(--line)", marginBottom:14 }}>
            {seg("active","公開中",aCount)}
            {seg("archived","アーカイブ済み",arCount)}
          </div>
          {loading ? (
            <div style={{ textAlign:"center", color:"var(--sub)", padding:"40px 0", fontSize:14 }}>読み込み中…</div>
          ) : list.length === 0 ? (
            <div style={{ textAlign:"center", color:"var(--faint)", padding:"40px 0", fontSize:14 }}>
              {view==="archived" ? "アーカイブ済みのPOPはありません" : "公開中のPOPはありません"}
            </div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(108px, 1fr))", gap:10 }}>
              {list.map(p => {
                const on = !!sel[p.id];
                return (
                  <button key={p.id} onClick={() => toggle(p.id)}
                    style={{ position:"relative", border: on ? "3px solid var(--primary)" : "1px solid var(--line)", borderRadius:12, overflow:"hidden",
                      background:"#fff", padding:0, cursor:"pointer", textAlign:"left", boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
                    <img src={p.image_url} alt="" style={{ width:"100%", aspectRatio:"3 / 4", objectFit:"cover", display:"block", background:"var(--chip)", opacity: on ? 0.85 : 1 }} />
                    {on && <span style={{ position:"absolute", top:6, right:6, width:24, height:24, borderRadius:"50%", background:"var(--primary)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:900, lineHeight:1 }}>✓</span>}
                    <div style={{ padding:"6px 8px" }}>
                      <div style={{ fontSize:12, fontWeight:800, color:"var(--ink)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.product_name}</div>
                      <div style={{ fontSize:11, color:"var(--sub)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.store_name}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}

      {section === "archive" && selIds.length > 0 && (
        <div style={{ position:"fixed", left:0, right:0, bottom:"calc(78px + env(safe-area-inset-bottom))", zIndex:190,
          background:"#fff", borderTop:"1px solid #ececec", boxShadow:"0 -2px 14px rgba(0,0,0,0.1)", padding:"12px 16px",
          display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:14, fontWeight:800, color:"var(--ink)" }}>{selIds.length}件 選択中</span>
          <button onClick={() => setSel({})}
            style={{ marginLeft:"auto", border:"1px solid var(--line)", background:"#fff", color:"var(--sub)", borderRadius:9, padding:"9px 12px", fontSize:13, fontWeight:700, cursor:"pointer" }}>解除</button>
          <button onClick={apply} disabled={applying}
            style={{ border:"none", background: toArchive ? "var(--primary)" : "#1a6b3a", color:"#fff", borderRadius:9, padding:"10px 16px", fontSize:14, fontWeight:800, cursor:"pointer", opacity: applying ? 0.6 : 1 }}>
            {applying ? "処理中…" : (toArchive ? "アーカイブする" : "公開に戻す")}
          </button>
        </div>
      )}

      {section === "pinned" && (
        <div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:14 }}>ホーム画面の一覧最上部に固定するPOPを選択できます</div>
          {loading ? (
            <div style={{ textAlign:"center", color:"var(--sub)", padding:"40px 0", fontSize:14 }}>読み込み中…</div>
          ) : (
            <>
              {pinnedPopId && (
                <div style={{ background:"#fff8f0", border:"2px solid var(--primary)", borderRadius:12, padding:12, marginBottom:14 }}>
                  <div style={{ fontSize:12, fontWeight:800, color:"var(--primary)", marginBottom:6 }}>📌 現在のピン留め</div>
                  {pops.find(p => p.id === pinnedPopId) && (
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <img src={pops.find(p => p.id === pinnedPopId).image_url} style={{ width:60, height:60, objectFit:"cover", borderRadius:8 }} />
                      <div style={{ flex:1, fontSize:13, fontWeight:700 }}>{pops.find(p => p.id === pinnedPopId).product_name || "無題"}</div>
                      <button onClick={() => setPinned(null)} style={{ border:"none", background:"var(--chip)", color:"var(--text)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer" }}>外す</button>
                    </div>
                  )}
                </div>
              )}
              <div style={{ fontSize:12, fontWeight:800, color:"var(--sub)", marginBottom:8 }}>最近投稿したPOP</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:8 }}>
                {pops.slice(0, 20).map(p => (
                  <div key={p.id} onClick={() => setPinned(p.id)} style={{ cursor:"pointer", opacity: p.id === pinnedPopId ? 0.5 : 1, position:"relative" }}>
                    <img src={p.image_url} style={{ width:"100%", aspectRatio:"1/1", objectFit:"cover", borderRadius:8, border: p.id === pinnedPopId ? "3px solid var(--primary)" : "none" }} />
                    {p.id === pinnedPopId && <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>📌</div>}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}

      {section === "memo" && (
        <div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:12 }}>制作時の気づき・失敗点・工夫を箇条書きで記録。メモ内のPOP名は自動でリンクになります</div>
          <textarea value={memoText} onChange={e => { setMemoText(e.target.value); setMemoDirty(true); }} placeholder="・商品名／キャンペーン名&#10;・用途／売場&#10;・メイン訴求&#10;・デザイン方向&#10;・修正した点&#10;・AIが失敗した点&#10;・次回流用できる点"
            style={{ width:"100%", minHeight:200, boxSizing:"border-box", border:"1px solid var(--line)", borderRadius:10, padding:12, fontSize:13, fontFamily:"monospace", lineHeight:1.7, marginBottom:12 }} />
          {memoDirty && (
            <button onClick={async () => { setMemoLoading(true); try { await api.saveMemo(memoText); setMemoDirty(false); } catch(e) { alert("保存に失敗しました"); } finally { setMemoLoading(false); } }}
              disabled={memoLoading}
              style={{ border:"none", background: memoLoading ? "#f0b48a" : "var(--primary)", color:"#fff", borderRadius:10, padding:"10px 16px", fontSize:14, fontWeight:800, cursor: memoLoading ? "default" : "pointer" }}>{memoLoading ? "保存中…" : "保存する"}</button>
          )}
        </div>
      )}
    </div>
  );
}

// ===== アーカイブ：販売終了POPの保管庫（誰でも閲覧可・読み取り専用） =====
function ArchiveTab({ onCreateFromPop }) {
  const [pops, setPops] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sel, setSel] = useState(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      try { const d = await api.listArchived(); if (alive) setPops(d); }
      catch (e) { console.error(e); }
      finally { if (alive) setLoading(false); }
    })();
    return () => { alive = false; };
  }, []);

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:16, paddingBottom:90, animation:"fadeUp .3s ease" }}>
      <div style={{ fontSize:22, fontWeight:900, color:"var(--ink)", marginBottom:4 }}>アーカイブ</div>
      <div style={{ fontSize:13, color:"var(--sub)", marginBottom:14 }}>販売が終わったPOPの保管庫です。過去の参考にどうぞ。</div>

      {loading ? (
        <div style={{ textAlign:"center", color:"var(--sub)", padding:"50px 0", fontSize:14 }}>読み込み中…</div>
      ) : pops.length === 0 ? (
        <div style={{ textAlign:"center", padding:60, color:"var(--faint)" }}>
          
          <div style={{ fontSize:15, fontWeight:700, color:"var(--sub)" }}>アーカイブはまだ空です</div>
          <div style={{ fontSize:13, marginTop:6, color:"var(--faint)" }}>管理画面からPOPをアーカイブできます</div>
        </div>
      ) : (
        <>
          <div style={{ fontSize:13, fontWeight:800, color:"var(--sub)", marginBottom:12, paddingLeft:2 }}>アーカイブ済み（{pops.length}）</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(118px, 1fr))", gap:3 }}>
            {pops.map(pop => (
              <img key={pop.id} src={pop.image_url} loading="lazy" onClick={() => setSel(pop)}
                style={{ width:"100%", aspectRatio:"1/1", objectFit:"cover", borderRadius:8, cursor:"pointer", background:"var(--chip)", display:"block" }} />
            ))}
          </div>
        </>
      )}

      {sel && <PopDetail pop={sel} onClose={() => setSel(null)}
        onDelete={id => { setPops(p => p.filter(x => x.id !== id)); setSel(null); }}
        onLiked={(id, likes) => setPops(p => p.map(x => x.id === id ? { ...x, likes } : x))}
        onCreateFromPop={onCreateFromPop}
      />}
    </div>
  );
}

// ===== ポップ依頼：作ってほしいPOPの依頼フォーム（誰でも投稿可） =====
function RequestTab() {
  const [store, setStore] = useState("");
  const [product, setProduct] = useState("");
  const [priority, setPriority] = useState("普通");
  const [reason, setReason] = useState("");
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const [error, setError] = useState("");

  const submit = async () => {
    if (!product.trim()) { setError("商品名を入力してください"); return; }
    setBusy(true); setError("");
    try {
      await api.insertRequest({ store_name: store || "未指定", product_name: product.trim(), reason: reason.trim(), author: "匿名", priority });
      setDone(true);
    } catch (e) { setError("送信に失敗しました: " + e.message); }
    finally { setBusy(false); }
  };
  const reset = () => { setProduct(""); setReason(""); setPriority("普通"); setDone(false); setError(""); };

  const card = { background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", padding:16 };
  const lbl = { fontSize:12, color:"var(--sub)", marginBottom:5, fontWeight:700 };
  const inp = { width:"100%", boxSizing:"border-box", border:"1px solid var(--line)", borderRadius:10, padding:"11px 12px", fontSize:15, outline:"none", background:"#fff" };

  if (done) {
    return (
      <div style={{ maxWidth:560, margin:"0 auto", padding:16, animation:"fadeUp .3s ease" }}>
        <div style={{ ...card, textAlign:"center", padding:"40px 24px" }}>
          
          <div style={{ fontSize:17, fontWeight:900, color:"var(--ink)", marginBottom:6 }}>依頼を送信しました</div>
          <div style={{ fontSize:13, color:"var(--sub)", marginBottom:20, lineHeight:1.6 }}>担当者に届きました。POPができるまでお待ちください。</div>
          <button onClick={reset} style={{ border:"none", background:"var(--primary)", color:"#fff", fontWeight:800, fontSize:15, borderRadius:10, padding:"12px 24px", cursor:"pointer" }}>続けて依頼する</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth:560, margin:"0 auto", padding:16, animation:"fadeUp .3s ease" }}>
      <div style={{ fontSize:22, fontWeight:900, color:"var(--ink)", marginBottom:4 }}>ポップ依頼</div>
      <div style={{ fontSize:13, color:"var(--sub)", marginBottom:16 }}>作ってほしいPOPをここから依頼できます。内容は担当者に届きます。</div>
      <div style={{ ...card, display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <div style={lbl}>商品名 <span style={{ color:"var(--primary)" }}>*</span></div>
          <input value={product} onChange={e=>setProduct(e.target.value)} placeholder="例：生本まぐろ 中トロ" style={inp} />
        </div>
        <div>
          <div style={lbl}>店舗</div>
          <select value={store} onChange={e=>setStore(e.target.value)} style={inp}>
            <option value="">未指定</option>
            {STORES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <div style={lbl}>優先度</div>
          <div style={{ display:"flex", gap:8 }}>
            {["普通","急ぎ"].map(pr=>{
              const on = priority===pr; const urgent = pr==="急ぎ";
              return (
                <button key={pr} onClick={()=>setPriority(pr)}
                  style={{ flex:1, border:`2px solid ${on?(urgent?"#e01010":"var(--primary)"):"#eee"}`, background:on?(urgent?"#fff0f0":"#fff3ea"):"#fff", color:on?(urgent?"#e01010":"var(--primary)"):"#999", fontWeight:800, fontSize:14, borderRadius:10, padding:"9px", cursor:"pointer" }}>
                  {urgent?"急ぎ":"普通"}
                </button>
              );
            })}
          </div>
        </div>
        <div>
          <div style={lbl}>要望・メモ</div>
          <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="サイズ、訴求ポイント、産地、希望日など" rows={3} style={{ ...inp, resize:"vertical", lineHeight:1.5 }} />
        </div>
        {error && <div style={{ fontSize:13, color:"#e01010", fontWeight:700 }}>{error}</div>}
        <button onClick={submit} disabled={busy}
          style={{ border:"none", background:"var(--primary)", color:"#fff", fontWeight:800, fontSize:15, borderRadius:10, padding:"13px", cursor:"pointer", opacity:busy?0.6:1 }}>
          {busy ? "送信中…" : "依頼を送信"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("board");

  const [currentStore, setCurrentStore] = useState(STORES[0]);
  const boardActions = React.useRef({});
  const [showUpload, setShowUpload] = useState(false);
  const [toolSeed, setToolSeed] = useState(null);
  const [moreOpen, setMoreOpen] = useState(false);
  const [showToTop, setShowToTop] = useState(false);
  const [popDetailOpen, setPopDetailOpen] = useState(false);
  useEffect(() => {
    const h = (e) => setPopDetailOpen(!!e.detail);
    window.addEventListener("popdetail", h);
    return () => window.removeEventListener("popdetail", h);
  }, []);
  const [showGneHint, setShowGneHint] = useState(true);
  const [wxCode, setWxCode] = useState(null);

  // 天気テーマ（ヘッダー背景をDynamic Island裏まで描画）
  const skyTheme = (() => {
    const hour = new Date().getHours();
    const night = hour >= 19 || hour < 5;
    const base = { bg:"linear-gradient(180deg,#8FA0B0 0%,#E8ECEF 70%,#ffffff 100%)", txtDark:true };  // フォールバック（通常）
    if (wxCode == null) return base;
    if (night) return { bg:"linear-gradient(180deg,#1E2A4A 0%,#2F3E63 55%,#4A5B85 100%)", pat:"radial-gradient(circle, rgba(255,255,255,0.85) 0.7px, transparent 1px)", patSize:"110px 80px", txtDark:false };
    const c = wxCode;
    if (c <= 1) return { bg:"linear-gradient(180deg,#5B9BD5 0%,#93C4EC 55%,#CFE7F9 100%)", txtDark:true };
    if (c <= 3 || c === 45 || c === 48) return { bg:"linear-gradient(180deg,#8A9BAC 0%,#BECAD5 55%,#E9EDF1 100%)", txtDark:true };
    if ((c >= 71 && c <= 77) || c === 85 || c === 86) return { bg:"linear-gradient(180deg,#93AEC4 0%,#C9DCEA 60%,#EFF6FB 100%)", pat:"radial-gradient(circle, #ffffff 1.2px, transparent 1.5px)", patSize:"48px 40px", txtDark:true };
    return { bg:"linear-gradient(180deg,#3F4F66 0%,#5A6C86 60%,#7C90A7 100%)", pat:"repeating-linear-gradient(75deg, rgba(255,255,255,0.10) 0px, rgba(255,255,255,0.10) 1px, transparent 1px, transparent 15px)", txtDark:false };  // 雨・雷
  })();
  const [radialOpen, setRadialOpen] = useState(false);
  const [scrollP, setScrollP] = useState(0); // 0=最上部 ... 1=ヘッダーがガラス化しきった状態
  const [pullY, setPullY] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const [dataVer, setDataVer] = useState(0);
  const [notice, setNotice] = useState({ enabled:false, message:"", tip_enabled:false, tip_message:"季節のポップや時期が過ぎたポップは「アーカイブ」に収納されます。", feat_enabled:false, feat_message:"", feat_tab:"", feat_ver:"" });
  const pullActive = React.useRef(false);
  const pullStart = React.useRef(0);
  const pullDist = React.useRef(0);

  useEffect(() => {
    const FADE_RANGE = 100;
    const onScroll = () => {
      const y = Math.min(window.scrollY, FADE_RANGE);
      setScrollP(y / FADE_RANGE);
      setShowToTop(window.scrollY > 400);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const doRefresh = useCallback(async () => {
    setRefreshing(true);
    try {
      if (tab === "board" && boardActions.current && boardActions.current.refresh) {
        await boardActions.current.refresh();
      } else if (tab === "search" || tab === "floor") {
        setDataVer(v => v + 1);
      }
    } catch(e) { console.error(e); }
    setTimeout(() => setRefreshing(false), 700);
  }, [tab]);

  useEffect(() => {
    const TH = 70;
    const onStart = (e) => {
      if (window.scrollY <= 0 && !refreshing && !moreOpen && !radialOpen) {
        pullActive.current = true; pullStart.current = e.touches[0].clientY;
      } else { pullActive.current = false; }
    };
    const onMove = (e) => {
      if (!pullActive.current) return;
      const dy = e.touches[0].clientY - pullStart.current;
      if (dy > 0 && window.scrollY <= 0) {
        const d = Math.min(dy * 0.5, 90);
        pullDist.current = d; setPullY(d);
        if (dy > 6 && e.cancelable) e.preventDefault();
      } else { pullActive.current = false; pullDist.current = 0; setPullY(0); }
    };
    const onEnd = () => {
      if (!pullActive.current) return;
      pullActive.current = false;
      if (pullDist.current >= TH) doRefresh();
      pullDist.current = 0; setPullY(0);
    };
    window.addEventListener("touchstart", onStart, { passive: true });
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onEnd, { passive: true });
    window.addEventListener("touchcancel", onEnd, { passive: true });
    return () => {
      window.removeEventListener("touchstart", onStart);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onEnd);
      window.removeEventListener("touchcancel", onEnd);
    };
  }, [refreshing, moreOpen, radialOpen, doRefresh]);

  useEffect(() => { api.getNotice().then(setNotice).catch(()=>{}); }, []);

  useEffect(() => {
    const sp = document.getElementById("splash");
    if (!sp) return;
    const t0 = window.__splashT0 || 0;
    const wait = Math.max(0, 900 - (Date.now() - t0));
    const h = setTimeout(() => { sp.classList.add("hide"); setTimeout(() => sp.remove(), 500); }, wait);
    return () => clearTimeout(h);
  }, []);

  const handleCreateFromPop = (pop) => {
    setToolSeed({ product: pop.product_name || "", image_url: pop.image_url });
    setTab("tool");
  };
  const handleCreatePop = (seed) => { setToolSeed(seed); setTab("tool"); };

  const tabs = [
    { key:"board",   icon:"📌", label:"一覧",       color:"var(--primary)" },
    { key:"floor",   icon:"📸", label:"売場",       color:"#1a6b3a" },
    { key:"tool",    icon:"✏️", label:"作成",       color:"#8B6914" },
    { key:"search",  icon:"🔍", label:"検索",       color:"#059669" },
    { key:"barcode", icon:"🏷", label:"発注バーコード生成", color:"var(--primary)" },
    { key:"dev",     icon:"ℹ️", label:"お知らせ",   color:"#6b7280" },
    { key:"gne",     icon:"🅖", label:"入力ジェネレーター",      color:"#7c3aed" },
  ];

  return (
    <div className="min-vh" style={{ background:"var(--bg)", paddingBottom:"calc(62px + env(safe-area-inset-bottom))" }}>
      {(pullY > 0 || refreshing) && (
        <div style={{ position:"fixed", top:0, left:"50%", transform:"translateX(-50%)", zIndex:150, pointerEvents:"none",
          marginTop: refreshing ? 12 : Math.max(pullY - 30, 4),
          transition: pullActive.current ? "none" : "margin-top .25s" }}>
          <div style={{ width:34, height:34, borderRadius:"50%", background:"#fff", boxShadow:"0 3px 12px rgba(0,0,0,0.18)", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--primary)", fontSize:18, fontWeight:900,
            transform: refreshing ? undefined : `rotate(${pullY*4}deg)`,
            animation: refreshing ? "spin 0.7s linear infinite" : "none" }}>↻</div>
        </div>
      )}
      <div style={{ position:"sticky", top:0, zIndex:100, paddingTop:"env(safe-area-inset-top)" }}>
        {/* 天気テーマ背景：Dynamic Island裏（画面最上端）まで描画。操作UIはセーフエリア内 */}
        <div style={{ position:"absolute", inset:0, background: skyTheme.bg, boxShadow:"0 2px 12px rgba(0,0,0,0.10)", pointerEvents:"none", overflow:"hidden" }}>
          {skyTheme.pat && <div style={{ position:"absolute", inset:0, backgroundImage: skyTheme.pat, backgroundSize: skyTheme.patSize || "auto" }} />}
        </div>
        <div style={{ position:"relative", maxWidth:1080, margin:"0 auto", padding:"4px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"nowrap", gap:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, minWidth:0, flex:1, overflow:"hidden",
            transform:`translateX(${-scrollP*34}px)`, opacity:1-scrollP, pointerEvents: scrollP>0.9?"none":"auto" }}>
            <div style={{ fontSize:16, fontWeight:900, color: skyTheme.txtDark ? "var(--ink)" : "#fff", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", minWidth:0, textShadow: skyTheme.txtDark ? "none" : "0 1px 3px rgba(0,0,0,0.25)" }}>鮮魚ポップ共有</div>
            <button onClick={() => { setRadialOpen(false); setTab("board"); setShowUpload(true); }} style={{ flexShrink:0, border:"none", background:"rgba(255,255,255,0.88)", color:"#0f0f0f", fontWeight:800, fontSize:13.5, padding:"4px 13px", borderRadius:16, cursor:"pointer", whiteSpace:"nowrap", lineHeight:1.5, backdropFilter:"blur(4px)" }}>＋投稿</button>
          </div>
          {/* 天気：ガラス化・フェード・移動なし、常に同じ位置に残す */}
          <div style={{ flexShrink:0 }}><WeatherWidget onTheme={setWxCode} /></div>
        </div>
      </div>

      {notice.enabled && notice.message && (
        <div style={{ maxWidth:1080, margin:"0 auto", padding:"10px 16px 0" }}>
          <div style={{ background:"#fff4e5", border:"1px solid #ffc98a", color:"#8a4b00", borderRadius:12, padding:"12px 14px", fontSize:13.5, fontWeight:700, lineHeight:1.6, display:"flex", gap:9, alignItems:"flex-start", boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
            <span style={{ fontSize:16, lineHeight:1.3 }}>⚠️</span>
            <span style={{ whiteSpace:"pre-wrap" }}>{notice.message}</span>
          </div>
        </div>
      )}
      {tab==="board"  && <BoardTab currentStore={currentStore} actionsRef={boardActions} onCreateFromPop={handleCreateFromPop} radialOpen={radialOpen} setRadialOpen={setRadialOpen} tipEnabled={notice.tip_enabled} tipMessage={notice.tip_message} feat={{ enabled: notice.feat_enabled, message: notice.feat_message, tab: notice.feat_tab, ver: notice.feat_ver }} onFeatGo={(t)=>setTab(t)} />}
      {tab==="barcode" && <BarcodeTab />}
      {tab==="floor"  && <FloorPhotoTab key={"floor"+dataVer} />}
      {tab==="tool"   && <PopToolTab seed={toolSeed} onSeedConsumed={()=>setToolSeed(null)} />}
      {tab==="search" && <SearchTab key={"search"+dataVer} onCreateFromPop={handleCreateFromPop} radialOpen={radialOpen} setRadialOpen={setRadialOpen} />}
      {tab==="gne"    && <GeneratorTab />}
      {tab==="souba"  && <SoubaTab onCreatePop={handleCreatePop} />}
      {tab==="industry" && <IndustryTab />}
      {tab==="competitor" && <CompetitorTab />}
      {tab==="calendar" && <CalendarTab />}
      {tab==="fish" && <FishTab />}
      {tab==="popcheck" && <PopCheckTab />}
      {tab==="admin"  && <AdminTab onNoticeChange={setNotice} />}
      {tab==="request" && <RequestTab />}
      {tab==="archive" && <ArchiveTab onCreateFromPop={handleCreateFromPop} />}
      {tab==="dev"    && <DevTab />}

      {/* 下部固定ナビ */}

      {showToTop && !moreOpen && !radialOpen && !popDetailOpen && (
        <button onClick={() => window.scrollTo({ top:0, behavior:"smooth" })} aria-label="上へ戻る"
          style={{ position:"fixed", left:14, bottom:"calc(90px + env(safe-area-inset-bottom))", zIndex:190, width:46, height:46, borderRadius:12, border:"none", background:"rgba(0,0,0,0.62)", backdropFilter:"blur(6px)", boxShadow:"0 3px 12px rgba(0,0,0,0.25)", color:"#fff", fontSize:22, fontWeight:900, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", animation:"fadeUp .25s ease" }}>↑</button>
      )}

      <div style={{ position:"fixed", left:0, right:0, bottom:"calc(env(safe-area-inset-bottom) + 10px)", zIndex:205, display:"flex", justifyContent:"center", pointerEvents:"none" }}>
       <div style={{ display:"flex", alignItems:"center", gap:4, background:"rgba(255,255,255,0.92)", backdropFilter:"blur(12px)", border:"1px solid var(--line)", borderRadius:30, boxShadow:"0 6px 24px rgba(0,0,0,0.14)", padding:"6px 8px", pointerEvents:"auto" }}>
        {[tabs[0], tabs[3], { key:"__more", icon:"≡", label:"その他", color:"#6b7280", more:true }].map(({key,icon,label,color,action,more,filter})=>{
          const active = filter ? radialOpen : more ? (tab==="barcode"||tab==="dev"||tab==="floor"||tab==="tool"||tab==="admin"||tab==="archive"||tab==="gne"||tab==="request"||tab==="souba"||tab==="calendar"||tab==="fish"||tab==="popcheck"||tab==="industry"||tab==="competitor") : (!action && tab===key && !moreOpen);
          const onClick = action ? () => { setRadialOpen(false); setTab("board"); setShowUpload(true); }
            : filter ? () => { setMoreOpen(false); setTab("board"); setRadialOpen(v=>!v); }
            : more ? () => { setRadialOpen(false); setMoreOpen(v=>!v); }
            : key==="search" ? () => { setMoreOpen(false); setTab("search"); setRadialOpen(v=>!v); }
            : () => { setMoreOpen(false); setRadialOpen(false); setTab(key); };
          const navIcon = key==="board" ? "🏠" : key==="search" ? "🔍" : "≡";
          const navLabel = more ? (moreOpen ? "閉じる" : "メニュー") : label;
          return (
            <button key={key} onClick={() => { if (showGneHint) setShowGneHint(false); onClick(); }}
              style={{ position:"relative", border:"none", cursor:"pointer", padding:"9px 15px", display:"flex", flexDirection:"row", alignItems:"center", gap:6, borderRadius:22, background: active ? "var(--soft)" : "transparent", transition:"background .2s" }}>
              {more && showGneHint && (
                <div onClick={(e) => { e.stopPropagation(); setShowGneHint(false); }}
                  style={{ position:"absolute", bottom:"calc(100% + 10px)", right:-6, background:"var(--primary)", color:"#fff", borderRadius:12, padding:"8px 12px", fontSize:11.5, fontWeight:800, whiteSpace:"nowrap", boxShadow:"0 4px 16px rgba(194,78,0,0.35)", animation:"fadeUp .3s ease" }}>
                  ✨ 新機能はこちら
                  <span style={{ position:"absolute", top:"100%", left:"44%", width:0, height:0, borderLeft:"6px solid transparent", borderRight:"6px solid transparent", borderTop:"6px solid var(--primary)" }} />
                </div>
              )}
              <span style={{ fontSize:18, lineHeight:1, filter: active ? "none" : "grayscale(0.4) opacity(0.75)" }}>{moreOpen && more ? "✕" : navIcon}</span>
              <span style={{ fontSize:12, fontWeight:800, color: active ? "var(--primary)" : "var(--sub)", whiteSpace:"nowrap" }}>{navLabel}</span>
            </button>
          );
        })}
       </div>
      </div>

      {moreOpen && (
        <>
          <div onClick={()=>setMoreOpen(false)}
            style={{ position:"fixed", inset:0, zIndex:201, background:"rgba(0,0,0,0.28)" }} />
          <div style={{ position:"fixed", left:0, right:0, bottom:"calc(74px + env(safe-area-inset-bottom))", zIndex:202, background:"var(--bg)", borderRadius:"22px 22px 0 0", boxShadow:"0 -8px 30px rgba(0,0,0,0.18)", animation:"sheetUp .28s cubic-bezier(.32,.72,.28,1)", padding:"10px 16px 18px" }}>
            <div style={{ width:40, height:4.5, background:"var(--line)", borderRadius:3, margin:"0 auto 12px" }} />
            <div style={{ fontSize:13, fontWeight:900, color:"var(--sub)", marginBottom:12, paddingLeft:2 }}>メニュー</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:"14px 8px" }}>
              {[{key:"tool", icon:"✏️", label:"作成"}, {key:"floor", icon:"📸", label:"売場"}, {key:"request", icon:"📝", label:"ポップ依頼"}, {key:"souba", icon:"🧮", label:"便利機能"}, {key:"industry", icon:"📰", label:"業界情報"}, {key:"competitor", icon:"🔍", label:"競合情報", badge:"NEW"}, {key:"calendar", icon:"📅", label:"行事カレンダー", badge:"NEW"}, {key:"fish", icon:"🐠", label:"魚図鑑", badge:"NEW"}, {key:"popcheck", icon:"🩺", label:"POP診断", badge:"NEW"}, {key:"barcode", icon:"🏷", label:"バーコード"}, {key:"gne", icon:"🅖", label:"入力ジェネレーター"}, {key:"archive", icon:"🗄", label:"アーカイブ"}, {key:"dev", icon:"ℹ️", label:"お知らせ"}, {key:"admin", icon:"🔒", label:"管理画面"}].map(o=>(
                <button key={o.key} onClick={()=>{ setTab(o.key); setMoreOpen(false); }}
                  style={{ border:"none", background:"none", padding:0, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                  <span style={{ position:"relative", width:58, height:58, borderRadius:18, background: tab===o.key ? "var(--soft)" : "#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:26, border: tab===o.key ? "1.5px solid var(--primary)" : "1px solid var(--line)", boxShadow: tab===o.key ? "none" : "0 1px 4px rgba(120,100,70,0.06)" }}>
                    {o.icon}
                    {o.badge && <span style={{ position:"absolute", top:-5, right:-9, background:"var(--primary)", color:"#fff", fontSize:8.5, fontWeight:900, padding:"2px 5px", borderRadius:7, letterSpacing:0.4 }}>{o.badge}</span>}
                  </span>
                  <span style={{ fontSize:11.5, fontWeight:800, color: tab===o.key ? "var(--primary)" : "var(--text)", lineHeight:1.25, textAlign:"center" }}>{o.label}</span>
                </button>
              ))}
            </div>
          </div>
        </>
      )}

      {showUpload && <UploadModal currentStore={currentStore}
        onClose={()=>setShowUpload(false)}
        onSuccess={()=>{ setShowUpload(false); if (boardActions.current && boardActions.current.refresh) boardActions.current.refresh(); }} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
