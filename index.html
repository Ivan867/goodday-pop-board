function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return "たった今";
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

function formatDateTime(d) {
  const dt = new Date(d);
  return `${dt.getMonth()+1}月${dt.getDate()}日 ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,"0")}`;
}

async function compressToBlob(file, maxW=1200) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        let w = img.width, hh = img.height;
        if (w > maxW) { hh = Math.round(hh*maxW/w); w = maxW; }
        c.width = w; c.height = hh;
        c.getContext("2d").drawImage(img, 0, 0, w, hh);
        c.toBlob(res, "image/jpeg", 0.82);
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function downloadImage(url, filename) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename || "pop.jpg";
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) {
    alert("ダウンロードに失敗しました: " + e.message);
  }
}

function UploadModal({ currentStore, onClose, onDone }) {

  const pick = async file => {
    if (!file?.type.startsWith("image/")) return;
    const b = await compressToBlob(file);
    setBlob(b); setPreview(URL.createObjectURL(b)); setStep("form");

      const imageUrl = await api.upload(blob, fn);
      setProg("データを保存中...");
      const pop = await api.insert({ store_name:currentStore, product_name:form.productName, category:form.category, comment:form.comment, author:form.author, image_url:imageUrl });
      onDone(pop); onClose();
    } catch(e) { setErr("エラー: "+e.message); setStep("form"); }
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(10,10,20,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
      <div style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:480, maxHeight:"92vh", overflowY:"auto", boxShadow:"0 24px 80px rgba(0,0,0,0.3)" }}>

          </div>
          <button onClick={onClose} style={{ background:"#f0f0f0", border:"none", borderRadius:10, width:36, height:36, fontSize:18, cursor:"pointer" }}>×</button>
        </div>
        <div style={{ padding:"20px 24px 28px" }}>
          {err && <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:12, color:"#cc0000" }}>⚠️ {err}</div>}
          {step==="pick" && <>
            <div onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);pick(e.dataTransfer.files[0])}}
              onClick={()=>ref.current.click()}
              style={{ border:`3px dashed ${drag?"#e05c00":"#ddd"}`, borderRadius:16, padding:"52px 24px", textAlign:"center", cursor:"pointer", background:drag?"#fff8f0":"#fafafa" }}>
              <div style={{ fontSize:52, marginBottom:14 }}>📷</div>
              <div style={{ fontWeight:800, fontSize:16, color:"#1a1a1a", marginBottom:6 }}>写真を選択またはドラッグ</div>
              <div style={{ fontSize:13, color:"#aaa", marginBottom:18 }}>作成したポップの写真をアップロードしてください</div>
              <div style={{ display:"inline-block", background:"#e05c00", color:"white", padding:"11px 28px", borderRadius:12, fontWeight:800, fontSize:14 }}>ファイルを選択</div>
            </div>
            <input ref={ref} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>pick(e.target.files[0])} />
          </>}
          {step==="form" && <>
            <div style={{ borderRadius:12, overflow:"hidden", marginBottom:18, position:"relative", background:"#111" }}>
              <img src={preview} style={{ width:"100%", maxHeight:240, objectFit:"contain", display:"block" }} />

              {label:"担当者名 *",key:"author",ph:"例：田中"},
              {label:"コメント（任意）",key:"comment",ph:"例：本日特売！脂のりバツグンです"},
            ].map(({label,key,ph})=>(
              <div key={key} style={{ marginBottom:14 }}>
                <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:6 }}>{label}</label>

                ))}
              </div>
            </div>
            <button onClick={submit} style={{ width:"100%", padding:15, background:"#e05c00", color:"white", border:"none", borderRadius:12, fontSize:16, fontWeight:900, cursor:"pointer" }}>
              🚀 全店舗に共有する

          </>}

            </div>

  );
}

          {pop.comment && <div style={{ fontSize:13, color:"#aaa", marginBottom:14, lineHeight:1.6 }}>{pop.comment}</div>}

function RequestBoard({ currentStore }) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [err, setErr]           = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [fStore, setFStore]     = useState("");
  const [fStatus, setFStatus]   = useState("");

  const load = useCallback(async () => {
    setLoading(true); setErr(null);
    try { setRequests(await api.listRequests(fStore||null)); }
    catch(e) { setErr(e.message); }
    setLoading(false);
  }, [fStore]);

  useEffect(() => { load(); }, [load]);

  const onDone = r => setRequests(prev => [r, ...prev]);
  const onStatusChange = async (id, status) => {
    try { await api.updateRequestStatus(id, status); setRequests(prev => prev.map(r => r.id===id ? {...r, status} : r)); }
    catch(e) { alert("更新失敗: "+e.message); }
  };
  const onDelete = async id => {
    if (!confirm("この要望を削除しますか？")) return;
    try { await api.delRequest(id); setRequests(prev => prev.filter(r => r.id!==id)); }
    catch(e) { alert("削除失敗: "+e.message); }
  };

  const filtered = requests.filter(r => (!fStore||r.store_name===fStore) && (!fStatus||r.status===fStatus));
  const counts = { 未対応:0, 検討中:0, 対応済み:0 };
  requests.forEach(r => { if (counts[r.status]!==undefined) counts[r.status]++; });

  return (
    <div>
      <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
        {[{label:"未対応",count:counts["未対応"],color:"#6b7280",bg:"#f3f4f6"},{label:"検討中",count:counts["検討中"],color:"#f59e0b",bg:"#fffbeb"},{label:"対応済み",count:counts["対応済み"],color:"#10b981",bg:"#ecfdf5"}].map(({label,count,color,bg})=>(
          <div key={label} onClick={()=>setFStatus(fStatus===label?"":label)}
            style={{ background:fStatus===label?color:bg, borderRadius:12, padding:"12px 20px", flex:1, minWidth:90, textAlign:"center", cursor:"pointer", border:`2px solid ${color}`, transition:"all 0.15s" }}>
            <div style={{ fontSize:22, fontWeight:900, color:fStatus===label?"white":color }}>{count}</div>
            <div style={{ fontSize:11, fontWeight:700, color:fStatus===label?"rgba(255,255,255,0.85)":color }}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:20, overflowX:"auto", paddingBottom:4 }}>
        {["", ...STORES].map(s=>(
          <button key={s||"all"} onClick={()=>setFStore(s)}
            style={{ padding:"6px 14px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, whiteSpace:"nowrap", flexShrink:0, borderColor:fStore===s?"#7c3aed":"#ddd", background:fStore===s?"#7c3aed":"white", color:fStore===s?"white":"#666" }}>
            {s||"全店舗"}
          </button>
        ))}
      </div>
      <div style={{ marginBottom:20 }}>
        <button onClick={()=>setShowModal(true)} style={{ background:"#7c3aed", color:"white", border:"none", borderRadius:12, padding:"12px 24px", fontSize:14, fontWeight:900, cursor:"pointer", width:"100%" }}>
          📋 新しい要望を投稿する
        </button>
      </div>
      {err && <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:12, padding:"14px 18px", marginBottom:20, color:"#cc0000", fontSize:13 }}>⚠️ {err}<button onClick={load} style={{ marginLeft:12, background:"#cc0000", color:"white", border:"none", borderRadius:6, padding:"4px 12px", fontSize:12, cursor:"pointer" }}>再試行</button></div>}
      {loading ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}><div style={{ fontSize:32, marginBottom:10, animation:"pulse 1.5s infinite" }}>📋</div><div style={{ fontWeight:600 }}>読み込み中...</div></div>
      ) : filtered.length===0 ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}><div style={{ fontSize:48, marginBottom:14 }}>📋</div><div style={{ fontWeight:800, fontSize:15, color:"#888", marginBottom:8 }}>要望がまだありません</div><div style={{ fontSize:13 }}>「新しい要望を投稿する」から最初の要望を送りましょう！</div></div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {filtered.map(req=><RequestCard key={req.id} req={req} currentStore={currentStore} onStatusChange={onStatusChange} onDelete={onDelete} />)}
        </div>
      )}
      {showModal && <RequestModal currentStore={currentStore} onClose={()=>setShowModal(false)} onDone={onDone} />}
    </div>
  );
}

function BlogNewPostForm({ onPost, onCancel }) {
  const [text, setText] = useState("");
  const [blob, setBlob] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const fileRef = useRef();

  const handleImage = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const b = await compressToBlob(file);
    setBlob(b);
    setPreview(URL.createObjectURL(b));
  };

  const submit = async () => {
    if (!text.trim()) return;
    setLoading(true); setErr("");
    try {
      let image_url = null;
      if (blob) {
        const fn = `blog_${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
        image_url = await api.upload(blob, fn);
      }
      const post = await api.insertPost({ text: text.trim(), image_url, views: 0 });
      onPost(post);
    } catch(e) { setErr("エラー: "+e.message); setLoading(false); }
  };

  return (
    <div style={{ background:"white", border:"2px solid #e8f0e8", borderRadius:16, padding:"18px 20px", marginBottom:22 }}>
      {err && <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:10, padding:"10px 14px", marginBottom:12, fontSize:12, color:"#cc0000" }}>⚠️ {err}</div>}
      <textarea
        value={text}
        onChange={e=>setText(e.target.value)}
        placeholder="今日の売り場の状況を書いてください…"
        rows={4}
        style={{ width:"100%", fontSize:14, padding:"10px 12px", border:"2px solid #eee", borderRadius:10, resize:"none", background:"#fafaf8", lineHeight:1.7, boxSizing:"border-box", fontFamily:"inherit", color:"#1a1a1a", outline:"none" }}
        onFocus={e=>e.target.style.borderColor="#1a3a2a"}
        onBlur={e=>e.target.style.borderColor="#eee"}
      />
      <div style={{ margin:"12px 0 16px" }}>
        {preview ? (
          <div style={{ position:"relative", display:"inline-block" }}>
            <img src={preview} alt="" style={{ width:110, height:82, objectFit:"cover", borderRadius:8, display:"block" }} />
            <button onClick={()=>{setBlob(null);setPreview(null);}} style={{ position:"absolute", top:-7, right:-7, width:20, height:20, borderRadius:"50%", background:"#555", color:"#fff", border:"none", cursor:"pointer", fontSize:12, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
          </div>
        ) : (
          <button onClick={()=>fileRef.current.click()} style={{ border:"1.5px dashed #ccc", borderRadius:10, padding:"9px 16px", background:"#fafaf8", cursor:"pointer", fontSize:12, color:"#aaa", display:"flex", alignItems:"center", gap:6 }}>
            📷 写真を追加
          </button>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleImage} />
      </div>
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={submit} disabled={!text.trim()||loading} style={{ background:text.trim()&&!loading?"#1a3a2a":"#ccc", color:"white", border:"none", borderRadius:10, padding:"10px 22px", fontSize:14, fontWeight:700, cursor:text.trim()&&!loading?"pointer":"not-allowed" }}>
          {loading ? "投稿中..." : "投稿する"}
        </button>
        <button onClick={onCancel} style={{ background:"none", border:"1px solid #ddd", borderRadius:10, padding:"10px 16px", fontSize:14, color:"#999", cursor:"pointer" }}>キャンセル</button>
      </div>
    </div>
  );
}

function BlogDetailModal({ post, onClose, onViewed, onDelete }) {
  useEffect(() => {
    onViewed(post);
    const h = e => { if (e.key==="Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:18, maxWidth:500, width:"100%", maxHeight:"90vh", overflow:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
        {post.image_url && (
          <img src={post.image_url} alt="" style={{ width:"100%", maxHeight:340, objectFit:"cover", borderRadius:"18px 18px 0 0", display:"block" }} />
        )}
        <div style={{ padding:"18px 20px 22px" }}>
          <p style={{ fontSize:15, color:"#1a1a1a", lineHeight:1.75, margin:"0 0 18px" }}>{post.text}</p>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:14, borderTop:"1px solid #f0f0f0", marginBottom:14 }}>
            <span style={{ fontSize:12, color:"#bbb" }}>{formatDateTime(post.created_at)}</span>
            <span style={{ fontSize:12, color:"#aaa" }}>👁 {post.views || 0}人が閲覧</span>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={onClose} style={{ flex:1, background:"none", border:"1px solid #ddd", borderRadius:10, padding:"9px", fontSize:13, color:"#888", cursor:"pointer" }}>閉じる</button>
            <button onClick={()=>{ if(confirm("この投稿を削除しますか？")) onDelete(post.id); }} style={{ padding:"9px 16px", background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:10, fontSize:13, color:"#cc4444", cursor:"pointer", fontWeight:700 }}>削除</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BlogBoard() {
  const [posts, setPosts]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [err, setErr]           = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [openPost, setOpenPost] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setErr(null);
    try { setPosts(await api.listPosts()); }
    catch(e) { setErr(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const handlePost = p => { setPosts(prev => [p, ...prev]); setShowForm(false); };

  const handleViewed = async post => {
    try {
      await api.incrementViews(post.id, post.views);
      setPosts(prev => prev.map(p => p.id===post.id ? {...p, views:(p.views||0)+1} : p));
      setOpenPost(prev => prev ? {...prev, views:(prev.views||0)+1} : prev);
    } catch(_) {}
  };

  const handleDelete = async id => {
    try { await api.delPost(id); setPosts(prev=>prev.filter(p=>p.id!==id)); setOpenPost(null); }
    catch(e) { alert("削除失敗: "+e.message); }
  };

  return (
    <div>
      <div style={{ background:"#f0f5f0", borderRadius:14, padding:"14px 18px", marginBottom:20, fontSize:13, color:"#2d5a3d", lineHeight:1.6 }}>
        📝 今日の売り場の状況、上手くいったこと、気づいたことを自由に投稿してください
      </div>
      <div style={{ marginBottom:20 }}>
        {showForm
          ? <BlogNewPostForm onPost={handlePost} onCancel={()=>setShowForm(false)} />
          : <button onClick={()=>setShowForm(true)} style={{ background:"#1a3a2a", color:"#d4e8d4", border:"none", borderRadius:12, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:"pointer", width:"100%" }}>
              ＋ 今日の状況を投稿する
            </button>
        }
      </div>
      {err && <div style={{ background:"#fff0f0", border:"1px solid #ffcccc", borderRadius:12, padding:"14px 18px", marginBottom:20, color:"#cc0000", fontSize:13 }}>⚠️ {err} <button onClick={load} style={{ marginLeft:12, background:"#cc0000", color:"white", border:"none", borderRadius:6, padding:"4px 12px", fontSize:12, cursor:"pointer" }}>再試行</button></div>}
      {loading ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}><div style={{ fontSize:32, marginBottom:10, animation:"pulse 1.5s infinite" }}>📝</div><div style={{ fontWeight:600 }}>読み込み中...</div></div>
      ) : posts.length===0 ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}>
          <div style={{ fontSize:48, marginBottom:14 }}>📝</div>
          <div style={{ fontWeight:800, fontSize:15, color:"#888", marginBottom:8 }}>まだ投稿がありません</div>
          <div style={{ fontSize:13 }}>最初の報告を投稿してみましょう！</div>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {posts.map((post, i) => (
            <div key={post.id}
              onClick={()=>setOpenPost(post)}
              style={{ background:"white", border:"1px solid #e8e4dc", borderRadius:14, overflow:"hidden", cursor:"pointer", animation:`fadeUp 0.3s ease ${Math.min(i,8)*0.04}s both` }}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.08)"}}
              onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none"}}>
              {post.image_url && (
                <div style={{ height:200, overflow:"hidden", background:"#f0ede6" }}>
                  <img src={post.image_url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} loading="lazy" />
                </div>
              )}
              <div style={{ padding:"12px 14px 13px" }}>
                <p style={{ fontSize:14, color:"#1a1a1a", margin:"0 0 10px", lineHeight:1.6, display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{post.text}</p>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:11, color:"#bbb" }}>{formatDateTime(post.created_at)}</span>
                  <span style={{ fontSize:11, color:"#bbb" }}>👁 {post.views || 0}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {openPost && <BlogDetailModal post={openPost} onClose={()=>setOpenPost(null)} onViewed={handleViewed} onDelete={handleDelete} />}
    </div>
  );
}

                  onClick={()=>setSel(pop)}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.14)"}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
                  <div style={{ background:"#efefef", minHeight:120, position:"relative" }}>
                    {pop.image_url
                      ? <img src={pop.image_url} alt={pop.product_name} style={{ width:"100%", display:"block", objectFit:"cover" }} loading="lazy" />
                      : <div style={{ height:120, display:"flex", alignItems:"center", justifyContent:"center", color:"#ccc", fontSize:28 }}>🖼</div>}
                    <div style={{ position:"absolute", top:8, left:8, background:"#e05c00", color:"white", fontSize:9, fontWeight:800, padding:"2px 8px", borderRadius:6 }}>{pop.category}</div>
                  </div>
                  <div style={{ padding:"10px 12px 12px" }}>
                    <div style={{ fontWeight:800, fontSize:13, color:"#111", marginBottom:3 }}>{pop.product_name}</div>
                    {pop.comment && <div style={{ fontSize:11, color:"#888", lineHeight:1.45, marginBottom:7, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{pop.comment}</div>}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ background:"#f0f2ff", color:"#4055d4", fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:6 }}>{pop.store_name}</span>
                      <span style={{ fontSize:10, color:"#ccc" }}>{timeAgo(pop.created_at)}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>}
        {tab==="requests" && <RequestBoard currentStore={currentStore} />}
        {tab==="blog" && <BlogBoard />}
      </div>

      {showUp && <UploadModal currentStore={currentStore} onClose={()=>setShowUp(false)} onDone={onDone} />}
      {sel    && <DetailModal pop={sel} onClose={()=>setSel(null)} onDelete={onDelete} currentStore={currentStore} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
