function TodayInfoCard() {
  const [wx, setWx] = useState(null);
  const [warns, setWarns] = useState([]);

  // 気象庁 警報・注意報（島根県→出雲市）
  useEffect(() => {
    const WMAP = {
      "33":{n:"大雨特別警報",lv:3},"32":{n:"暴風雪特別警報",lv:3},"35":{n:"暴風特別警報",lv:3},"36":{n:"大雪特別警報",lv:3},"37":{n:"波浪特別警報",lv:3},"38":{n:"高潮特別警報",lv:3},
      "03":{n:"大雨警報",lv:2},"02":{n:"暴風雪警報",lv:2},"04":{n:"洪水警報",lv:2},"05":{n:"暴風警報",lv:2},"06":{n:"大雪警報",lv:2},"07":{n:"波浪警報",lv:2},"08":{n:"高潮警報",lv:2},
      "10":{n:"大雨注意報",lv:1},"12":{n:"大雪注意報",lv:1},"13":{n:"風雪注意報",lv:1},"14":{n:"雷注意報",lv:1},"15":{n:"強風注意報",lv:1},"16":{n:"波浪注意報",lv:1},"17":{n:"融雪注意報",lv:1},"18":{n:"洪水注意報",lv:1},"19":{n:"高潮注意報",lv:1},"20":{n:"濃霧注意報",lv:1},"21":{n:"乾燥注意報",lv:1},"22":{n:"なだれ注意報",lv:1},"23":{n:"低温注意報",lv:1},"24":{n:"霜注意報",lv:1},"25":{n:"着氷注意報",lv:1},"26":{n:"着雪注意報",lv:1}
    };
    const KEY = "jmaWarnV1";
    const parse = (j) => {
      const out = [];
      try {
        (j.areaTypes || []).forEach(t => (t.areas || []).forEach(a => {
          if (!String(a.code).startsWith("32203")) return; // 出雲市
          (a.warnings || []).forEach(w => {
            if (w.status === "解除") return;
            const m = WMAP[w.code];
            if (m && !out.some(x => x.n === m.n)) out.push(m);
          });
        }));
      } catch(e) {}
      out.sort((a,b) => b.lv - a.lv);
      return out;
    };
    const go = (retry) => fetch("https://www.jma.go.jp/bosai/warning/data/warning/320000.json")
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        if (!j) throw 0;
        const w = parse(j);
        setWarns(w);
        try { localStorage.setItem(KEY, JSON.stringify({ t: Date.now(), w })); } catch(e) {}
      })
      .catch(() => {
        try { const c = JSON.parse(localStorage.getItem(KEY) || "null"); if (c && Date.now() - c.t < 3600000) setWarns(c.w || []); } catch(e) {}
        if (retry > 0) setTimeout(() => go(retry - 1), 6000);
      });
    go(1);
  }, []);
  const [hol, setHol] = useState(null);
  useEffect(() => {
    // 気温：過去7日＋今日を取得して前日差・前週差を計算
    const WURL = "https://api.open-meteo.com/v1/forecast?latitude=35.367&longitude=132.755&daily=weather_code,temperature_2m_max&timezone=Asia%2FTokyo&past_days=7&forecast_days=2";
    const WKEY = "wxCardV1";
    const applyWx = (d) => {
      if (!d || !d.daily || !d.daily.temperature_2m_max) return false;
      const t = d.daily.temperature_2m_max, i = t.length - 2;   // i=今日, i+1=明日
      if (t[i] == null || t[i-1] == null || t[i-7] == null) return false;
      setWx({
        today: Math.round(t[i]), yest: Math.round(t[i-1]), dy: Math.round(t[i] - t[i-1]), dw: Math.round(t[i] - t[i-7]), code: d.daily.weather_code[i],
        tmMax: t[i+1] == null ? null : Math.round(t[i+1]), tmCode: d.daily.weather_code[i+1], tmDiff: t[i+1] == null ? null : Math.round(t[i+1] - t[i])
      });
      return true;
    };
    const goWx = (retry) => fetch(WURL).then(r => r.ok ? r.json() : null).then(d => {
      if (applyWx(d)) { try { localStorage.setItem(WKEY, JSON.stringify({ t: Date.now(), d })); } catch(e) {} }
      else throw 0;
    }).catch(() => {
      try { const c = JSON.parse(localStorage.getItem(WKEY) || "null"); if (c && Date.now() - c.t < 86400000) applyWx(c.d); } catch(e) {}
      if (retry > 0) setTimeout(() => goWx(retry - 1), 5000);
    });
    goWx(2);
    // 祝日：holidays-jp（前年・今年・翌年分）
    fetch("https://holidays-jp.github.io/api/v1/date.json")
      .then(r => r.ok ? r.json() : null)
      .then(hs => {
        if (!hs) return;
        const hset = new Set(Object.keys(hs));
        const now = new Date(); now.setHours(0,0,0,0);
        const pad = n => String(n).padStart(2, "0");
        const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        const todayName = hs[fmt(now)] || null;
        const dates = Object.keys(hs).filter(k => k > fmt(now)).sort();
        if (!dates.length) { setHol({ todayName }); return; }
        const next = dates[0];
        const nd = new Date(next + "T00:00:00");
        const isOff = d => { const w = d.getDay(); return w === 0 || w === 6 || hset.has(fmt(d)); };
        let bs = new Date(nd), be = new Date(nd);
        for (;;) { const q = new Date(bs); q.setDate(q.getDate()-1); if (isOff(q)) bs = q; else break; }
        for (;;) { const q = new Date(be); q.setDate(q.getDate()+1); if (isOff(q)) be = q; else break; }
        const len = Math.round((be - bs) / 86400000) + 1;
        const days = Math.round((nd - now) / 86400000);
        setHol({ todayName, date: nd, name: hs[next], blockStart: bs, blockEnd: be, len, days });
      }).catch(() => {});
  }, []);
  // ハレの日（行事）：固定日＋年ごとの可変日（土用の丑・彼岸・母の日・父の日）
  const events = (() => {
    const now = new Date(); now.setHours(0,0,0,0);
    const mk = (y, m, d, name, food) => ({ date: new Date(y, m-1, d), name, food });
    const nthSunday = (y, m, n) => { const first = new Date(y, m-1, 1); const off = (7 - first.getDay()) % 7; return new Date(y, m-1, 1 + off + (n-1)*7); };
    const USHI = { 2026:[[7,26,"土用の丑"]], 2027:[[7,21,"土用の丑"],[8,2,"土用の二の丑"]], 2028:[[7,27,"土用の丑"]] };
    const HIGAN = { 2026:[[3,17],[9,20]], 2027:[[3,18],[9,20]], 2028:[[3,17],[9,19]] };
    const list = [];
    for (const y of [now.getFullYear(), now.getFullYear()+1]) {
      list.push(
        mk(y,1,1,"お正月","刺身・おせち"), mk(y,2,3,"節分","恵方巻"), mk(y,3,3,"ひな祭り","ちらし寿司・はまぐり"),
        mk(y,5,5,"こどもの日","お祝い・ちらし"), mk(y,7,2,"半夏生","タコ"), mk(y,7,7,"七夕","ちらし・そうめん"),
        mk(y,8,13,"お盆入り","刺身・お供え"), mk(y,10,31,"ハロウィン",null), mk(y,12,22,"冬至",null),
        mk(y,12,24,"クリスマス","オードブル・寿司"), mk(y,12,31,"大晦日","刺身・寿司")
      );
      const ms = nthSunday(y,5,2); list.push({ date:ms, name:"母の日", food:"ごちそう・お祝い" });
      const fs = nthSunday(y,6,3); list.push({ date:fs, name:"父の日", food:"ごちそう・晩酌のあて" });
      (USHI[y]||[]).forEach(([m,d,nm]) => list.push(mk(y,m,d,nm,"うなぎ・スタミナ")));
      (HIGAN[y]||[]).forEach(([m,d]) => list.push(mk(y,m,d,(m<6?"春":"秋")+"彼岸入り","お供え・お寿司")));
    }
    list.forEach(e => e.date.setHours(0,0,0,0));
    const todayEv = list.find(e => e.date.getTime() === now.getTime()) || null;
    const up = list.filter(e => e.date > now && (e.date - now)/86400000 <= 60).sort((a,b)=>a.date-b.date);
    return { todayEv, next: up[0] || null, next2: up[1] || null };
  })();
  const jd = d => `${d.getMonth()+1}/${d.getDate()}`;
  const wd = d => ["日","月","火","水","木","金","土"][d.getDay()];
  const wmoIcon = (c) => {
    if (c === 0) return { e:"☀️", t:"快晴" };
    if (c === 1) return { e:"🌤", t:"晴れ" };
    if (c === 2) return { e:"⛅", t:"時々曇り" };
    if (c === 3) return { e:"☁️", t:"曇り" };
    if (c === 45 || c === 48) return { e:"🌫", t:"霧" };
    if (c >= 51 && c <= 57) return { e:"🌦", t:"霧雨" };
    if (c >= 61 && c <= 67) return { e:"🌧", t:"雨" };
    if (c >= 71 && c <= 77) return { e:"❄️", t:"雪" };
    if (c >= 80 && c <= 82) return { e:"🌦", t:"にわか雨" };
    if (c === 85 || c === 86) return { e:"🌨", t:"にわか雪" };
    if (c >= 95) return { e:"⛈", t:"雷雨" };
    return { e:"☁️", t:"曇り" };
  };
  const sign = v => v > 0 ? `+${v}°` : v < 0 ? `${v}°` : "±0°";
  const dcol = v => v > 0 ? "var(--primary)" : v < 0 ? "#4a86c5" : "#888";
  const rainy = wx && ((wx.code >= 61 && wx.code <= 67) || (wx.code >= 80 && wx.code <= 82) || wx.code >= 95);
  let hint = null;
  if (wx) {
    if (wx.dy >= 3) hint = "昨日よりグッと暑い日。刺身・たたき・冷たい系が動きやすい。";
    else if (wx.dy <= -3) hint = "昨日より涼しい日。鍋・煮付け・フライなど温か系が動きやすい。";
    else if (rainy) hint = "雨予報。まとめ買い・簡便系の提案が効きやすい日。";
  }
  const now = new Date();
  return (
    <div className="wcard">
      <div style={{ display:"flex", alignItems:"baseline", gap:8, marginBottom:6, flexWrap:"wrap" }}>
        <span style={{ fontSize:12.5, fontWeight:900, color:"var(--ink)" }}>今日の情報</span>
        <span style={{ fontSize:11.5, color:"var(--ink)", fontWeight:800 }}>{jd(now)}（{wd(now)}）<span style={{ color:"var(--sub)", fontWeight:800 }}>　出雲市</span>{hol && hol.todayName ? `・今日は「${hol.todayName}」🎌` : ""}{events.todayEv ? `・今日は「${events.todayEv.name}」${events.todayEv.food ? "〈"+events.todayEv.food+"〉" : ""}` : ""}</span>
      </div>
      {(() => {
        const chips = [];
        warns.forEach(w => chips.push({ t:(w.lv >= 2 ? "⚠️ " : "") + w.n, lv:w.lv }));
        if (wx && wx.today >= 35) chips.push({ t:"🥵 猛暑日予想", lv:2 });
        else if (wx && wx.today >= 33) chips.push({ t:"☀️ 厳しい暑さ", lv:1 });
        if (!chips.length) return null;
        const shike = warns.some(w => ["波浪警報","波浪注意報","強風注意報","暴風警報","波浪特別警報","暴風特別警報"].includes(w.n));
        return (
          <div style={{ marginBottom:7 }}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {chips.map((c,i) => (
                <span key={i} style={{ fontSize:11, fontWeight:800, borderRadius:8, padding:"3px 9px",
                  background: c.lv >= 3 ? "#3b0d3f" : c.lv === 2 ? "#fdeaea" : "#fff6de",
                  color: c.lv >= 3 ? "#fff" : c.lv === 2 ? "#b3261e" : "#8a6d00",
                  border: c.lv >= 3 ? "none" : c.lv === 2 ? "1px solid #f3c1bd" : "1px solid #eeddad" }}>{c.t}</span>
              ))}
            </div>
            {shike && <div style={{ fontSize:11.5, color:"#b3261e", fontWeight:800, marginTop:5 }}>🌊 時化のおそれ：入荷・地物に影響が出るかも</div>}

      <div style={{ fontSize:12.5, fontWeight:700, color:"var(--text)", lineHeight:1.8, textAlign:"left" }}>
        {wx && (

            <div style={{ display:"flex", alignItems:"center", padding:"3px 0 2px" }}>

                <div style={{ fontSize:10.5, color:"var(--ink)", fontWeight:800, lineHeight:1.3 }}>昨日</div>
                <div style={{ fontSize:15, fontWeight:800, color:"var(--ink)", lineHeight:1.4 }}>{wx.yest}°</div>
              </div>
              <div style={{ fontSize:26, fontWeight:900, color:dcol(wx.dy), flexShrink:0, lineHeight:1, padding:"0 2px", textShadow:"0.6px 0 currentColor, -0.6px 0 currentColor" }}>{wx.dy > 0 ? "↗" : wx.dy < 0 ? "↘" : "→"}</div>
              <div style={{ textAlign:"center", flex:1.3 }}>
                <div style={{ fontSize:10.5, color:"var(--ink)", fontWeight:800, lineHeight:1.3 }}>今日</div>
                <div style={{ fontSize:18, fontWeight:900, color:"var(--ink)", lineHeight:1.4 }}>{wmoIcon(wx.code).e}{wx.today}°</div>
              </div>
              {wx.tmMax != null && (
                <>
                  <div style={{ fontSize:26, fontWeight:900, color:dcol(wx.tmDiff), flexShrink:0, lineHeight:1, padding:"0 2px", textShadow:"0.6px 0 currentColor, -0.6px 0 currentColor" }}>{wx.tmDiff > 0 ? "↗" : wx.tmDiff < 0 ? "↘" : "→"}</div>
                  <div style={{ textAlign:"center", flex:1 }}>
                    <div style={{ fontSize:10.5, color:"var(--ink)", fontWeight:800, lineHeight:1.3 }}>明日</div>
                    <div style={{ fontSize:15, fontWeight:800, color:"var(--ink)", lineHeight:1.4 }}>{wmoIcon(wx.tmCode).e}{wx.tmMax}°</div>
                  </div>
                </>
              )}
            </div>
            <div style={{ fontSize:11, color:"var(--ink)", textAlign:"center", fontWeight:800, marginBottom:2 }}>先週より<span style={{ color:dcol(wx.dw) }}>{sign(wx.dw)}</span>{wx.dw > 0 ? "、暑い一日" : wx.dw < 0 ? "、涼しい一日" : ""}</div>
          </>
        )}
        {wx && (hint || hol && hol.date || events.next) ? <div style={{ height:1, background:"var(--line)", margin:"7px 0" }} /> : null}
        {hint && <div style={{ fontSize:12, color:"#a8480a", fontWeight:700 }}>💡 {hint}</div>}
        {(() => {
          const badge = (days) => <span style={{ background:"var(--soft)", color:"var(--soft-text)", borderRadius:7, padding:"1px 7px", marginLeft:5, fontSize:11, fontWeight:800, whiteSpace:"nowrap" }}>{days === 1 ? "明日" : `あと${days}日`}</span>;
          const rows = [];
          if (hol && hol.date) rows.push({ t: +hol.date, el: (
            <div key="hol">🎌 {jd(hol.date)}（{wd(hol.date)}）{hol.name}{hol.len >= 2 ? `・${hol.len}連休（${jd(hol.blockStart)}〜${jd(hol.blockEnd)}）` : ""}{badge(hol.days)}</div>
          )});
          if (events.next) rows.push({ t: +events.next.date, el: (

          )});
          rows.sort((a, b) => a.t - b.t);
          return rows.map(r => r.el);
        })()}
      </div>
    </div>
  );
}

function WeatherWidget({ onTheme }) {

  const emit = React.useCallback((dd) => { try { if (onTheme && dd && dd.weather_code) onTheme(dd.weather_code[0]); } catch(e) {} }, [onTheme]);
  const loadWx = React.useCallback(() => {
    setWxFailed(false);
    const URL = "https://api.open-meteo.com/v1/forecast?latitude=35.367&longitude=132.755&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=2";
    const KEY = "wxHeadV1";
    const ok = (d) => { if (d && d.daily) { setDaily(d.daily); emit(d.daily); try { localStorage.setItem(KEY, JSON.stringify({ t: Date.now(), d })); } catch(e) {} return true; } return false; };
    const fallback = () => { try { const c = JSON.parse(localStorage.getItem(KEY) || "null"); if (c && Date.now() - c.t < 86400000 && c.d && c.d.daily) { setDaily(c.d.daily); emit(c.d.daily); return true; } } catch(e) {} return false; };
    const go = (retry) => fetch(URL).then(r => r.ok ? r.json() : null).then(d => { if (!ok(d)) throw 0; }).catch(() => {
      if (retry > 0) { setTimeout(() => go(retry - 1), 5000); return; }
      if (!fallback()) setWxFailed(true);
    });
    go(2);
  }, []);
  useEffect(() => { loadWx(); }, [loadWx]);
  if (!daily) {
    if (!wxFailed) return null;
    return (

    if (c >= 61 && c <= 67) return { e:"🌧", t:"雨" };
    if (c >= 71 && c <= 77) return { e:"❄️", t:"雪" };
    if (c >= 80 && c <= 82) return { e:"🌦", t:"にわか雨" };
    if (c === 85 || c === 86) return { e:"🌨", t:"にわか雪" };

    return { e:"☁️", t:"曇り" };
  };

  const Day = ({ label, i }) => {

function gneCalcTax(price, mode, rate) {
  const r = (rate == null || isNaN(+rate)) ? 8 : +rate;
  const raw = price * (1 + r / 100);
  if (mode === "ceil") return Math.ceil(raw);
  if (mode === "floor") return Math.floor(raw);
  return Math.round(raw);
}
function gneSanitize(s) { return String(s).replace(/[\\/:*?"<>|]/g, "_").trim(); }

function gneDrawField(ctx, text, cfg, font) {
  if (text == null || text === "") return;
  text = String(text);
  const fam = font ? `"${font.family}", "Hiragino Sans", sans-serif` : GNE_FONT_STACK;
  const wt = font ? font.weight : "900";
  let size = cfg.size;
  ctx.textAlign = cfg.align;
  ctx.textBaseline = "middle";
  ctx.font = `${wt} ${size}px ${fam}`;
  if (cfg.maxW) {
    while (ctx.measureText(text).width > cfg.maxW && size > 12) {
      size -= 4;
      ctx.font = `${wt} ${size}px ${fam}`;
    }
  }
  ctx.lineJoin = "round";
  ctx.miterLimit = 2;
  ctx.strokeStyle = cfg.stroke;
  ctx.lineWidth = cfg.sw * 2;
  ctx.strokeText(text, cfg.x, cfg.y);
  ctx.fillStyle = cfg.fill;
  ctx.fillText(text, cfg.x, cfg.y);
}

function gneRender(ctx, f, tpl, taxMode, font, taxRate) {
  ctx.clearRect(0, 0, GNE_W, GNE_H);
  if (tpl) {
    ctx.drawImage(tpl, 0, 0, GNE_W, GNE_H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, GNE_H);
    g.addColorStop(0, "#cdddee"); g.addColorStop(1, "#aac2dd");
    ctx.fillStyle = g; ctx.fillRect(0, 0, GNE_W, GNE_H);
    ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.fillRect(40, 40, GNE_W - 80, 940);
    ctx.fillStyle = "#5a708c"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = `900 46px ${GNE_FONT_STACK}`;
    ctx.fillText("テンプレ画像を選択してください", GNE_W / 2, 500);
  }
  if (f.origin) gneDrawField(ctx, f.origin, GNE_LAYOUT.origin, font);
  if (f.name)   gneDrawField(ctx, f.name,   GNE_LAYOUT.name, font);
  if (f.count)  gneDrawField(ctx, f.count,  GNE_LAYOUT.count, font);
  if (f.price !== "" && f.price != null && !isNaN(+f.price)) {
    const p = parseInt(f.price, 10);
    gneDrawField(ctx, String(p), GNE_LAYOUT.price, font);
    gneDrawField(ctx, `${gneCalcTax(p, taxMode, taxRate)}円`, GNE_LAYOUT.taxPrice, font);
  }
  gneDrawField(ctx, GNE_FIXED.plus, GNE_LAYOUT.plus, font);
  gneDrawField(ctx, GNE_FIXED.yen, GNE_LAYOUT.yen, font);
  gneDrawField(ctx, GNE_FIXED.taxLabel, GNE_LAYOUT.taxLabel, font);
}

      <div style={{ display:"grid", gridTemplateColumns:"minmax(0, 1fr)", gap:14 }}>

          <canvas ref={previewRef} width={GNE_W} height={GNE_H} style={{ width:"100%", maxWidth:"100%", height:"auto", borderRadius:10, border:"1px solid var(--line)", display:"block" }} />
        </div>

        <div style={card}>

          <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:4 }}>
            {GNE_FONTS.map(o => {

                    borderRadius:12, padding:"9px 14px", fontSize:14, fontWeight:800, cursor:"pointer", whiteSpace:"nowrap" }}>
                  {o.label}
                </button>

            })}
          </div>
        </div>

        <div style={{ ...card, display:"flex", flexDirection:"column", gap:10 }}>
          <div style={{ fontSize:14, fontWeight:800, color:"var(--ink)" }}>単品入力（ライブプレビュー）</div>
          {[["産地","origin"],["商品名","name"],["個数","count"],["本体価格","price"]].map(([label, key]) => (
            <div key={key}>
              <div style={{ fontSize:12, color:"var(--sub)", marginBottom:4 }}>{label}</div>
              <input value={f[key]} onChange={set(key)} inputMode={key === "price" ? "numeric" : "text"}

                <option value="ceil">切り上げ</option>

            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
              <span style={{ fontSize:12, color:"var(--sub)", marginRight:2 }}>税率</span>

                <button key={r} onClick={() => setTaxRate(r)}

          <div style={{ fontSize:12, color:"var(--sub)" }}>列：産地／商品名／個数／本体価格。読み込んで ZIP で一括出力。</div>
          <button onClick={() => xlsxInput.current && xlsxInput.current.click()} style={{ border:"1px dashed #ccc", background:"var(--bg)", borderRadius:10, padding:"10px 14px", fontSize:14, fontWeight:700, color:"var(--text)", cursor:"pointer", width:"fit-content" }}>.xlsx を選択</button>
          <input ref={xlsxInput} type="file" accept=".xlsx,.xls" onChange={(e) => onExcel(e.target.files[0])} style={{ display:"none" }} />

          {status && <div style={{ fontSize:12, color:"var(--sub)" }}>{status}</div>}

      </div>
    </div>
  );

// ===== 相場タブ：先週比の「相場安」計算＋売価計算（プロトタイプ） =====
function soubaWari(pct) {
  const w = Math.round(Math.abs(pct) / 10 * 2) / 2; // 0.5割きざみ
  if (w <= 0) return "";
  const s = Number.isInteger(w) ? String(w) : w.toFixed(1);
  return `約${s}割`;
}

// ===== POP診断：画像をブラウザ内で解析（外部送信なし） =====
const POPCHECK_TH = {  // 閾値（あとで調整しやすいよう定数化）
  RESIZE: 480,          // 解析用の最大辺
  SAMPLE_STEP: 4,       // KMeansのサンプリング間隔（px）
  KMEANS_K: 8, KMEANS_ITER: 10, COLOR_MIN_SHARE: 0.05,
  EDGE_MAG: 60,         // エッジ判定のしきい値
  MARGIN_BAND: 0.08,    // 余白判定：端から8%
  BRIGHT_IDEAL: 62, CONTRAST_LO: 40, CONTRAST_HI: 78, SAT_HI: 60, CLUTTER_HI: 45,
};

function popcheckAnalyze(img) {
  const T = POPCHECK_TH;
  const scale = Math.min(1, T.RESIZE / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.max(1, Math.round(img.naturalWidth * scale));
  const h = Math.max(1, Math.round(img.naturalHeight * scale));
  const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
  const ctx = cv.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(img, 0, 0, w, h);
  const d = ctx.getImageData(0, 0, w, h).data;
  const N = w * h;

  // --- 輝度・彩度 ---
  const luma = new Float32Array(N);
  let sumL = 0, sumS = 0;
  for (let i = 0; i < N; i++) {
    const r = d[i*4], g = d[i*4+1], b = d[i*4+2];
    const l = 0.299*r + 0.587*g + 0.114*b;
    luma[i] = l; sumL += l;
    const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
    sumS += mx === 0 ? 0 : (mx - mn) / mx;
  }
  const meanL = sumL / N;
  let varL = 0; for (let i = 0; i < N; i++) varL += (luma[i]-meanL)*(luma[i]-meanL);
  const stdL = Math.sqrt(varL / N);
  const brightness = Math.round(meanL / 255 * 100);
  const saturation = Math.round(sumS / N * 100);
  const contrast = Math.round(Math.min(100, stdL / 80 * 100));

  // --- エッジ（Sobel） ---
  const edge = new Uint8Array(N);
  let edgeCount = 0;
  for (let y = 1; y < h-1; y++) for (let x = 1; x < w-1; x++) {
    const i = y*w+x;
    const gx = -luma[i-w-1] - 2*luma[i-1] - luma[i+w-1] + luma[i-w+1] + 2*luma[i+1] + luma[i+w+1];
    const gy = -luma[i-w-1] - 2*luma[i-w] - luma[i-w+1] + luma[i+w-1] + 2*luma[i+w] + luma[i+w+1];
    if (Math.sqrt(gx*gx + gy*gy) > T.EDGE_MAG) { edge[i] = 1; edgeCount++; }
  }
  const clutter = Math.round(Math.min(100, edgeCount / N * 100 * 2.4));

  // --- 余白（端バンドのエッジ密度） ---
  const band = Math.max(2, Math.round(Math.min(w, h) * T.MARGIN_BAND));
  const bandDensity = (x0, y0, x1, y1) => {
    let c = 0, n = 0;
    for (let y = y0; y < y1; y++) for (let x = x0; x < x1; x++) { n++; if (edge[y*w+x]) c++; }
    return n ? c / n : 0;
  };
  const eTop = bandDensity(0, 0, w, band);
  const eBottom = bandDensity(0, h-band, w, h);
  const eLeft = bandDensity(0, 0, band, h);
  const eRight = bandDensity(w-band, 0, w, h);
  const worst = Math.max(eTop, eBottom, eLeft, eRight);
  const marginScore = Math.round(Math.max(0, 100 - worst * 100 * 2.2));

  // --- KMeans 主要色 ---
  const samples = [];
  for (let y = 0; y < h; y += T.SAMPLE_STEP) for (let x = 0; x < w; x += T.SAMPLE_STEP) {
    const i = (y*w+x)*4; samples.push([d[i], d[i+1], d[i+2]]);
  }
  let cents = [];
  for (let k = 0; k < T.KMEANS_K; k++) cents.push(samples[Math.floor(samples.length * (k + 0.5) / T.KMEANS_K)].slice());
  let asn = new Array(samples.length).fill(0);
  for (let it = 0; it < T.KMEANS_ITER; it++) {
    for (let si = 0; si < samples.length; si++) {
      let bd = 1e12, bi = 0;
      for (let k = 0; k < cents.length; k++) {
        const dx = samples[si][0]-cents[k][0], dy = samples[si][1]-cents[k][1], dz = samples[si][2]-cents[k][2];
        const dist = dx*dx + dy*dy + dz*dz;
        if (dist < bd) { bd = dist; bi = k; }
      }
      asn[si] = bi;
    }
    const acc = cents.map(() => [0,0,0,0]);
    for (let si = 0; si < samples.length; si++) { const a = acc[asn[si]]; a[0]+=samples[si][0]; a[1]+=samples[si][1]; a[2]+=samples[si][2]; a[3]++; }
    cents = acc.map((a,k) => a[3] ? [a[0]/a[3], a[1]/a[3], a[2]/a[3]] : cents[k]);
  }
  const shares = cents.map((c,k) => ({ c, n: asn.filter(a => a === k).length / samples.length })).sort((a,b) => b.n - a.n);
  const colorCount = shares.filter(x => x.n >= T.COLOR_MIN_SHARE).length;
  const hex = v => "#" + [0,1,2].map(j => Math.round(v[j]).toString(16).padStart(2,"0")).join("");
  const dominant = shares.slice(0, 5).map(x => hex(x.c));

  return { brightness, saturation, contrast, clutter, marginScore, colorCount, dominant,
           edges: { top: eTop, bottom: eBottom, left: eLeft, right: eRight } };
}

function popcheckJudge(m) {
  const T = POPCHECK_TH;
  const lv = {}, cm = {};
  // 色数
  lv.color = m.colorCount <= 4 ? "少なめ" : m.colorCount <= 6 ? "適度" : "やや多い";
  cm.color = m.colorCount <= 4 ? "色数が絞られていて、まとまりのある印象です。"
    : m.colorCount <= 6 ? "色数は適度で、まとまりがあります。"
    : "主要色が多く、少しにぎやかに見える可能性があります。使う色を2〜3色に絞ると締まります。";
  // 明るさ
  lv.brightness = m.brightness >= 78 ? "かなり明るい" : m.brightness >= 55 ? "明るい" : m.brightness >= 35 ? "適度" : "暗め";
  cm.brightness = m.brightness >= 78 ? "かなり明るいため、白背景や黄色部分が眩しく見える可能性があります。"
    : m.brightness >= 55 ? "全体的に明るく、売場で目立ちやすいです。"
    : m.brightness >= 35 ? "明るさは落ち着いていて、上品な印象です。"
    : "やや暗めなので、商品名やメインコピーの視認性に注意してください。";
  // 彩度
  lv.saturation = m.saturation >= T.SAT_HI ? "高め" : m.saturation >= 30 ? "適度" : "落ち着き";
  cm.saturation = m.saturation >= 75 ? "彩度が高すぎるため、派手さや眩しさが出る可能性があります。"
    : m.saturation >= T.SAT_HI ? "彩度が高く、かなり目を引くPOPです。"
    : m.saturation >= 30 ? "彩度のバランスが良く、自然に目に入ります。"
    : "彩度は落ち着いており、和モダンな印象に向いています。";
  // コントラスト
  lv.contrast = m.contrast >= T.CONTRAST_HI ? "強め" : m.contrast >= T.CONTRAST_LO ? "適度" : "弱め";
  cm.contrast = m.contrast >= T.CONTRAST_HI ? "コントラストが強すぎるため、全体が少し騒がしく見える可能性があります。"
    : m.contrast >= T.CONTRAST_LO ? "コントラストがしっかりあり、見出しが目立ちやすい構成です。"
    : "コントラストが弱めなので、文字と背景の差を強くすると見やすくなります。";
  // 情報量
  lv.clutter = m.clutter >= 65 ? "多い" : m.clutter >= T.CLUTTER_HI ? "やや多い" : "適度";
  cm.clutter = m.clutter >= 65 ? "背景・イラスト・文字要素が多く、売場では少し読みにくい可能性があります。"
    : m.clutter >= T.CLUTTER_HI ? "細かい要素が多く、やや情報量が多いPOPです。"
    : "情報量は適度で、見やすい構成です。";
  // 余白
  lv.margin = m.marginScore >= 65 ? "十分" : m.marginScore >= 45 ? "やや狭い" : "狭い";
  const worstSide = Object.entries(m.edges).sort((a,b) => b[1]-a[1])[0][0];
  const sideJa = { top:"上", bottom:"下", left:"左", right:"右" }[worstSide];
  cm.margin = m.marginScore >= 65 ? "余白は比較的安定しており、印刷時にも安心です。"
    : m.marginScore >= 45 ? `${sideJa}端に要素が近く、印刷時に少し窮屈に見える可能性があります。`
    : `${sideJa}端をはじめ要素が端に詰まっていて、窮屈に見える可能性があります。`;

  // 個別の良さスコア（0-100）
  const gBright = Math.max(0, 100 - Math.abs(m.brightness - T.BRIGHT_IDEAL) * 1.6);
  const gSat = m.saturation <= T.SAT_HI ? 100 : Math.max(0, 100 - (m.saturation - T.SAT_HI) * 2.0);
  const gCon = (m.contrast >= T.CONTRAST_LO && m.contrast <= T.CONTRAST_HI) ? 100 : Math.max(0, 100 - Math.min(Math.abs(m.contrast - T.CONTRAST_LO), Math.abs(m.contrast - T.CONTRAST_HI)) * 1.8);
  const gClut = m.clutter <= T.CLUTTER_HI ? 100 : Math.max(0, 100 - (m.clutter - T.CLUTTER_HI) * 1.8);
  const gCol = m.colorCount <= 6 ? 100 : Math.max(0, 100 - (m.colorCount - 6) * 12);
  const total = Math.round(gBright*0.15 + gSat*0.2 + gCon*0.15 + gClut*0.25 + m.marginScore*0.1 + gCol*0.15);
  const grade = total >= 85 ? "A" : total >= 70 ? "B" : total >= 55 ? "C" : "D";

  const good = [];
  if (m.brightness >= 55 && m.brightness < 78) good.push("明るく目を引きやすい");
  if (m.contrast >= T.CONTRAST_LO && m.contrast <= T.CONTRAST_HI) good.push("見出しが目立ちやすいコントラスト");
  if (m.colorCount <= 6) good.push("色数がまとまっている");
  if (m.clutter < T.CLUTTER_HI) good.push("情報量が適度で読みやすい");
  if (m.marginScore >= 65) good.push("余白が安定していて印刷に安心");
  if (m.saturation >= 30 && m.saturation < T.SAT_HI) good.push("彩度のバランスが自然");
  if (!good.length) good.push("売場で注目されやすい存在感がある");

  const imp = [];
  if (m.saturation >= T.SAT_HI) imp.push("背景の彩度を少し下げる");
  if (m.clutter >= T.CLUTTER_HI) imp.push("説明文や装飾を少し減らす");
  if (m.marginScore < 65) imp.push("上下左右の余白を少し増やす");
  if (m.colorCount > 6) imp.push("使う色を2〜3色に絞る");
  if (m.brightness >= 78) imp.push("白・黄色の面積を少し抑える");
  if (m.brightness < 35) imp.push("背景を明るくして文字を読みやすく");
  if (m.contrast < T.CONTRAST_LO) imp.push("文字と背景の明暗差を強くする");
  if (!imp.length) imp.push("このままでOK。現状のバランスを保って");

  const summary = total >= 85 ? "色数・明るさ・余白のバランスが良く、売場で使いやすいPOPです。"
    : total >= 70 ? "全体的に目を引くPOPですが、" + (m.saturation >= T.SAT_HI ? "彩度" : "一部の要素") + (m.clutter >= T.CLUTTER_HI ? "と情報量がやや高めです。" : "がやや強めです。") + "少し整えるとさらに見やすくなります。"
    : total >= 55 ? "見出しは目立ちますが、要素が多めでややごちゃついて見える可能性があります。装飾を減らし余白を作ると改善します。"
    : "売場で読みにくくなる要素が重なっています。色数・情報量・余白を見直すことをおすすめします。";

  return { total, grade, summary, lv, cm, good, imp };
}

function PopCheckTab() {
  const [src, setSrc] = useState(null);
  const [busy, setBusy] = useState(false);
  const [res, setRes] = useState(null);
  const [err, setErr] = useState("");
  const [picker, setPicker] = useState(false);
  const [recent, setRecent] = useState([]);
  const imgRef = React.useRef(null);

  const runAnalyze = () => {
    const img = imgRef.current;
    if (!img || !img.complete || !img.naturalWidth) { setErr("画像の読み込みが終わっていません。少し待ってから再度お試しください。"); return; }
    setBusy(true); setErr("");
    setTimeout(() => {
      try {
        const m = popcheckAnalyze(img);
        const j = popcheckJudge(m);
        setRes({ m, j });
      } catch(e) {
        console.error(e);
        setErr("解析に失敗しました。画像形式が未対応（HEICなど）の可能性があります。JPEG/PNGでお試しください。");
      } finally { setBusy(false); }
    }, 60);
  };

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setRes(null); setErr("");
    setSrc(URL.createObjectURL(f));
  };

  const openPicker = async () => {
    setPicker(true);
    if (!recent.length) {
      try { const d = await api.listActive(); setRecent(d.slice(0, 12)); } catch(e) {}
    }
  };

  const barColor = (v) => v >= 70 ? "#1a6b3a" : v >= 45 ? "#C7892B" : "#b3261e";
  const Row = ({ label, level, score, comment }) => (
    <div style={{ marginBottom:11 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:12.5, fontWeight:900, color:"var(--ink)", width:78, flexShrink:0 }}>{label}</span>
        <span style={{ fontSize:11, fontWeight:800, color:"var(--soft-text)", background:"var(--soft)", borderRadius:6, padding:"1px 7px", flexShrink:0 }}>{level}</span>
        <div style={{ flex:1, height:6, background:"var(--chip)", borderRadius:3, overflow:"hidden" }}>
          <div style={{ width:`${score}%`, height:"100%", background:barColor(score), borderRadius:3, transition:"width .5s ease" }} />
        </div>
        <span style={{ fontSize:11, fontWeight:800, color:"var(--sub)", width:26, textAlign:"right", flexShrink:0 }}>{score}</span>
      </div>
      <div style={{ fontSize:11.5, color:"var(--text)", lineHeight:1.6, marginTop:3, paddingLeft:2 }}>{comment}</div>
    </div>
  );

  return (
    <div className="min-vh" style={{ background:"var(--bg)" }}>
      <div style={{ background:"linear-gradient(135deg,#1a6b3a,#2f8a52)", padding:"calc(env(safe-area-inset-top) + 20px) 16px 22px" }}>
        <div style={{ maxWidth:600, margin:"0 auto" }}>
          <div style={{ color:"#fff", fontSize:18, fontWeight:900 }}>POP診断</div>
          <div style={{ color:"rgba(255,255,255,0.85)", fontSize:12, marginTop:2 }}>色・明るさ・情報量・余白を自動チェック。画像は外部に送信されません</div>
        </div>
      </div>
      <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 16px 120px" }}>

        <div className="wcard">
          <div style={{ display:"flex", gap:8 }}>
            <label style={{ flex:1, display:"block", textAlign:"center", border:"1.5px dashed var(--line)", borderRadius:11, padding:"14px 8px", fontSize:13, fontWeight:800, color:"var(--text)", cursor:"pointer", background:"var(--bg)" }}>
              📷 画像を選ぶ
              <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
            </label>
            <button onClick={openPicker} style={{ flex:1, border:"1.5px solid var(--line)", background:"#fff", borderRadius:11, fontSize:13, fontWeight:800, color:"var(--text)", cursor:"pointer" }}>🗂 最近のPOPから</button>
          </div>
          {picker && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginTop:10 }}>
              {recent.length === 0 ? <div style={{ gridColumn:"1/-1", fontSize:12, color:"var(--faint)", textAlign:"center", padding:"10px 0" }}>読み込み中…</div>
                : recent.map(pp => (
                  <img key={pp.id} src={pp.image_url} onClick={() => { setRes(null); setErr(""); setSrc(pp.image_url); setPicker(false); }}
                    style={{ width:"100%", aspectRatio:"1/1", objectFit:"cover", borderRadius:8, cursor:"pointer", border:"1px solid var(--line)" }} />
                ))}
            </div>
          )}
        </div>

        {src && (
          <div className="wcard" style={{ textAlign:"center" }}>
            <img ref={imgRef} src={src} crossOrigin="anonymous"
              onError={() => setErr("画像を読み込めませんでした。形式が未対応（HEICなど）の可能性があります。")}
              style={{ maxWidth:"100%", maxHeight:260, borderRadius:10, border:"1px solid var(--line)" }} />
            <button onClick={runAnalyze} disabled={busy}
              style={{ display:"block", width:"100%", marginTop:11, border:"none", background: busy ? "#f0b48a" : "var(--primary)", color:"#fff", borderRadius:11, padding:"12px", fontSize:14.5, fontWeight:900, cursor: busy ? "default" : "pointer" }}>
              {busy ? "解析中…" : "🩺 このPOPを診断する"}
            </button>
          </div>
        )}

        {err && <div style={{ background:"#fdeaea", border:"1px solid #f3c1bd", color:"#b3261e", borderRadius:11, padding:"11px 13px", fontSize:12.5, fontWeight:700, marginBottom:12 }}>{err}</div>}

        {res && (
          <>
            <div className="wcard" style={{ textAlign:"center" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:14 }}>
                <div style={{ width:74, height:74, borderRadius:"50%", background: res.j.total >= 70 ? "#1a6b3a" : res.j.total >= 55 ? "#C7892B" : "#b3261e", color:"#fff", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <div style={{ fontSize:27, fontWeight:900, lineHeight:1 }}>{res.j.grade}</div>
                  <div style={{ fontSize:11, fontWeight:800 }}>{res.j.total}点</div>
                </div>
                <div style={{ fontSize:12.5, color:"var(--text)", lineHeight:1.75, textAlign:"left", fontWeight:700 }}>{res.j.summary}</div>
              </div>
              <div style={{ display:"flex", justifyContent:"center", gap:6, marginTop:12 }}>
                {res.m.dominant.map(c => (
                  <div key={c} style={{ textAlign:"center" }}>
                    <div style={{ width:34, height:34, borderRadius:9, background:c, border:"1px solid var(--line)" }} />
                    <div style={{ fontSize:8.5, color:"var(--faint)", marginTop:2 }}>{c}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:10.5, color:"var(--sub)", marginTop:6 }}>主要カラー　／　推定色数：{res.m.colorCount}色</div>
            </div>

            <div className="wcard">
              <div style={{ fontSize:13.5, fontWeight:900, color:"var(--ink)", marginBottom:12 }}>診断項目</div>
              <Row label="色数" level={res.j.lv.color} score={res.m.colorCount <= 6 ? 100 - (res.m.colorCount-3)*8 : Math.max(20, 100-(res.m.colorCount-6)*15)} comment={res.j.cm.color} />
              <Row label="明るさ" level={res.j.lv.brightness} score={res.m.brightness} comment={res.j.cm.brightness} />
              <Row label="彩度" level={res.j.lv.saturation} score={res.m.saturation} comment={res.j.cm.saturation} />
              <Row label="コントラスト" level={res.j.lv.contrast} score={res.m.contrast} comment={res.j.cm.contrast} />
              <Row label="情報量" level={res.j.lv.clutter} score={res.m.clutter} comment={res.j.cm.clutter} />
              <Row label="余白" level={res.j.lv.margin} score={res.m.marginScore} comment={res.j.cm.margin} />
            </div>

            <div className="wcard">
              <div style={{ fontSize:13, fontWeight:900, color:"#1a6b3a", marginBottom:7 }}>👍 良い点</div>
              {res.j.good.map((g,i) => <div key={i} style={{ fontSize:12.5, color:"var(--text)", lineHeight:1.9 }}>・{g}</div>)}
              <div style={{ height:1, background:"var(--line)", margin:"10px 0" }} />
              <div style={{ fontSize:13, fontWeight:900, color:"var(--primary)", marginBottom:7 }}>🔧 改善案</div>
              {res.j.imp.map((g,i) => <div key={i} style={{ fontSize:12.5, color:"var(--text)", lineHeight:1.9 }}>・{g}</div>)}
            </div>
            <div style={{ fontSize:11, color:"var(--faint)", textAlign:"center", lineHeight:1.7 }}>診断は機械的な目安です。最後は売場での見え方を優先してください。</div>
          </>
        )}
      </div>
    </div>
  );
}

function FishTab() {
  const [q, setQ] = useState("");
  const [openIdx, setOpenIdx] = useState(null);
  const nowM = new Date().getMonth() + 1;
  const inSeason = f => f.months.includes(nowM);
  const seasonAll = f => f.months.length >= 12;
  const nq = normJa(q);
  const list = FISH_DB
    .filter(f => !nq || normJa(f.name).includes(nq) || normJa(f.kana).includes(nq) || normJa(f.point).includes(nq))
    .sort((a,b) => (inSeason(b) && !seasonAll(b) ? 1 : 0) - (inSeason(a) && !seasonAll(a) ? 1 : 0));
  const mLabel = f => seasonAll(f) ? "通年" : f.months.join("・") + "月";

  return (
    <div className="min-vh" style={{ background:"var(--bg)" }}>
      <div style={{ background:"linear-gradient(135deg,#1a6b3a,#2f8a52)", padding:"calc(env(safe-area-inset-top) + 20px) 16px 22px" }}>
        <div style={{ maxWidth:600, margin:"0 auto" }}>
          <div style={{ color:"#fff", fontSize:18, fontWeight:900 }}>魚図鑑</div>
          <div style={{ color:"rgba(255,255,255,0.85)", fontSize:12, marginTop:2 }}>旬・売りポイント・調理・POPフレーズをまとめた鮮魚データベース</div>
        </div>
      </div>
      <div style={{ maxWidth:600, margin:"0 auto", padding:"14px 16px 120px" }}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="魚の名前やキーワードで検索…"
          style={{ width:"100%", boxSizing:"border-box", border:"1.5px solid var(--line)", borderRadius:12, padding:"11px 14px", fontSize:14, marginBottom:12, background:"#fff" }} />
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:9 }}>
          {list.map((f) => {
            const idx = FISH_DB.indexOf(f);
            const now = inSeason(f) && !seasonAll(f);
            return (
              <div key={f.name} onClick={() => setOpenIdx(idx)}
                style={{ background:"#fff", border: now ? "1.5px solid var(--primary)" : "1px solid var(--line)", borderRadius:13, padding:"13px 12px", cursor:"pointer", position:"relative", minHeight:92, display:"flex", flexDirection:"column" }}>
                {now && <span style={{ position:"absolute", top:8, right:8, fontSize:9, fontWeight:900, color:"#fff", background:"var(--primary)", borderRadius:6, padding:"2px 6px" }}>今が旬</span>}
                <div style={{ fontSize:15.5, fontWeight:900, color:"var(--ink)", lineHeight:1.3, marginBottom:4 }}>{f.name}</div>
                <span style={{ fontSize:10, fontWeight:800, color:"var(--sub)", background:"var(--chip)", borderRadius:6, padding:"1px 7px", alignSelf:"flex-start", marginBottom:6 }}>{mLabel(f)}</span>
                <div style={{ fontSize:11, color:"var(--sub)", lineHeight:1.55, display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{f.point}</div>
              </div>
            );
          })}
        </div>
        {list.length === 0 && <div style={{ textAlign:"center", color:"var(--faint)", padding:"30px 0", fontSize:13 }}>見つかりませんでした</div>}
        <div style={{ fontSize:11, color:"var(--faint)", textAlign:"center", marginTop:12, lineHeight:1.7 }}>内容はAIが知識から書き下ろした参考情報です。<br/>追加したい魚や直したい内容があれば管理者へ。</div>
      </div>

      {openIdx != null && FISH_DB[openIdx] && (() => {
        const f = FISH_DB[openIdx];
        const now = inSeason(f) && !seasonAll(f);
        return (
          <>
            <div onClick={() => setOpenIdx(null)} style={{ position:"fixed", inset:0, zIndex:301, background:"rgba(0,0,0,0.4)" }} />
            <div style={{ position:"fixed", left:0, right:0, bottom:0, zIndex:302, background:"#fff", borderRadius:"22px 22px 0 0", boxShadow:"0 -8px 30px rgba(0,0,0,0.2)", animation:"sheetUp .28s cubic-bezier(.32,.72,.28,1)", padding:"10px 18px calc(24px + env(safe-area-inset-bottom))", maxHeight:"82vh", overflowY:"auto" }}>
              <div style={{ width:40, height:4.5, background:"var(--line)", borderRadius:3, margin:"0 auto 14px" }} />
              <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:12 }}>
                <span style={{ fontSize:20, fontWeight:900, color:"var(--ink)" }}>{f.name}</span>
                {now && <span style={{ fontSize:10.5, fontWeight:900, color:"#fff", background:"var(--primary)", borderRadius:7, padding:"2px 8px" }}>今が旬</span>}
                <span style={{ fontSize:11, fontWeight:800, color:"var(--sub)", background:"var(--chip)", borderRadius:6, padding:"2px 8px" }}>{mLabel(f)}</span>
                <button onClick={() => setOpenIdx(null)} style={{ marginLeft:"auto", border:"none", background:"var(--chip)", color:"var(--text)", width:32, height:32, borderRadius:"50%", fontSize:16, fontWeight:800, cursor:"pointer" }}>✕</button>
              </div>
              <div style={{ fontSize:13, color:"var(--text)", lineHeight:1.85 }}>
                <div>{f.point}</div>
                <div style={{ height:1, background:"var(--line)", margin:"12px 0" }} />
                <div style={{ marginBottom:8 }}><b style={{ color:"var(--ink)" }}>🍳 調理・食べ方</b><br/>{f.cook}</div>
                <div style={{ marginBottom:8 }}><b style={{ color:"var(--ink)" }}>📝 POPフレーズ例</b><br/><span style={{ color:"var(--soft-text)" }}>{f.pop}</span></div>
                <div><b style={{ color:"var(--ink)" }}>📍 山陰メモ</b><br/>{f.local}</div>
              </div>
            </div>
          </>
        );
      })()}
    </div>
  );
}

function CalendarTab() {
  const today = new Date(); today.setHours(0,0,0,0);
  const [ym, setYm] = useState({ y: today.getFullYear(), m: today.getMonth() }); // m:0-11

  // 行事データ生成（BoardのTodayInfoCardと同じロジック）
  const eventsFor = (year) => {
    const mk = (y, m, d, name, food) => ({ date: new Date(y, m-1, d), name, food });
    const nthSunday = (y, m, n) => { const first = new Date(y, m-1, 1); const off = (7 - first.getDay()) % 7; return new Date(y, m-1, 1 + off + (n-1)*7); };
    const USHI = { 2026:[[7,26,"土用の丑"]], 2027:[[7,21,"土用の丑"],[8,2,"土用の二の丑"]], 2028:[[7,27,"土用の丑"]] };

    const list = [
      mk(year,1,1,"お正月","刺身・おせち"), mk(year,2,3,"節分","恵方巻"), mk(year,3,3,"ひな祭り","ちらし寿司・はまぐり"),
      mk(year,5,5,"こどもの日","お祝い・ちらし"), mk(year,7,2,"半夏生","タコ"), mk(year,7,7,"七夕","ちらし・そうめん"),
      mk(year,8,13,"お盆入り","刺身・お供え"), mk(year,10,31,"ハロウィン",null), mk(year,12,22,"冬至",null),
      mk(year,12,24,"クリスマス","オードブル・寿司"), mk(year,12,31,"大晦日","刺身・寿司"),
    ];
    list.push({ date:nthSunday(year,5,2), name:"母の日", food:"ごちそう・お祝い" });
    list.push({ date:nthSunday(year,6,3), name:"父の日", food:"ごちそう・晩酌のあて" });

  };

  const allEv = [...eventsFor(ym.y)];
  const evOn = (y,m,d) => allEv.find(e => e.date.getFullYear()===y && e.date.getMonth()===m && e.date.getDate()===d);

  const firstDay = new Date(ym.y, ym.m, 1);

  const daysInMonth = new Date(ym.y, ym.m+1, 0).getDate();
  const cells = [];
  for (let i=0;i<startWd;i++) cells.push(null);
  for (let d=1;d<=daysInMonth;d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthEvents = allEv.filter(e => e.date.getFullYear()===ym.y && e.date.getMonth()===ym.m).sort((a,b)=>a.date-b.date);

  const prevM = () => setYm(v => v.m===0 ? {y:v.y-1,m:11} : {y:v.y,m:v.m-1});

          <div style={{ color:"rgba(255,255,255,0.85)", fontSize:12, marginTop:2 }}>売場に関わる行事・ハレの日をチェック</div>
        </div>
      </div>
      <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 16px 120px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>

          <div style={{ fontSize:17, fontWeight:900, color:"var(--ink)" }}>{ym.y}年 {ym.m+1}月</div>
          <button onClick={nextM} style={{ border:"1px solid var(--line)", background:"#fff", borderRadius:10, width:38, height:38, fontSize:18, fontWeight:800, color:"var(--text)", cursor:"pointer" }}>›</button>

            {cells.map((d,i) => {

              return (

                </div>

            })}
          </div>
        </div>

        <div style={{ fontSize:13, fontWeight:900, color:"var(--ink)", marginBottom:9 }}>{ym.m+1}月の行事</div>

              {e.food && <div style={{ fontSize:11.5, color:"var(--soft-text)", marginTop:2 }}>💡 {e.food}</div>}

      </div>
    </div>
  );
}
