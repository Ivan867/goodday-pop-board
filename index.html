function loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement("script");
    s.src = src; s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("load failed: " + src));
    document.head.appendChild(s);
  });
}

function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return "たった今";
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
}
// 右下角を起点に、真上(90°)〜真左(178°)へ扇状に並べる座標を計算する（放射状フィルター用）
function arcPositions(n, radius, fromDeg, toDeg) {
  const arr = [];
  for (let i=0;i<n;i++){
    const t = n===1 ? 0.5 : i/(n-1);
    const deg = fromDeg + (toDeg-fromDeg)*t;
    const rad = deg*Math.PI/180;
    arr.push({ tx: Math.cos(rad)*radius, ty: -Math.sin(rad)*radius });
  }
  return arr;
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:1000 }}>
      <div style={{ background:"white", borderRadius:"22px 22px 0 0", padding:"8px 22px calc(20px + env(safe-area-inset-bottom))", width:"100%", maxWidth:560, maxHeight:"92vh", overflowY:"auto", animation:"sheetUp .32s cubic-bezier(.16,1,.3,1)" }}>
        <div style={{ width:40, height:5, background:"#e0e0e0", borderRadius:3, margin:"6px auto 16px" }} />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
          <div style={{ fontSize:21, fontWeight:900 }}>ポップをアップロード</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#999" }}>✕</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>店舗</div>
            <select value={store} onChange={e=>setStore(e.target.value)} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14 }}>
              {STORES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>お名前 <span style={{ color:"#e05c00" }}>*</span></div>
            <div style={{ display:"flex", gap:8, alignItems:"stretch" }}>
              <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="例：山田 太郎" style={{ flex:1, minWidth:0, padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }} />
              <button type="button" onClick={()=>setAuthor("勝部")} title="勝部を入力" style={{ flexShrink:0, width:46, border:"2px solid #ffd9bd", background:"#fff3ea", color:"#e05c00", fontWeight:900, fontSize:18, borderRadius:10, cursor:"pointer", lineHeight:1 }}>※</button>
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>商品名</div>
            <input value={product} onChange={e=>setProduct(e.target.value)} placeholder="例：本マグロ大トロ" style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }} />
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>カテゴリ</div>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14 }}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>コメント <span style={{ fontWeight:400, color:"#bbb" }}>（任意）</span></div>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="例：脂がのっていておすすめ！刺身・塩焼きに。" rows={3} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, resize:"vertical", fontFamily:"inherit", outline:"none" }} />
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>画像</div>
            <label style={{ display:"block", border:"2px dashed #e0e0e0", borderRadius:12, padding:"14px", textAlign:"center", cursor:"pointer", background: preview?"transparent":"#fafafa" }}>
              {preview ? <img src={preview} style={{ maxWidth:"100%", maxHeight:200, borderRadius:8 }} /> : <div style={{ color:"#aaa", fontSize:14 }}>タップして選択</div>}
              <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
            </label>
          </div>
          {error && <div style={{ color:"#e05c00", fontSize:13, fontWeight:600 }}>{error}</div>}
          <button onClick={submit} disabled={loading} style={{ background:"#e05c00", color:"white", border:"none", borderRadius:12, padding:"13px", fontSize:15, fontWeight:900, cursor:"pointer", opacity:loading?0.6:1 }}>
            {loading ? "アップロード中..." : "アップロード"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Pop Detail Modal ──
function PopDetail({ pop, onClose, onDelete, onLiked, onCommented, onCreateFromPop }) {
  const [liked, setLiked] = useState(false);
  const [likes, setLikes] = useState(pop.likes||0);
  const [deleting, setDeleting] = useState(false);
  const [showDelConfirm, setShowDelConfirm] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState("");
  const [comments, setComments] = useState([]);
  const [cStore, setCStore] = useState("バイヤー");
  const [cText, setCText] = useState("");
  const [cSubmitting, setCSubmitting] = useState(false);
  const [cError, setCError] = useState("");

  useEffect(() => {
    api.listComments(pop.id).then(setComments).catch(()=>{});
  }, [pop.id]);

  const handleLike = async () => {
    if (liked) return;
    try {
      const updated = await api.like(pop.id, likes);
      setLikes(updated.likes);
      setLiked(true);
      onLiked && onLiked(pop.id, updated.likes);
    } catch(e) {}
  };

  const handleDownload = () => {
    const a = document.createElement("a");
    a.href = pop.image_url;
    a.download = `${pop.store_name}_${pop.product_name}.jpg`;
    a.target = "_blank";
    a.click();
  };

  const handleDeleteConfirm = async () => {
    if (deleting) return;
    setDeleting(true); setPwError("");
    try {
      const ok = await api.verifyPassword("delete", pwInput);
      if (!ok) {
        setPwError("パスワードが違います");
        setPwInput("");
        setDeleting(false);
        return;
      }
      await api.del(pop.id);
      onDelete(pop.id);
      onClose();
    } catch(e) {
      alert("削除に失敗しました");
      setDeleting(false);
    }
  };

  const handleAddComment = async () => {
    if (!cText.trim()) { setCError("コメントを入力してください"); return; }
    setCSubmitting(true); setCError("");
    try {
      const newC = await api.addComment(pop.id, cStore, cText.trim());
      setComments(c => [...c, newC]);
      setCText("");
      onCommented && onCommented(pop.id);
    } catch(e) { setCError("送信に失敗しました"); }
    finally { setCSubmitting(false); }
  };

  const handleQuickReply = async (text) => {
    if (cSubmitting) return;
    setCSubmitting(true); setCError("");
    try {
      const newC = await api.addComment(pop.id, "", text);
      setComments(c => [...c, newC]);
      onCommented && onCommented(pop.id);
    } catch(e) { setCError("送信に失敗しました"); }
    finally { setCSubmitting(false); }
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:1000 }} onClick={onClose}>
      <div style={{ background:"white", borderRadius:"22px 22px 0 0", width:"100%", maxWidth:560, maxHeight:"92vh", overflowY:"auto", animation:"sheetUp .32s cubic-bezier(.16,1,.3,1)" }} onClick={e=>e.stopPropagation()}>
        <div style={{ position:"relative", borderRadius:"22px 22px 0 0", overflow:"hidden" }}>
          <img src={pop.image_url} style={{ width:"100%", maxHeight:360, objectFit:"contain", background:"#f0f0f0", display:"block" }} />
          <button onClick={onClose} style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.5)", border:"none", color:"white", fontSize:18, width:36, height:36, borderRadius:"50%", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>
        <div style={{ padding:"16px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
            <div>
              <div style={{ fontSize:21, fontWeight:900 }}>{pop.product_name}</div>
              <div style={{ fontSize:13, color:"#888", marginTop:2 }}>{pop.store_name} · {pop.category}</div>
            </div>
            <div style={{ fontSize:12, color:"#bbb" }}>{formatDate(pop.created_at)}</div>
          </div>
          {pop.author && (
            <div style={{ fontSize:13, color:"#555", marginBottom: pop.comment ? 6 : 0 }}>
              <span style={{ fontWeight:700 }}>投稿者：</span>{pop.author}
            </div>
          )}
          {pop.comment && (
            <div style={{ display:"flex", gap:9, alignItems:"flex-start", background:"#fafafb", border:"1px solid #efeff1", borderRadius:10, padding:"11px 13px", marginTop:8 }}>
              <span style={{ fontSize:11, color:"#9a9aa0", fontWeight:700, letterSpacing:".04em", paddingTop:1, whiteSpace:"nowrap" }}>コメント</span>
              <span style={{ fontSize:13.5, color:"#2c2c30", lineHeight:1.65, whiteSpace:"pre-wrap" }}>{pop.comment}</span>
            </div>
          )}

          {/* パスワード確認エリア */}
          {showDelConfirm && (
            <div style={{ background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"14px", marginTop:14, animation:"fadeUp 0.15s ease" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#d05050", marginBottom:10 }}>本当に削除しますか？</div>
              <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>ヒント：本社の郵便番号</div>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="password"
                  value={pwInput}
                  onChange={e=>{ setPwInput(e.target.value); setPwError(""); }}
                  onKeyDown={e=>e.key==="Enter" && handleDeleteConfirm()}
                  placeholder="パスワードを入力"
                  autoFocus
                  style={{ flex:1, padding:"9px 12px", border:`2px solid ${pwError?"#e05c00":"#ffd0d0"}`, borderRadius:8, fontSize:14, outline:"none" }}
                />
                <button onClick={handleDeleteConfirm} disabled={deleting}
                  style={{ padding:"9px 16px", background:"#d05050", color:"white", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer", opacity:deleting?0.6:1 }}>
                  {deleting ? "確認中…" : "削除"}
                </button>
                <button onClick={()=>{ setShowDelConfirm(false); setPwInput(""); setPwError(""); }}
                  style={{ padding:"9px 12px", background:"#eee", color:"#666", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer" }}>
                  戻る
                </button>
              </div>
              {pwError && <div style={{ fontSize:12, color:"#e05c00", fontWeight:700, marginTop:8 }}>{pwError}</div>}
            </div>
          )}

          <div style={{ display:"flex", gap:10, marginTop:14 }}>
            <button className="like-btn" onClick={handleLike} style={{ flex:1, background:liked?"#fff0f0":"#f5f5f5", border:liked?"2px solid #ff6b6b":"2px solid #eee", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:liked?"default":"pointer", color:liked?"#ff6b6b":"#666" }}>
              いいね {likes}
            </button>
            <button onClick={handleDownload} style={{ flex:1, background:"#f0f4ff", border:"2px solid #c7d7ff", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", color:"#4060d0" }}>
              保存
            </button>
            <button onClick={()=>{ setShowDelConfirm(true); setPwInput(""); setPwError(""); }}
              disabled={showDelConfirm}
              style={{ flex:1, background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", color:"#d05050", opacity:showDelConfirm?0.4:1 }}>
              削除
            </button>
          </div>

          {onCreateFromPop && (
            <button onClick={()=>{ onCreateFromPop(pop); onClose(); }}
              style={{ width:"100%", marginTop:10, background:"#8B6914", color:"white", border:"none", borderRadius:12, padding:"13px", fontSize:14, fontWeight:900, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
              このPOPを元に作る
            </button>
          )}

          {/* ── コメントスレッド ── */}
          <div style={{ borderTop:"2px solid #f0f0f0", marginTop:20, paddingTop:16 }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#333", marginBottom:12, letterSpacing:".02em" }}>
              コメント {comments.length > 0 && <span style={{ color:"#b6b6bb", fontWeight:400 }}>{comments.length}件</span>}
            </div>
            {comments.length === 0 ? (
              <div style={{ fontSize:13, color:"#ccc", textAlign:"center", padding:"12px 0 16px" }}>まだコメントはありません</div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:16, marginBottom:16 }}>
                {comments.map(c => (
                  <div key={c.id} style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                    <div style={{ width:28, height:28, borderRadius:"50%", background: c.store_name ? "#ececed" : "#f4f4f5", color: c.store_name ? "#6b6b70" : "#b6b6bb", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{c.store_name ? c.store_name.slice(0,1) : "·"}</div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:3 }}>
                        <span style={{ fontSize:12.5, fontWeight:700, color: c.store_name ? "#2c2c30" : "#9a9aa0" }}>{c.store_name || "ワンタップ返信"}</span>
                        <span style={{ fontSize:11, color:"#b6b6bb" }}>{timeAgo(c.created_at)}</span>
                      </div>
                      <div style={{ fontSize:13.5, color:"#3a3a3e", lineHeight:1.65, whiteSpace:"pre-wrap" }}>{c.comment}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div style={{ background:"#fafafa", borderRadius:12, padding:"12px 14px", border:"2px solid #eee" }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#999", marginBottom:6 }}>自分でコメント <span style={{ fontWeight:400, color:"#bbb" }}>（店舗を選んで投稿）</span></div>
              <select value={cStore} onChange={e=>setCStore(e.target.value)}
                style={{ width:"100%", padding:"9px 10px", border:"2px solid #eee", borderRadius:8, fontSize:13, marginBottom:8, outline:"none", background:"white" }}>
                {STORES.map(s=><option key={s}>{s}</option>)}
              </select>
              <textarea value={cText} onChange={e=>setCText(e.target.value)} placeholder="コメントを入力..." rows={3}
                style={{ width:"100%", padding:"9px 10px", border:"2px solid #eee", borderRadius:8, fontSize:13, resize:"vertical", fontFamily:"inherit", outline:"none", marginBottom:8 }} />
              {cError && <div style={{ fontSize:12, color:"#e05c00", marginBottom:6 }}>{cError}</div>}
              <button onClick={handleAddComment} disabled={cSubmitting}
                style={{ width:"100%", background:"#e05c00", color:"white", border:"none", borderRadius:8, padding:"10px", fontSize:13, fontWeight:900, cursor:"pointer", opacity:cSubmitting?0.6:1 }}>
                {cSubmitting ? "送信中..." : "コメントする"}
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

// ── Pop Card (shared) ──
function PopCard({ pop, index, onClick, hasComment }) {
  return (
    <div
      style={{ breakInside:"avoid", marginBottom:14, borderRadius:14, overflow:"hidden", background:"white", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", cursor:"pointer", animation:`fadeUp 0.3s ease ${Math.min(index,10)*0.04}s both`, transition:"all 0.15s" }}
      onClick={()=>onClick(pop)}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.14)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
      <div style={{ background:"#efefef", minHeight:120, position:"relative" }}>
        {pop.image_url
          ? <img src={pop.image_url} loading="lazy" decoding="async" style={{ width:"100%", display:"block" }} />
          : <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:120, color:"#ccc", fontSize:13 }}>読み込み中…</div>}
        <div style={{ position:"absolute", top:6, right:6, display:"flex", gap:4 }}>
          {hasComment && <div style={{ background:"rgba(224,92,0,0.9)", color:"white", fontSize:11, fontWeight:900, padding:"2px 7px", borderRadius:20 }}>コメント</div>}
          {pop.likes>0 && <div style={{ background:"rgba(255,107,107,0.9)", color:"white", fontSize:11, fontWeight:900, padding:"2px 7px", borderRadius:20 }}>{pop.likes}</div>}
        </div>
      </div>
      <div style={{ padding:"9px 12px", display:"flex", alignItems:"center", gap:6 }}>
        <div style={{ fontWeight:800, fontSize:13, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", flex:1, minWidth:0 }}>{pop.product_name}</div>
        <div style={{ fontSize:11, color:"#888", whiteSpace:"nowrap", flexShrink:0 }}>{pop.store_name}</div>
        <div style={{ fontSize:11, background:"#f0f0f0", padding:"2px 8px", borderRadius:20, fontWeight:700, color:"#666", whiteSpace:"nowrap", flexShrink:0 }}>{pop.category}</div>
      </div>
    </div>
  );
}

// ── Board Tab ──
function BoardTab({ currentStore, actionsRef, onCreateFromPop, radialOpen, setRadialOpen }) {
  const [pops, setPops] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [showUp, setShowUp] = useState(false);
  const [sel, setSel] = useState(null);
  const [commentedIds, setCommentedIds] = useState(new Set());
  const [radialChanged, setRadialChanged] = useState(false);
  const [hubSpin, setHubSpin] = useState(false);
  const [showNotice, setShowNotice] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [data, cIds] = await Promise.all([
        api.listActive(),
        api.listCommentedPopIds()
      ]);
      setPops(data);
      setCommentedIds(cIds);
    }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    if (actionsRef) actionsRef.current = { refresh: load, openUpload: () => setShowUp(true) };
  }, [load, actionsRef]);

  useEffect(() => {
    if (!showNotice) return;
    const onScroll = () => setShowNotice(false);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [showNotice]);

  const counts = pops.reduce((a,p) => { a[p.store_name]=(a[p.store_name]||0)+1; return a; }, {});
  const filtered = pops.filter(p => (!fStore||p.store_name===fStore) && (!fCat||p.category===fCat));

  const handleHubClick = () => {
    if (!radialChanged) { setRadialOpen(v=>!v); return; }   // 未選択時は開閉トグル（写真を広く見たい時用）
    setHubSpin(true);
    load();
    setTimeout(()=>{ setHubSpin(false); setRadialChanged(false); }, 380); // 更新後も輪は開いたまま
  };
  const pickStore = (val) => { setFStore(val); setRadialChanged(true); };
  const pickCat = (val) => { setFCat(val); setRadialChanged(true); };

  const storeItems = [{lbl:"全店舗",val:""},...STORES.filter(s=>(counts[s]||0)>0).map(s=>({lbl:s,val:s}))];
  const catItems = ["",...CATEGORIES].map(c=>({lbl:c||"すべて", val:c}));
  const storePos = arcPositions(storeItems.length, 104, 150, 30);
  const catPos = arcPositions(catItems.length, 152, 158, 22);
  const FAN_BOTTOM = "calc(80px + env(safe-area-inset-bottom))";

  return (
    <>
      <div style={{ maxWidth:1080, margin:"0 auto", padding:"12px 16px 130px" }}>
        {showNotice && !radialOpen && (
          <div onClick={() => setShowNotice(false)}
            style={{ position:"fixed", left:0, right:0, bottom:"calc(78px + env(safe-area-inset-bottom))", zIndex:150, padding:"0 12px", cursor:"pointer", animation:"fadeUp .35s ease" }}>
            <div style={{ maxWidth:1080, margin:"0 auto", display:"flex", alignItems:"center", gap:10, background:"linear-gradient(135deg,#fff3ea,#ffe9d6)", border:"1.5px solid #ffd9bd", borderRadius:14, padding:"12px 14px", boxShadow:"0 4px 16px rgba(224,92,0,0.18)" }}>
              <span style={{ fontSize:13, fontWeight:700, color:"#a8480a", lineHeight:1.5, flex:1 }}>季節のポップや時期が過ぎたポップは「アーカイブ」に収納されます。</span>
            </div>
          </div>
        )}
        {loading ? (
          <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
            
            <div style={{ fontWeight:600, animation:"pulse 1.5s infinite" }}>読み込み中...</div>
          </div>
        ) : filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
            
            <div style={{ fontWeight:800, fontSize:16, color:"#888" }}>ポップがまだありません</div>
            <div style={{ fontSize:13 }}>アップロードボタンから最初のポップを共有しましょう！</div>
          </div>
        ) : (
          <div style={{ columns:"200px 4", gap:14 }}>
            {filtered.map((pop,i)=><PopCard key={pop.id} pop={pop} index={i} onClick={setSel} hasComment={commentedIds.has(pop.id)} />)}
          </div>
        )}
      </div>
      {showUp && <UploadModal currentStore={currentStore} onClose={()=>setShowUp(false)} onSuccess={pop=>{setPops(p=>[pop,...p]);setShowUp(false);}} />}
      {radialOpen && (
        <div onClick={()=>{ setRadialOpen(false); setRadialChanged(false); }}
          style={{ position:"fixed", inset:0, zIndex:160 }} />
      )}
      <div style={{ position:"fixed", left:"50%", bottom:FAN_BOTTOM, width:1, height:1, zIndex:165 }}>
        {storeItems.map((it,i) => {
          const active = it.val === fStore;
          const delay = radialOpen ? (50+i*30) : 0;
          return (
            <button key={"s"+it.val} onClick={(e)=>{ e.stopPropagation(); pickStore(it.val); }}
              style={{
                position:"absolute", left:0, bottom:0, transformOrigin:"50% 100%",
                transform: radialOpen ? `translate(-50%,0) translate(${storePos[i].tx}px, ${storePos[i].ty}px) scale(1)` : "translate(-50%,0) scale(0.2)",
                opacity: radialOpen?1:0, pointerEvents: radialOpen?"auto":"none",
                transitionProperty:"transform, opacity", transitionDuration:"0.6s, 0.4s",
                transitionTimingFunction:"cubic-bezier(.16,1.18,.3,1), ease",
                transitionDelay:`${delay}ms, ${delay}ms`,
                padding:"8px 13px", whiteSpace:"nowrap", fontSize:13, fontWeight:800, borderRadius:20,
                boxShadow:"0 3px 10px rgba(0,0,0,0.14)", cursor:"pointer",
                background: active?"#e05c00":"white", color: active?"#fff":"#b54900",
                border:`2px solid ${active?"#e05c00":"#ffd9bd"}` }}>
              {it.lbl}
            </button>
          );

  );

function NewPostForm({ onPost, onCancel }) {
  const [text, setText] = useState("");
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const onFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
  };

  const submit = async () => {
    if (!text.trim() && !file) { setError("テキストまたは画像を入力してください"); return; }
    setLoading(true); setError("");
    try {
      let image_url = null;
      if (file) image_url = await api.upload(file);
      const post = await api.insertPost({ text: text.trim(), image_url });
      onPost(post);
    } catch(e) { setError("エラー: "+e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:20, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
      <div style={{ fontWeight:900, fontSize:15, marginBottom:14, color:"#2d6a4f" }}>新しい投稿</div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="売り場の様子、発見、コツなど..." rows={4} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, resize:"vertical", fontFamily:"inherit", outline:"none", marginBottom:10 }} />
      <label style={{ display:"block", border:"2px dashed #e0e0e0", borderRadius:10, padding:12, textAlign:"center", cursor:"pointer", marginBottom:10, background:preview?"transparent":"#fafafa" }}>
        {preview ? <img src={preview} style={{ maxWidth:"100%", maxHeight:160, borderRadius:6 }} /> : <div style={{ color:"#bbb", fontSize:13 }}>写真を追加（任意）</div>}
        <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
      </label>
      {error && <div style={{ color:"#e05c00", fontSize:13, marginBottom:8 }}>{error}</div>}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={onCancel} style={{ flex:1, background:"#f5f5f5", color:"#666", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:700, cursor:"pointer" }}>キャンセル</button>
        <button onClick={submit} disabled={loading} style={{ flex:2, background:"#2d6a4f", color:"white", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:900, cursor:"pointer", opacity:loading?0.6:1 }}>
          {loading ? "投稿中..." : "投稿する"}
        </button>
      </div>
    </div>
  );
}

// ── POP作成ツール Tab（統合版）──
function PopToolTab({ seed, onSeedConsumed }) {
  const [mode, setMode] = useState(seed ? "ref" : "new");
  const [size, setSize] = useState("縦");
  const [fields, setFields] = useState(seed
    ? { product:"", usage:"", price:"", appeal:"", mood:"", refProduct:"", refNoShow: seed.product || "" }
    : { product:"", usage:"", price:"", appeal:"", mood:"", refProduct:"", refNoShow:"" });
  const [refImage] = useState(seed?.image_url || null);
  const [prompt, setPrompt] = useState("");
  const [copied, setCopied] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState("");
  const [showTips, setShowTips] = useState(false);
  const scanInputRef = React.useRef(null);

  const setF = (k, v) => setFields(f => ({...f, [k]: v}));

  useEffect(() => { if (seed && onSeedConsumed) onSeedConsumed(); }, []);

  const SIZES = [
    { key:"縦", label:"縦A4（210×297mm）" },
    { key:"横", label:"横A4（297×210mm）" },
  ];
  const sizeLabel = SIZES.find(s=>s.key===size).label;

  const toBase64 = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

  const handleScan = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setScanning(true); setScanError("");
    try {
      const imageBase64 = await toBase64(file);
      const res = await fetch(`${SB_URL}/functions/v1/extract-pop`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` },
        body: JSON.stringify({ imageBase64, mimeType: file.type }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setFields(f => ({
        ...f,
        product: data.product || f.product,
        usage:   data.usage   || f.usage,
        price:   data.price   || f.price,
        appeal:  data.appeal  || f.appeal,
        mood:    data.mood    || f.mood,
      }));
    } catch(err) { setScanError("読み取りに失敗しました：" + err.message); }
    finally { setScanning(false); e.target.value = ""; }
  };

  const generate = () => {
    if (mode === "new") {
      setPrompt(
        `あなたはスーパーの鮮魚売り場専門のデザイナーです。\n` +
        `【商品】${fields.product}\n` +
        `【用途】${fields.usage}\n` +
        `【価格】${fields.price || "表記なし"}\n` +
        `【一言アピール】${fields.appeal}\n` +
        `【サイズ】${sizeLabel}\n` +
        `【雰囲気】${fields.mood}\n` +
        `このPOPの画像を作ってください。`
      );
    } else if (mode === "bg") {
      setPrompt(size === "縦"
        ? `背景の売り場は必要ないんだ。サイズ縦A4（210×297mm）でポップ部分のみで作成して`
        : `背景の売り場は必要なし、サイズは横A4（297×210mm）でポップ部分のみで作成して`
      );
    } else {
      const p = fields.refProduct || "　";
      const n = fields.refNoShow || p;
      setPrompt(`この画像をレイアウト、配色のみを参考に、「${p}」のポップをサイズ${sizeLabel}で作成してください\n※「${n}」の表記はしないでください`);
    }
  };

  const copy = () => {
    if (!prompt) return;
    navigator.clipboard.writeText(prompt).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = prompt;
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    });
    setCopied(true);
    setTimeout(() => { setCopied(false); setPrompt(""); }, 2000);
  };

  const inp = { width:"100%", padding:"11px 13px", borderRadius:8, border:"1px solid #3a3a3a", background:"#2a2a2a", color:"white", fontSize:14, outline:"none", fontFamily:"inherit" };
  const lbl = { fontSize:12, color:"#999", marginBottom:5 };
  const MODES = [
    { key:"new", label:"① 新規POP作成" },
    { key:"bg",  label:"② 背景修正" },
    { key:"ref", label:"③ 参考画像あり" },
  ];

  return (
    <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px 60px" }}>
      <div style={{ background:"#111", borderRadius:16, padding:"24px 22px", color:"white" }}>

        <div style={{ fontSize:16, fontWeight:900, marginBottom:20, color:"#eee" }}>鮮魚売り場 POP作成ツール</div>

        {/* モード */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>モード選択</div>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {MODES.map(m=>(
            <button key={m.key} onClick={()=>{ setMode(m.key); setPrompt(""); }}
              style={{ flex:1, padding:"11px 6px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: mode===m.key ? "#8B6914" : "#2a2a2a", color: mode===m.key ? "white" : "#aaa", transition:"all 0.15s" }}>
              {m.label}
            </button>
          ))}
        </div>

        {/* サイズ */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>サイズ</div>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {SIZES.map(s=>(
            <button key={s.key} onClick={()=>setSize(s.key)}
              style={{ flex:1, padding:"11px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:700,
                border:`2px solid ${size===s.key ? "#8B6914" : "#3a3a3a"}`,
                background:"#1e1e1e", color: size===s.key ? "white" : "#777", transition:"all 0.15s" }}>
              {s.label}
            </button>
          ))}
        </div>

        {/* モード① */}
        {mode === "new" && (
          <>
            <input ref={scanInputRef} type="file" accept="image/*" onChange={handleScan} style={{ display:"none" }} />
            <button onClick={()=>scanInputRef.current.click()} disabled={scanning}
              style={{ width:"100%", padding:"11px", borderRadius:8, border:"1px dashed #8B6914", marginBottom:16,
                background: scanning ? "#1a1a0a" : "#1e1800", color: scanning ? "#888" : "#c8a840",
                fontSize:13, fontWeight:700, cursor: scanning ? "default" : "pointer" }}>
              {scanning ? "AI読み取り中..." : "既存POPから自動入力（AI読み取り）"}
            </button>
            {scanError && <div style={{ fontSize:12, color:"#e05c00", marginBottom:10 }}>{scanError}</div>}
            <div style={{ fontSize:12, color:"#888", marginBottom:10 }}>入力</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div><div style={lbl}>商品</div><input value={fields.product} onChange={e=>setF("product",e.target.value)} placeholder="例：天然マダイ（1尾）" style={inp} /></div>
              <div><div style={lbl}>用途</div><input value={fields.usage} onChange={e=>setF("usage",e.target.value)} placeholder="例：お刺身・塩焼き" style={inp} /></div>
              <div><div style={lbl}>価格</div><input value={fields.price} onChange={e=>setF("price",e.target.value)} placeholder="例：980円（税込）" style={inp} /></div>
              <div><div style={lbl}>一言アピール</div><input value={fields.appeal} onChange={e=>setF("appeal",e.target.value)} placeholder="例：産地直送！鮮度抜群" style={inp} /></div>
            </div>
            <div><div style={lbl}>雰囲気</div><input value={fields.mood} onChange={e=>setF("mood",e.target.value)} placeholder="例：夏らしい涼しげなデザイン、和風テイスト" style={inp} /></div>
          </>
        )}

        {/* モード② */}
        {mode === "bg" && (
          <div style={{ background:"#1e1e1e", border:"1px solid #3a3a3a", borderRadius:8, padding:"13px 15px", fontSize:13, color:"#aaa", lineHeight:1.8 }}>
            Geminiで修正したいPOP画像を貼り付けてから、下のプロンプトをコピーして送信してください。
          </div>
        )}

        {/* モード③ */}
        {mode === "ref" && (
          <>
            <div style={{ background:"#1a2a1a", border:"1px solid #2d4a2d", borderRadius:8, padding:"11px 13px", fontSize:12, color:"#7ec87e", lineHeight:1.75, marginBottom:14 }}>
              Geminiに参考にしたいPOP画像を先にアップロードしてから、生成したプロンプトを貼り付けてください。
            </div>
            {refImage && (
              <div style={{ background:"#1e1e1e", border:"1px solid #3a3a3a", borderRadius:8, padding:"11px 13px", marginBottom:14, display:"flex", gap:12, alignItems:"center" }}>
                <img src={refImage} style={{ width:64, height:64, objectFit:"cover", borderRadius:6, flexShrink:0, background:"#111" }} />
                <div style={{ fontSize:12, color:"#c8a840", lineHeight:1.7 }}>
                  <div style={{ fontWeight:800, marginBottom:2 }}>このPOPを参照元にします</div>
                  <div style={{ color:"#999" }}>この画像を長押しで保存し、AIにアップロードしてから下のプロンプトを貼り付けてください。</div>
                </div>
              </div>
            )}
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <div><div style={lbl}>ポップの内容（商品名など）</div><input value={fields.refProduct} onChange={e=>setF("refProduct",e.target.value)} placeholder="例：天然マダイ お刺身用" style={inp} /></div>
              <div><div style={lbl}>表記しない内容 <span style={{ color:"#555" }}>（空欄の場合は上と同じ）</span></div><input value={fields.refNoShow} onChange={e=>setF("refNoShow",e.target.value)} placeholder="例：天然マダイ" style={inp} /></div>
            </div>
          </>
        )}

        {/* 区切り */}
        <div style={{ borderTop:"1px solid #2a2a2a", margin:"18px 0 14px" }} />

        {/* 生成されたプロンプト */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>生成されたプロンプト</div>
        <textarea value={prompt} readOnly placeholder="← 上の項目を入力して「プロンプト生成」を押してください" rows={5}
          style={{ width:"100%", padding:"12px 13px", borderRadius:8, border:"1px solid #2a2a2a", background:"#1a1a1a",
            color: prompt ? "#eee" : "#555", fontSize:13, resize:"vertical", fontFamily:"inherit", outline:"none", lineHeight:1.75, marginBottom:12 }} />

        {/* ボタン */}
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <button onClick={generate}
            style={{ flex:3, padding:"14px", borderRadius:8, border:"1px solid #3a3a3a", background:"#222", color:"#ddd", fontSize:14, fontWeight:700, cursor:"pointer" }}
            onMouseEnter={e=>e.currentTarget.style.background="#2e2e2e"}
            onMouseLeave={e=>e.currentTarget.style.background="#222"}>
            プロンプト生成
          </button>
          <button onClick={copy} disabled={!prompt}
            style={{ flex:1, padding:"14px", borderRadius:8, border:"none",
              background: copied ? "#16a34a" : (prompt ? "#8B6914" : "#333"),
              color:"white", fontSize:14, fontWeight:700, cursor: prompt ? "pointer" : "default",
              opacity: !prompt ? 0.4 : 1, transition:"all 0.2s" }}>
            {copied ? "コピー済" : "コピー"}
          </button>
        </div>

        {/* 使い方ヒント（折りたたみ） */}
        <button onClick={()=>setShowTips(t=>!t)}
          style={{ width:"100%", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:8, padding:"10px 14px",
            color:"#666", fontSize:12, fontWeight:700, cursor:"pointer", textAlign:"left", transition:"all 0.15s" }}>
          {showTips ? "▲ 使い方・ヒントを閉じる" : "▼ 使い方・ヒントを見る"}
        </button>
        {showTips && (
          <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ background:"#1a1a0a", border:"1px solid #3a3a00", borderRadius:10, padding:"13px 15px" }}>
              <div style={{ fontSize:12, fontWeight:800, color:"#c8a840", marginBottom:8 }}>使い方（4ステップ）</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px 12px" }}>
                {[["①","モードとサイズを選ぶ"],["②","入力欄を埋める"],["③","「プロンプト生成」を押す"],["④","「コピー」→Geminiに貼り付け"]].map(([n,t])=>(
                  <div key={n} style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#aaa" }}>
                    <div style={{ width:20, height:20, background:"#3a3a00", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:"#c8a840", flexShrink:0 }}>{n}</div>
                    <div>{t}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:"#0a1a0a", border:"1px solid #1a3a1a", borderRadius:10, padding:"13px 15px", fontSize:12, color:"#7ec87e", lineHeight:1.75 }}>
              <strong style={{ color:"#52c87e" }}>価格を入れたくない場合</strong>は価格欄を空欄にすると「表記なし」が自動で入ります。
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ── Floor Photo Tab ──
function FloorPhotoTab() {
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [mode, setMode] = useState("gallery"); // "gallery" | "compare"
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [compareCat, setCompareCat] = useState(FLOOR_CATS[0]);
  const [showUp, setShowUp] = useState(false);
  const [sel, setSel] = useState(null);
  const [delTarget, setDelTarget] = useState(null);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState("");
  const [fDeleting, setFDeleting] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try { const data = await api.listFloorPhotos("", ""); setPhotos(data); }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const filtered = photos.filter(p =>
    (!fStore || p.store_name === fStore) &&
    (!fCat   || p.category === fCat)
  );

  // 比較モード：カテゴリー選択 → 各店舗の最新写真を並べる
  const compareData = FLOOR_STORES.filter(s => s !== "推奨モデル").map(store => ({
    store,
    photos: photos.filter(p => p.store_name === store && p.category === compareCat)
  }));

  const handleDelete = async () => {
    if (fDeleting) return;
    setFDeleting(true); setPwError("");
    try {
      const ok = await api.verifyPassword("delete", pwInput);
      if (!ok) { setPwError("パスワードが違います"); setPwInput(""); setFDeleting(false); return; }
      await api.delFloorPhoto(delTarget.id);
      setPhotos(p => p.filter(x => x.id !== delTarget.id));
      setDelTarget(null); setSel(null); setPwInput(""); setPwError("");
    } catch(e) { alert("削除に失敗しました"); }
    finally { setFDeleting(false); }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#f5f5f7" }}>

      {/* ヘッダーバー */}
      <div style={{ background:"linear-gradient(135deg,#1a6b3a 0%,#2d9e5f 100%)", padding:"14px 16px" }}>
        <div style={{ maxWidth:1080, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div style={{ color:"white", fontSize:14, fontWeight:700, opacity:0.9 }}>各店の売場写真を共有・比較</div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setMode("gallery")}
              style={{ padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: mode==="gallery" ? "white" : "rgba(255,255,255,0.2)",
                color: mode==="gallery" ? "#1a6b3a" : "white" }}>
              ギャラリー
            </button>
            <button onClick={()=>setMode("compare")}
              style={{ padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: mode==="compare" ? "white" : "rgba(255,255,255,0.2)",
                color: mode==="compare" ? "#1a6b3a" : "white" }}>
              店舗比較
            </button>
            <button onClick={()=>setShowUp(true)}
              style={{ padding:"8px 16px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:900,
                background:"#e05c00", color:"white" }}>
              ＋ 投稿
            </button>
          </div>
        </div>
      </div>

      {/* ── ギャラリーモード ── */}
      {mode === "gallery" && (
        <div style={{ maxWidth:1080, margin:"0 auto", padding:"16px 16px 40px" }}>
          {/* フィルター */}
          <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
            {[{lbl:"全店舗",val:""},...FLOOR_STORES.map(s=>({lbl:s,val:s}))].map(({lbl,val})=>(
              <button key={lbl} onClick={()=>setFStore(val)}
                style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:700, border:"2px solid", cursor:"pointer",
                  borderColor:fStore===val?"#1a6b3a":"#ddd", background:fStore===val?"#1a6b3a":"white", color:fStore===val?"white":"#666" }}>
                {lbl}
              </button>
            ))}
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
            {["",...FLOOR_CATS].map(c=>(
              <button key={c||"all"} onClick={()=>setFCat(c)}
                style={{ padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:700, border:"2px solid", cursor:"pointer",
                  borderColor:fCat===c?"#111":"#ddd", background:fCat===c?"#111":"white", color:fCat===c?"white":"#666" }}>
                {c||"すべて"}
              </button>
            ))}
          </div>

          {loading ? (
            <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
              
              <div style={{ animation:"pulse 1.5s infinite" }}>読み込み中...</div>
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
              
              <div style={{ fontWeight:800, fontSize:16, color:"#888" }}>写真がまだありません</div>
              <div style={{ fontSize:13, marginTop:6 }}>「＋ 投稿」ボタンから売場写真を共有しましょう</div>
            </div>
          ) : (
            <div style={{ columns:"200px 4", gap:14 }}>
              {filtered.map((photo,i)=>(
                <div key={photo.id}
                  style={{ breakInside:"avoid", marginBottom:14, borderRadius:14, overflow:"hidden", background:"white",
                    boxShadow:"0 2px 10px rgba(0,0,0,0.07)", cursor:"pointer", animation:`fadeUp 0.3s ease ${Math.min(i,10)*0.04}s both`, transition:"all 0.15s" }}
                  onClick={()=>setSel(photo)}
                  onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.14)"}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
                  <div style={{ background:"#efefef", minHeight:120, position:"relative" }}>
                    <img src={photo.image_url} style={{ width:"100%", display:"block" }} />
                    <div style={{ position:"absolute", top:6, left:6, background:"rgba(26,107,58,0.9)", color:"white", fontSize:11, fontWeight:900, padding:"2px 8px", borderRadius:20 }}>{photo.category}</div>
                  </div>
                  <div style={{ padding:"10px 12px" }}>
                    <div style={{ fontWeight:800, fontSize:13, marginBottom:3 }}>{photo.store_name}</div>
                    {photo.comment && <div style={{ fontSize:12, color:"#666", marginBottom:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{photo.comment}</div>}
                    <div style={{ fontSize:11, color:"#bbb" }}>{timeAgo(photo.created_at)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── 店舗比較モード ── */}
      {mode === "compare" && (
        <div style={{ maxWidth:1400, margin:"0 auto", padding:"16px 16px 40px" }}>
          {/* カテゴリー選択 */}
          <div style={{ background:"white", borderRadius:14, padding:"16px 18px", marginBottom:20, boxShadow:"0 2px 10px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize:13, fontWeight:800, color:"#333", marginBottom:12 }}>カテゴリーを選んで各店舗を比較</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {FLOOR_CATS.map(c=>(
                <button key={c} onClick={()=>setCompareCat(c)}
                  style={{ padding:"8px 18px", borderRadius:20, fontSize:13, fontWeight:700, border:"2px solid", cursor:"pointer",
                    borderColor:compareCat===c?"#1a6b3a":"#ddd",
                    background:compareCat===c?"#1a6b3a":"white",
                    color:compareCat===c?"white":"#666" }}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {loading ? (
            <div style={{ textAlign:"center", padding:60, color:"#bbb" }}>読み込み中...</div>
          ) : (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:14 }}>
              {compareData.map(({store, photos:storePhotos})=>(
                <div key={store} style={{ background:"white", borderRadius:14, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,0.07)" }}>
                  {/* 店舗名ヘッダー */}
                  <div style={{ background:"#1a6b3a", padding:"10px 14px" }}>
                    <div style={{ fontSize:13, fontWeight:900, color:"white" }}>{store}</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", marginTop:2 }}>{storePhotos.length}枚</div>
                  </div>

                  {storePhotos.length === 0 ? (
                    <div style={{ padding:"30px 14px", textAlign:"center", color:"#ccc" }}>
                      
                      <div style={{ fontSize:12 }}>写真なし</div>
                    </div>
                  ) : (
                    <div>
                      {/* 最新写真をメイン表示 */}
                      <div style={{ cursor:"pointer", position:"relative" }} onClick={()=>setSel(storePhotos[0])}>
                        <img src={storePhotos[0].image_url} style={{ width:"100%", display:"block", maxHeight:220, objectFit:"cover" }} />
                        <div style={{ position:"absolute", bottom:6, right:6, background:"rgba(0,0,0,0.55)", color:"white", fontSize:11, padding:"2px 7px", borderRadius:10 }}>
                          {timeAgo(storePhotos[0].created_at)}
                        </div>
                      </div>
                      {storePhotos[0].comment && (
                        <div style={{ padding:"8px 12px", fontSize:12, color:"#555", borderBottom:"1px solid #f0f0f0", lineHeight:1.5 }}>
                          {storePhotos[0].comment}
                        </div>
                      )}
                      {/* 過去の写真サムネイル */}
                      {storePhotos.length > 1 && (
                        <div style={{ display:"flex", gap:4, padding:"8px 10px", overflowX:"auto" }}>
                          {storePhotos.slice(1).map(p=>(
                            <img key={p.id} src={p.image_url} onClick={()=>setSel(p)}
                              style={{ width:50, height:50, objectFit:"cover", borderRadius:6, cursor:"pointer", flexShrink:0, opacity:0.75 }} />
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── アップロードモーダル ── */}
      {showUp && <FloorUploadModal onClose={()=>setShowUp(false)} onSuccess={p=>{setPhotos(prev=>[p,...prev]);setShowUp(false);}} />}

      {/* ── 詳細モーダル ── */}
      {sel && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 }} onClick={()=>{ setSel(null); setDelTarget(null); setPwInput(""); setPwError(""); }}>
          <div style={{ background:"white", borderRadius:20, width:"100%", maxWidth:500, maxHeight:"90vh", overflowY:"auto", animation:"fadeUp 0.2s ease" }} onClick={e=>e.stopPropagation()}>
            <div style={{ position:"relative" }}>
              <img src={sel.image_url} style={{ width:"100%", display:"block", borderRadius:"20px 20px 0 0" }} />
              <button onClick={()=>{ setSel(null); setDelTarget(null); setPwInput(""); setPwError(""); }}
                style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.5)", border:"none", color:"white", fontSize:18, width:36, height:36, borderRadius:"50%", cursor:"pointer" }}>✕</button>
              <div style={{ position:"absolute", top:12, left:12, background:"rgba(26,107,58,0.9)", color:"white", fontSize:12, fontWeight:800, padding:"3px 10px", borderRadius:20 }}>{sel.category}</div>
            </div>
            <div style={{ padding:"16px 20px" }}>

                <div>
                  <div style={{ fontSize:17, fontWeight:900 }}>{sel.store_name}</div>
                  {sel.author && <div style={{ fontSize:13, color:"#888", marginTop:2 }}>投稿者：{sel.author}</div>}
                </div>
                <div style={{ fontSize:12, color:"#bbb" }}>{formatDate(sel.created_at)}</div>

              {sel.comment && (
                <div style={{ fontSize:14, color:"#444", background:"#f7f7f9", borderRadius:10, padding:"10px 12px", lineHeight:1.7, whiteSpace:"pre-wrap", marginBottom:14 }}>
                  {sel.comment}
                </div>
              )}

              {/* 削除エリア */}
              {delTarget?.id === sel.id ? (
                <div style={{ background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"14px", marginBottom:12 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#d05050", marginBottom:8 }}>本当に削除しますか？</div>
                  <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>ヒント：本社の郵便番号</div>
                  <div style={{ display:"flex", gap:8 }}>
                    <input type="password" value={pwInput} onChange={e=>{ setPwInput(e.target.value); setPwError(""); }}
                      onKeyDown={e=>e.key==="Enter"&&handleDelete()} placeholder="パスワード" autoFocus
                      style={{ flex:1, padding:"9px 12px", border:`2px solid ${pwError?"#e05c00":"#ffd0d0"}`, borderRadius:8, fontSize:14, outline:"none" }} />
                    <button onClick={handleDelete} disabled={fDeleting} style={{ padding:"9px 14px", background: fDeleting ? "#dba0a0" : "#d05050", color:"white", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor: fDeleting ? "default" : "pointer" }}>{fDeleting ? "確認中…" : "削除"}</button>
                    <button onClick={()=>{ setDelTarget(null); setPwInput(""); setPwError(""); }}
                      style={{ padding:"9px 12px", background:"#eee", color:"#666", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer" }}>戻る</button>
                  </div>
                  {pwError && <div style={{ fontSize:12, color:"#e05c00", marginTop:6 }}>{pwError}</div>}
                </div>
              ) : (
                <button onClick={()=>setDelTarget(sel)}
                  style={{ width:"100%", background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", color:"#d05050" }}>
                  削除
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 発注バーコード Tab ──
function BarcodeTab() {
  const ACCENT = "#1f6feb";
  const [items, setItems] = useState([]);
  const [libsReady, setLibsReady] = useState(typeof XLSX !== "undefined" && typeof JsBarcode !== "undefined");
  useEffect(() => {
    let alive = true;
    Promise.all([loadScriptOnce(XLSX_SRC), loadScriptOnce(JSBARCODE_SRC)])
      .then(() => { if (alive) setLibsReady(true); })
      .catch(e => console.error(e));
    return () => { alive = false; };
  }, []);
  const [fileName, setFileName] = useState("");
  const [err, setErr] = useState("");
  const [selected, setSelected] = useState(() => new Set());
  const [search, setSearch] = useState("");
  const [cols, setCols] = useState(3);
  const [showName, setShowName] = useState(true);
  const [over, setOver] = useState(false);
  const fileRef = React.useRef(null);
  const previewRef = React.useRef(null);
  const [portalEl] = useState(() => {
    const el = document.createElement("div");
    el.id = "barcode-print-portal";
    return el;
  });

  useEffect(() => {
    document.body.appendChild(portalEl);
    return () => { try { document.body.removeChild(portalEl); } catch(e) {} };
  }, [portalEl]);

  const findCol = (header, cands) => {
    for (const c of cands) {
      const i = header.findIndex(x => String(x).replace(/\s/g,"") === c);
      if (i >= 0) return i;
    }
    for (const c of cands) {
      const key = c.slice(0,6);
      const i = header.findIndex(x => String(x).includes(key));
      if (i >= 0) return i;
    }
    return -1;
  };

  const handleFile = (file) => {
    if (!file) return;
    setErr("");
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        if (typeof XLSX === "undefined") throw new Error("ライブラリ読み込み中です。少し待って再試行してください");
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"", raw:false });
        if (!rows.length) throw new Error("空のファイルです");
        const header = rows[0];
        const iKubun = findCol(header, ["スキャニングコード区分1"]);
        const iScan  = findCol(header, ["スキャニングコード1"]);
        const iCode  = findCol(header, ["商品コード"]);
        const iName  = findCol(header, ["商品名(漢字_全角25文字)","商品名(漢字","商品名"]);
        if (iKubun < 0 || iScan < 0) throw new Error("スキャニングコード列が見つかりません");
        const out = [], seen = new Set();
        for (let r=1; r<rows.length; r++) {
          const row = rows[r]; if (!row) continue;
          if (String(row[iKubun]).trim() !== "4") continue;
          const bcode = String(row[iScan]).trim();
          if (!bcode || seen.has(bcode)) continue;
          seen.add(bcode);
          const pcode = iCode>=0 ? String(row[iCode]).trim() : "";
          let name = iName>=0 ? String(row[iName]||"") : "";
          name = name.replace(/\u3000/g," ").replace(/\s+/g," ").trim();
          out.push({ name, pcode, bcode });
        }
        if (!out.length) throw new Error("区分4（13桁）のデータが見つかりませんでした");
        setItems(out);
        setSelected(new Set());
        setFileName(file.name);
      } catch(ex) {
        setErr(ex.message);
        setItems([]); setFileName("");
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const toggle = (bcode) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(bcode)) next.delete(bcode); else next.add(bcode);
      return next;
    });
  };

  const q = search.trim().toLowerCase();
  const visible = items.filter(it =>
    !q || it.name.toLowerCase().includes(q) || it.pcode.includes(q) || it.bcode.includes(q)
  );
  const chosen = items.filter(it => selected.has(it.bcode));

  const selectAllVisible = () => {
    setSelected(prev => { const next = new Set(prev); visible.forEach(it => next.add(it.bcode)); return next; });
  };
  const clearSel = () => setSelected(new Set());

  // バーコード描画（画面プレビュー＋印刷ポータル）
  useEffect(() => {
    const draw = (root) => {
      if (!root || typeof JsBarcode === "undefined") return;
      root.querySelectorAll("svg[data-code]").forEach(svg => {
        try {
          JsBarcode(svg, svg.getAttribute("data-code"), {
            format:"CODE128", displayValue:false, margin:0,
            height:60, width: cols>=4 ? 1.4 : (cols===3 ? 1.7 : 2)
          });
        } catch(e) {}
      });
    };
    draw(previewRef.current);
    draw(portalEl);
  }, [selected, items, cols, showName, portalEl, libsReady]);

  const labelStyle = {
    border:"1px solid #cfd8de", borderRadius:6, padding:"5mm 4mm 4mm",
    textAlign:"center", breakInside:"avoid", display:"flex",
    flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#fff"
  };

  const renderGrid = () => (
    <div className="bc-grid" style={{ display:"grid", gridTemplateColumns:`repeat(${cols},1fr)`, gap:"6mm" }}>
      {chosen.map(it => (
        <div key={it.bcode} className="bc-label" style={labelStyle}>
          {showName && <div style={{ fontSize:"12pt", fontWeight:700, marginBottom:"2mm", lineHeight:1.3, color:"#000" }}>{it.name}</div>}
          <svg data-code={it.bcode} style={{ width:"100%", height:"auto", maxHeight:"24mm" }}></svg>
          <div style={{ fontSize:"9pt", color:"#333", marginTop:"1.5mm" }}>{it.bcode}</div>
        </div>
      ))}
    </div>
  );

  const seg = (active) => ({
    padding:"7px 14px", border:"none", fontSize:13, fontWeight:700, cursor:"pointer",
    background: active ? ACCENT : "#fff", color: active ? "#fff" : "#888"
  });

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:"20px 16px 60px" }}>

      {/* STEP 1 アップロード */}
      <div style={{ background:"white", borderRadius:16, padding:"20px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:900, color:"#111", marginBottom:14 }}>① 商品マスター（エクセル）を読み込む</div>
        <label
          onDragOver={e=>{e.preventDefault();setOver(true);}}
          onDragLeave={e=>{e.preventDefault();setOver(false);}}
          onDrop={e=>{e.preventDefault();setOver(false);handleFile(e.dataTransfer.files[0]);}}
          style={{ display:"block", border:`2px dashed ${over?ACCENT:"#e0e0e0"}`, borderRadius:12, padding:"26px 16px",
            textAlign:"center", cursor:"pointer", background: over?"#eef4ff":"#fafafa", transition:"all 0.15s" }}>
          <div style={{ fontWeight:700, color:"#444" }}>エクセルをドロップ、またはタップして選択</div>
          <div style={{ fontSize:12, color:"#aaa", marginTop:6 }}>.xlsx / .xls</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={e=>handleFile(e.target.files[0])} style={{ display:"none" }} />
        </label>
        {fileName && <div style={{ fontSize:13, color:ACCENT, fontWeight:700, marginTop:10 }}>✓ {fileName}（{items.length}商品）</div>}
        {err && <div style={{ fontSize:13, color:"#e05c00", fontWeight:700, marginTop:10 }}>{err}</div>}
      </div>

      {items.length > 0 && (
        <>
          {/* STEP 2 選択 */}
          <div style={{ background:"white", borderRadius:16, padding:"20px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:900, color:"#111", marginBottom:14 }}>② 発注したいトレーを選ぶ</div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center", marginBottom:14 }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="商品名・コードで絞り込み"
                style={{ flex:1, minWidth:200, padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }} />
              <button onClick={selectAllVisible} style={{ background:"#f5f5f5", border:"2px solid #eee", borderRadius:10, padding:"9px 14px", fontSize:13, fontWeight:700, cursor:"pointer", color:"#555" }}>表示中をすべて選択</button>
              <button onClick={clearSel} style={{ background:"#f5f5f5", border:"2px solid #eee", borderRadius:10, padding:"9px 14px", fontSize:13, fontWeight:700, cursor:"pointer", color:"#555" }}>選択解除</button>
              <span style={{ fontSize:13, fontWeight:700, color:"#888" }}>選択中 <b style={{ color:ACCENT, fontSize:16 }}>{selected.size}</b> 件</span>
            </div>
            <div style={{ border:"1px solid #eee", borderRadius:10, maxHeight:420, overflowY:"auto" }}>
              {visible.length === 0 ? (
                <div style={{ padding:40, textAlign:"center", color:"#bbb" }}>該当する商品がありません</div>
              ) : visible.map(it => {
                const on = selected.has(it.bcode);
                return (
                  <div key={it.bcode} onClick={()=>toggle(it.bcode)}
                    style={{ display:"grid", gridTemplateColumns:"30px 1fr 130px", alignItems:"center", gap:10,
                      padding:"9px 14px", borderBottom:"1px solid #f2f2f2", cursor:"pointer",
                      background: on ? "#eef4ff" : "transparent" }}>
                    <input type="checkbox" readOnly checked={on} style={{ width:18, height:18, accentColor:ACCENT, cursor:"pointer" }} />
                    <div style={{ fontWeight:600, fontSize:13.5, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{it.name || "（名称なし）"}</div>
                    <div style={{ fontSize:12, color:"#999", fontFamily:"monospace" }}>{it.bcode}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* STEP 3 印刷 */}
          <div style={{ background:"white", borderRadius:16, padding:"20px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:900, color:"#111", marginBottom:14 }}>③ レイアウトと印刷</div>
            <div style={{ display:"flex", gap:22, flexWrap:"wrap", alignItems:"center", marginBottom:16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:13, fontWeight:700, color:"#888" }}>1行の数</span>
                <div style={{ display:"inline-flex", border:"2px solid #eee", borderRadius:8, overflow:"hidden" }}>
                  {[2,3,4].map(c=>(
                    <button key={c} onClick={()=>setCols(c)} style={{ ...seg(cols===c), borderRight: c<4?"1px solid #eee":"none" }}>{c}列</button>
                  ))}
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:13, fontWeight:700, color:"#888" }}>商品名</span>
                <div style={{ display:"inline-flex", border:"2px solid #eee", borderRadius:8, overflow:"hidden" }}>
                  <button onClick={()=>setShowName(true)} style={{ ...seg(showName), borderRight:"1px solid #eee" }}>表示</button>
                  <button onClick={()=>setShowName(false)} style={seg(!showName)}>コードのみ</button>
                </div>
              </div>
              <button onClick={()=>window.print()} disabled={chosen.length===0}
                style={{ marginLeft:"auto", background: chosen.length? ACCENT : "#ccc", color:"white", border:"none", borderRadius:10,
                  padding:"12px 22px", fontSize:14, fontWeight:900, cursor: chosen.length?"pointer":"not-allowed" }}>
                A4横で印刷（{chosen.length}件）
              </button>
            </div>

            {/* 画面プレビュー */}
            <div style={{ fontSize:12, color:"#aaa", fontWeight:700, marginBottom:8 }}>プレビュー</div>
            <div ref={previewRef} style={{ background:"#f7f8fa", border:"1px solid #eee", borderRadius:10, padding:"16px", minHeight:80 }}>
              {chosen.length === 0
                ? <div style={{ textAlign:"center", color:"#bbb", padding:"24px 0" }}>商品を選ぶとここにプレビューが表示されます</div>
                : renderGrid()}
            </div>
          </div>
        </>
      )}

      {/* 印刷用ポータル（画面では非表示・印刷時のみ表示） */}
      {ReactDOM.createPortal(renderGrid(), portalEl)}
    </div>
  );
}

// ── 天気ウィジェット ──
function WeatherWidget() {
  const [daily, setDaily] = useState(null);
  useEffect(() => {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=35.367&longitude=132.755&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=2")
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d && d.daily) setDaily(d.daily); })
      .catch(() => {});
  }, []);
  if (!daily) return null;

  const wmo = (c) => {
    if (c === 0) return { e:"☀️", t:"快晴" };
    if (c === 1) return { e:"🌤", t:"晴れ" };
    if (c === 2) return { e:"⛅", t:"時々曇り" };
    if (c === 3) return { e:"☁️", t:"曇り" };
    if (c === 45 || c === 48) return { e:"🌫", t:"霧" };
    if (c >= 51 && c <= 57) return { e:"🌦", t:"霧雨" };
    if (c >= 61 && c <= 67) return { e:"🌧", t:"雨" };
    if (c >= 71 && c <= 77) return { e:"❄️", t:"雪" };
    if (c >= 80 && c <= 82) return { e:"🌦", t:"にわか雨" };
    if (c === 85 || c === 86) return { e:"🌨", t:"にわか雪" };
    if (c >= 95) return { e:"⛈", t:"雷雨" };
    return { e:"☁️", t:"曇り" };
  };

  const Day = ({ label, i }) => {
    const w = wmo(daily.weather_code[i]);
    const hi = Math.round(daily.temperature_2m_max[i]);
    const lo = Math.round(daily.temperature_2m_min[i]);
    return (
      <div style={{ display:"flex", alignItems:"center", gap:3, whiteSpace:"nowrap" }}>
        <span style={{ fontSize:10, color:"#aaa", fontWeight:700 }}>{label}</span>
        <span style={{ fontSize:13 }}>{w.e}</span>
        <span style={{ fontSize:11, fontWeight:700 }}>
          <span style={{ color:"#e05c00" }}>{hi}°</span>
          <span style={{ color:"#ccc" }}>/</span>
          <span style={{ color:"#4a86c5" }}>{lo}°</span>
        </span>
      </div>
    );
  };

  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, background:"#f7f8fa", border:"1px solid #eee", borderRadius:9, padding:"5px 9px", whiteSpace:"nowrap", flexShrink:0 }}>
      <Day label="今日" i={0} />
      <div style={{ width:1, height:14, background:"#e0e0e0" }} />
      <Day label="明日" i={1} />
    </div>
  );
}

function DevTab() {

        {ANNOUNCEMENTS.map((a,i)=>{

}
