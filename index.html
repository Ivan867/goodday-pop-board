<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoodDay ポップ共有ボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f5f5f7; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes liked { 0% { transform:scale(1); } 40% { transform:scale(1.4); } 100% { transform:scale(1); } }
.like-btn:active { animation: liked 0.3s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STORES = ["北部店","木次店","大田店","斐川店","医大通り店","平田店","バイヤー"];
const CATEGORIES = ["鮮魚","刺身","寿司","惣菜","広告","特売","行事","塩干","その他"];

const SB_URL = "https://pxstuticccflzqoqvfvx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4c3R1dGljY2NmbHpxb3F2ZnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODM0MzEsImV4cCI6MjA5MzQ1OTQzMX0.NQjAkqpa04d6Kx0DTYfaAgahtiHJ2iXbjVyspFc9cS0";

const h = (extra={}) => ({ "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, ...extra });

const api = {
  async list(store, cat) {
    let url = `${SB_URL}/rest/v1/pops?select=*&order=created_at.desc`;
    if (store) url += `&store_name=eq.${encodeURIComponent(store)}`;
    if (cat)   url += `&category=eq.${encodeURIComponent(cat)}`;
    const r = await fetch(url, { headers: h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async listAll() {
    const r = await fetch(`${SB_URL}/rest/v1/pops?select=*&order=created_at.desc`, { headers: h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async insert(data) {
    const r = await fetch(`${SB_URL}/rest/v1/pops`, {
      method: "POST",
      headers: h({ "Content-Type": "application/json", "Prefer": "return=representation" }),
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async del(id) {
    const r = await fetch(`${SB_URL}/rest/v1/pops?id=eq.${id}`, { method: "DELETE", headers: h() });
    if (!r.ok) throw new Error(await r.text());
  },
  async like(id, current) {
    const r = await fetch(`${SB_URL}/rest/v1/pops?id=eq.${id}`, {
      method: "PATCH",
      headers: h({ "Content-Type": "application/json", "Prefer": "return=representation" }),
      body: JSON.stringify({ likes: (current||0)+1 })
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async upload(file) {
    const blob = await new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement("canvas");
        const max = 1200;
        let w = img.width, wh = img.height;
        if (w > max) { wh = Math.round(wh*max/w); w = max; }
        c.width = w; c.height = wh;
        c.getContext("2d").drawImage(img, 0, 0, w, wh);
        c.toBlob(res, "image/jpeg", 0.85);
      };
      img.src = URL.createObjectURL(file);
    });
    const name = `${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
    const r = await fetch(`${SB_URL}/storage/v1/object/pop-images/${name}`, {
      method: "POST",
      headers: { ...h(), "Content-Type": "image/jpeg", "x-upsert": "true" },
      body: blob
    });
    if (!r.ok) throw new Error(await r.text());
    return `${SB_URL}/storage/v1/object/public/pop-images/${name}`;
  },
  async listPosts() {
    const r = await fetch(`${SB_URL}/rest/v1/blog_posts?select=*&order=created_at.desc`, { headers: h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async insertPost(data) {
    const r = await fetch(`${SB_URL}/rest/v1/blog_posts`, {
      method: "POST",
      headers: h({ "Content-Type": "application/json", "Prefer": "return=representation" }),
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async incrementViews(id, currentViews) {
    const r = await fetch(`${SB_URL}/rest/v1/blog_posts?id=eq.${id}`, {
      method: "PATCH",
      headers: h({ "Content-Type": "application/json", "Prefer": "return=representation" }),
      body: JSON.stringify({ views: (currentViews||0)+1 })
    });
    if (!r.ok) throw new Error(await r.text());
    return (await r.json())[0];
  },
  async delPost(id) {
    const r = await fetch(`${SB_URL}/rest/v1/blog_posts?id=eq.${id}`, { method: "DELETE", headers: h() });
    if (!r.ok) throw new Error(await r.text());
  }
};

function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return "たった今";
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
}

function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

// ── Upload Modal ──
function UploadModal({ currentStore, onClose, onSuccess }) {
  const [store, setStore] = useState(currentStore||STORES[0]);
  const [author, setAuthor] = useState("");
  const [product, setProduct] = useState("");
  const [comment, setComment] = useState("");
  const [category, setCategory] = useState(CATEGORIES[0]);
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const onFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
  };

  const submit = async () => {
    if (!product.trim()) { setError("商品名を入力してください"); return; }
    if (!author.trim())  { setError("名前を入力してください"); return; }
    if (!file)           { setError("画像を選択してください"); return; }
    setLoading(true); setError("");
    try {
      const image_url = await api.upload(file);
      const pop = await api.insert({ store_name: store, product_name: product.trim(), category, image_url, likes: 0, author: author.trim(), comment: comment.trim() });
      onSuccess(pop);
    } catch(e) { setError("エラー: " + e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 }}>
      <div style={{ background:"white", borderRadius:20, padding:28, width:"100%", maxWidth:400, animation:"fadeUp 0.2s ease" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div style={{ fontSize:18, fontWeight:900 }}>ポップをアップロード</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#999" }}>✕</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>店舗</div>
            <select value={store} onChange={e=>setStore(e.target.value)} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14 }}>
              {STORES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>お名前 <span style={{ color:"#e05c00" }}>*</span></div>
            <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="例：山田 太郎" style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }} />
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>商品名</div>
            <input value={product} onChange={e=>setProduct(e.target.value)} placeholder="例：本マグロ大トロ" style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, outline:"none" }} />
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>カテゴリ</div>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14 }}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>コメント <span style={{ fontWeight:400, color:"#bbb" }}>（任意）</span></div>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="例：脂がのっていておすすめ！刺身・塩焼きに。" rows={3} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, resize:"vertical", fontFamily:"inherit", outline:"none" }} />
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#666", marginBottom:6 }}>画像</div>
            <label style={{ display:"block", border:"2px dashed #e0e0e0", borderRadius:12, padding:"20px", textAlign:"center", cursor:"pointer", background: preview?"transparent":"#fafafa" }}>
              {preview ? <img src={preview} style={{ maxWidth:"100%", maxHeight:200, borderRadius:8 }} /> : <div style={{ color:"#aaa", fontSize:14 }}>📷 タップして選択</div>}
              <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
            </label>
          </div>
          {error && <div style={{ color:"#e05c00", fontSize:13, fontWeight:600 }}>{error}</div>}
          <button onClick={submit} disabled={loading} style={{ background:"#e05c00", color:"white", border:"none", borderRadius:12, padding:"13px", fontSize:15, fontWeight:900, cursor:"pointer", opacity:loading?0.6:1 }}>
            {loading ? "アップロード中..." : "アップロード"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Pop Detail Modal ──
function PopDetail({ pop, onClose, onDelete, onLiked }) {
  const [liked, setLiked] = useState(false);
  const [likes, setLikes] = useState(pop.likes||0);
  const [deleting, setDeleting] = useState(false);
  const [showDelConfirm, setShowDelConfirm] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState("");

  const CORRECT_PW = "6930021";

  const handleLike = async () => {
    if (liked) return;
    try {
      const updated = await api.like(pop.id, likes);
      setLikes(updated.likes);
      setLiked(true);
      onLiked && onLiked(pop.id, updated.likes);
    } catch(e) {}
  };

  const handleDownload = () => {
    const a = document.createElement("a");
    a.href = pop.image_url;
    a.download = `${pop.store_name}_${pop.product_name}.jpg`;
    a.target = "_blank";
    a.click();
  };

  const handleDeleteConfirm = async () => {
    if (pwInput !== CORRECT_PW) {
      setPwError("パスワードが違います");
      setPwInput("");
      return;
    }
    setDeleting(true);
    try {
      await api.del(pop.id);
      onDelete(pop.id);
      onClose();
    } catch(e) {
      alert("削除に失敗しました");
      setDeleting(false);
    }
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 }} onClick={onClose}>
      <div style={{ background:"white", borderRadius:20, width:"100%", maxWidth:480, maxHeight:"90vh", overflow:"hidden", animation:"fadeUp 0.2s ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ position:"relative" }}>
          <img src={pop.image_url} style={{ width:"100%", maxHeight:360, objectFit:"contain", background:"#f0f0f0", display:"block" }} />
          <button onClick={onClose} style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.5)", border:"none", color:"white", fontSize:18, width:36, height:36, borderRadius:"50%", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>
        <div style={{ padding:"16px 20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
            <div>
              <div style={{ fontSize:18, fontWeight:900 }}>{pop.product_name}</div>
              <div style={{ fontSize:13, color:"#888", marginTop:2 }}>{pop.store_name} · {pop.category}</div>
            </div>
            <div style={{ fontSize:12, color:"#bbb" }}>{formatDate(pop.created_at)}</div>
          </div>
          {pop.author && (
            <div style={{ fontSize:13, color:"#555", marginBottom: pop.comment ? 6 : 14 }}>
              <span style={{ fontWeight:700 }}>投稿者：</span>{pop.author}
            </div>
          )}
          {pop.comment && (
            <div style={{ fontSize:13, color:"#444", background:"#f7f7f9", borderRadius:10, padding:"10px 12px", marginBottom:14, lineHeight:1.7, whiteSpace:"pre-wrap" }}>
              💬 {pop.comment}
            </div>
          )}

          {/* パスワード確認エリア */}
          {showDelConfirm && (
            <div style={{ background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"14px", marginBottom:12, animation:"fadeUp 0.15s ease" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#d05050", marginBottom:10 }}>🗑 本当に削除しますか？</div>
              <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>ヒント：本社の郵便番号</div>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="password"
                  value={pwInput}
                  onChange={e=>{ setPwInput(e.target.value); setPwError(""); }}
                  onKeyDown={e=>e.key==="Enter" && handleDeleteConfirm()}
                  placeholder="パスワードを入力"
                  autoFocus
                  style={{ flex:1, padding:"9px 12px", border:`2px solid ${pwError?"#e05c00":"#ffd0d0"}`, borderRadius:8, fontSize:14, outline:"none" }}
                />
                <button onClick={handleDeleteConfirm} disabled={deleting}
                  style={{ padding:"9px 16px", background:"#d05050", color:"white", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer", opacity:deleting?0.6:1 }}>
                  {deleting ? "…" : "削除"}
                </button>
                <button onClick={()=>{ setShowDelConfirm(false); setPwInput(""); setPwError(""); }}
                  style={{ padding:"9px 12px", background:"#eee", color:"#666", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer" }}>
                  戻る
                </button>
              </div>
              {pwError && <div style={{ fontSize:12, color:"#e05c00", fontWeight:700, marginTop:8 }}>⚠️ {pwError}</div>}
            </div>
          )}

          <div style={{ display:"flex", gap:10, marginTop: showDelConfirm ? 0 : 14 }}>
            <button className="like-btn" onClick={handleLike} style={{ flex:1, background:liked?"#fff0f0":"#f5f5f5", border:liked?"2px solid #ff6b6b":"2px solid #eee", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:liked?"default":"pointer", color:liked?"#ff6b6b":"#666" }}>
              ❤️ {likes}
            </button>
            <button onClick={handleDownload} style={{ flex:1, background:"#f0f4ff", border:"2px solid #c7d7ff", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", color:"#4060d0" }}>
              ⬇️ 保存
            </button>
            <button onClick={()=>{ setShowDelConfirm(true); setPwInput(""); setPwError(""); }}
              disabled={showDelConfirm}
              style={{ flex:1, background:"#fff5f5", border:"2px solid #ffd0d0", borderRadius:12, padding:"10px", fontSize:14, fontWeight:700, cursor:"pointer", color:"#d05050", opacity:showDelConfirm?0.4:1 }}>
              🗑 削除
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Pop Card (shared) ──
function PopCard({ pop, index, onClick }) {
  return (
    <div
      style={{ breakInside:"avoid", marginBottom:14, borderRadius:14, overflow:"hidden", background:"white", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", cursor:"pointer", animation:`fadeUp 0.3s ease ${Math.min(index,10)*0.04}s both`, transition:"all 0.15s" }}
      onClick={()=>onClick(pop)}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 28px rgba(0,0,0,0.14)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
      <div style={{ background:"#efefef", minHeight:120, position:"relative" }}>
        {pop.image_url
          ? <img src={pop.image_url} style={{ width:"100%", display:"block" }} />
          : <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:120, color:"#ccc", fontSize:30 }}>🐟</div>}
        {pop.likes>0 && <div style={{ position:"absolute", top:6, right:6, background:"rgba(255,107,107,0.9)", color:"white", fontSize:11, fontWeight:900, padding:"2px 7px", borderRadius:20 }}>❤️{pop.likes}</div>}
      </div>
      <div style={{ padding:"10px 12px" }}>
        <div style={{ fontWeight:800, fontSize:13, marginBottom:4 }}>{pop.product_name}</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontSize:11, color:"#888" }}>{pop.store_name}</div>
          <div style={{ fontSize:11, background:"#f0f0f0", padding:"2px 8px", borderRadius:20, fontWeight:700, color:"#666" }}>{pop.category}</div>
        </div>
      </div>
    </div>
  );
}

// ── Board Tab ──
function BoardTab({ currentStore }) {
  const [pops, setPops] = useState([]);
  const [loading, setLoading] = useState(true);
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [showUp, setShowUp] = useState(false);
  const [sel, setSel] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try { const data = await api.list(fStore, fCat); setPops(data); }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  }, [fStore, fCat]);

  useEffect(() => { load(); }, [load]);

  const counts = pops.reduce((a,p) => { a[p.store_name]=(a[p.store_name]||0)+1; return a; }, {});
  const filtered = pops.filter(p => (!fStore||p.store_name===fStore) && (!fCat||p.category===fCat));

  return (
    <>
      <div style={{ maxWidth:1080, margin:"0 auto", padding:"16px 16px 0" }}>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginBottom:14 }}>
          <button onClick={()=>setShowUp(true)} style={{ background:"#e05c00", color:"white", border:"none", borderRadius:10, padding:"9px 18px", fontSize:13, fontWeight:900, cursor:"pointer" }}>＋ アップロード</button>
          <button onClick={load} style={{ background:"#f5f5f5", color:"#666", border:"none", borderRadius:10, padding:"9px 12px", fontSize:15, cursor:"pointer" }}>↺</button>
        </div>
        <div style={{ display:"flex", gap:10, marginBottom:14, overflowX:"auto", paddingBottom:4 }}>
          {[{lbl:"全店舗",cnt:pops.length,val:""},...STORES.map(s=>({lbl:s,cnt:counts[s]||0,val:s}))].map(({lbl,cnt,val})=>(
            <div key={lbl} onClick={()=>setFStore(val)}
              style={{ background:fStore===val?"#e05c00":"white", borderRadius:12, padding:"10px 16px", minWidth:70, textAlign:"center", cursor:"pointer", border:"2px solid", borderColor:fStore===val?"#e05c00":"#e8e8e8", flexShrink:0 }}>
              <div style={{ fontSize:20, fontWeight:900, color:fStore===val?"white":"#111" }}>{cnt}</div>
              <div style={{ fontSize:10, fontWeight:700, color:fStore===val?"rgba(255,255,255,0.8)":"#aaa", whiteSpace:"nowrap" }}>{lbl}</div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
          {["",...CATEGORIES].map(c=>(
            <button key={c||"all"} onClick={()=>setFCat(c)}
              style={{ padding:"6px 14px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, borderColor:fCat===c?"#111":"#ddd", background:fCat===c?"#111":"white", color:fCat===c?"white":"#666" }}>
              {c||"すべて"}
            </button>
          ))}
        </div>
      </div>
      <div style={{ maxWidth:1080, margin:"0 auto", padding:"0 16px 20px" }}>
        {loading ? (
          <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>🐠</div>
            <div style={{ fontWeight:600, animation:"pulse 1.5s infinite" }}>読み込み中...</div>
          </div>
        ) : filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:80, color:"#bbb" }}>
            <div style={{ fontSize:56, marginBottom:16 }}>📌</div>
            <div style={{ fontWeight:800, fontSize:16, color:"#888" }}>ポップがまだありません</div>
            <div style={{ fontSize:13 }}>アップロードボタンから最初のポップを共有しましょう！</div>
          </div>
        ) : (
          <div style={{ columns:"200px 4", gap:14 }}>
            {filtered.map((pop,i)=><PopCard key={pop.id} pop={pop} index={i} onClick={setSel} />)}
          </div>
        )}
      </div>
      {showUp && <UploadModal currentStore={currentStore} onClose={()=>setShowUp(false)} onSuccess={pop=>{setPops(p=>[pop,...p]);setShowUp(false);}} />}
      {sel && <PopDetail pop={sel} onClose={()=>setSel(null)}
        onDelete={id=>setPops(p=>p.filter(x=>x.id!==id))}
        onLiked={(id,likes)=>setPops(p=>p.map(x=>x.id===id?{...x,likes}:x))}
      />}
    </>
  );
}

function SearchTab() {
  const [allPops, setAllPops] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState("");
  const [fStore, setFStore] = useState("");
  const [fCat, setFCat] = useState("");
  const [sel, setSel] = useState(null);

  // 初回は検索バーにフォーカスが当たった段階 or 文字入力時にロード
  const ensureLoaded = async () => {
    if (loaded || loading) return;
    setLoading(true);
    try { const data = await api.listAll(); setAllPops(data); setLoaded(true); }
    catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  const q = search.trim().toLowerCase();
  const results = !loaded ? [] : allPops.filter(p => {
    const matchStore  = !fStore || p.store_name === fStore;
    const matchCat    = !fCat   || p.category === fCat;
    const matchSearch = !q ||
      (p.product_name||"").toLowerCase().includes(q) ||
      (p.store_name||"").toLowerCase().includes(q) ||
      (p.category||"").toLowerCase().includes(q);
    return matchStore && matchCat && matchSearch;
  });

  const hasFilter = q || fStore || fCat;

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:"24px 16px 40px" }}>

      {/* 検索ボックス */}
      <div style={{ background:"white", borderRadius:18, padding:"20px 20px 18px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)", marginBottom:20 }}>
        <div style={{ fontSize:15, fontWeight:900, color:"#111", marginBottom:14 }}>🔍 ポップを検索</div>
        <div style={{ position:"relative", marginBottom:14 }}>
          <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:18, color:"#ccc", pointerEvents:"none" }}>🔍</span>
          <input
            type="text"
            value={search}
            onChange={e=>{ setSearch(e.target.value); ensureLoaded(); }}
            onFocus={ensureLoaded}
            placeholder="商品名・店舗名・カテゴリで検索..."
            style={{ width:"100%", padding:"13px 42px 13px 46px", border:"2px solid #e8e8e8", borderRadius:12, fontSize:15, outline:"none", transition:"border-color 0.15s", background:"#fafafa" }}
            onFocus2={e=>e.target.style.borderColor="#e05c00"}
            onBlur={e=>e.target.style.borderColor="#e8e8e8"}
          />
          {search && (
            <button onClick={()=>setSearch("")}
              style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"#ddd", border:"none", borderRadius:"50%", width:24, height:24, cursor:"pointer", fontSize:13, color:"#666", display:"flex", alignItems:"center", justifyContent:"center" }}>
              ✕
            </button>
          )}
        </div>

        {/* 店舗フィルター */}
        <div style={{ display:"flex", gap:8, marginBottom:10, overflowX:"auto", paddingBottom:2 }}>
          {[{lbl:"全店舗",val:""},...STORES.map(s=>({lbl:s,val:s}))].map(({lbl,val})=>(
            <button key={lbl} onClick={()=>{ setFStore(val); ensureLoaded(); }}
              style={{ padding:"5px 13px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, flexShrink:0, borderColor:fStore===val?"#e05c00":"#ddd", background:fStore===val?"#e05c00":"white", color:fStore===val?"white":"#666", whiteSpace:"nowrap" }}>
              {lbl}
            </button>
          ))}
        </div>

        {/* カテゴリフィルター */}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {["",...CATEGORIES].map(c=>(
            <button key={c||"all"} onClick={()=>{ setFCat(c); ensureLoaded(); }}
              style={{ padding:"5px 13px", borderRadius:20, fontSize:12, border:"2px solid", cursor:"pointer", fontWeight:700, borderColor:fCat===c?"#111":"#ddd", background:fCat===c?"#111":"white", color:fCat===c?"white":"#666" }}>
              {c||"すべて"}
            </button>
          ))}
        </div>
      </div>

      {/* 結果エリア */}
      {loading ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}>
          <div style={{ fontSize:36, marginBottom:10 }}>🐠</div>
          <div style={{ animation:"pulse 1.5s infinite" }}>読み込み中...</div>
        </div>
      ) : !hasFilter ? (
        <div style={{ textAlign:"center", padding:60, color:"#ccc" }}>
          <div style={{ fontSize:50, marginBottom:12 }}>🔍</div>
          <div style={{ fontSize:15, fontWeight:700, color:"#aaa" }}>キーワードや店舗・カテゴリを選んで検索</div>
        </div>
      ) : results.length === 0 ? (
        <div style={{ textAlign:"center", padding:60, color:"#bbb" }}>
          <div style={{ fontSize:50, marginBottom:12 }}>😔</div>
          <div style={{ fontSize:15, fontWeight:700, color:"#aaa" }}>一致するポップが見つかりません</div>
          <div style={{ fontSize:13, marginTop:6 }}>別のキーワードで試してみてください</div>
        </div>
      ) : (
        <>
          <div style={{ fontSize:13, color:"#888", fontWeight:700, marginBottom:12 }}>
            {q && <span>「<span style={{ color:"#e05c00" }}>{search}</span>」</span>}
            {(fStore||fCat) && <span style={{ marginLeft: q?4:0 }}>{[fStore,fCat].filter(Boolean).join(" · ")} </span>}
            の検索結果：<span style={{ color:"#111" }}>{results.length}件</span>
          </div>
          <div style={{ columns:"200px 4", gap:14 }}>
            {results.map((pop,i)=><PopCard key={pop.id} pop={pop} index={i} onClick={setSel} />)}
          </div>
        </>
      )}

      {sel && <PopDetail pop={sel} onClose={()=>setSel(null)}
        onDelete={id=>{ setAllPops(p=>p.filter(x=>x.id!==id)); setSel(null); }}
        onLiked={(id,likes)=>setAllPops(p=>p.map(x=>x.id===id?{...x,likes}:x))}
      />}
    </div>
  );
}

// ── Blog Tab (売り場ノート) ──
function NewPostForm({ onPost, onCancel }) {
  const [text, setText] = useState("");
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const onFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    setPreview(URL.createObjectURL(f));
  };

  const submit = async () => {
    if (!text.trim() && !file) { setError("テキストまたは画像を入力してください"); return; }
    setLoading(true); setError("");
    try {
      let image_url = null;
      if (file) image_url = await api.upload(file);
      const post = await api.insertPost({ text: text.trim(), image_url });
      onPost(post);
    } catch(e) { setError("エラー: "+e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:20, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
      <div style={{ fontWeight:900, fontSize:15, marginBottom:14, color:"#2d6a4f" }}>📝 新しい投稿</div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="売り場の様子、発見、コツなど..." rows={4} style={{ width:"100%", padding:"10px 12px", border:"2px solid #eee", borderRadius:10, fontSize:14, resize:"vertical", fontFamily:"inherit", outline:"none", marginBottom:10 }} />
      <label style={{ display:"block", border:"2px dashed #e0e0e0", borderRadius:10, padding:12, textAlign:"center", cursor:"pointer", marginBottom:10, background:preview?"transparent":"#fafafa" }}>
        {preview ? <img src={preview} style={{ maxWidth:"100%", maxHeight:160, borderRadius:6 }} /> : <div style={{ color:"#bbb", fontSize:13 }}>📷 写真を追加（任意）</div>}
        <input type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />
      </label>
      {error && <div style={{ color:"#e05c00", fontSize:13, marginBottom:8 }}>{error}</div>}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={onCancel} style={{ flex:1, background:"#f5f5f5", color:"#666", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:700, cursor:"pointer" }}>キャンセル</button>
        <button onClick={submit} disabled={loading} style={{ flex:2, background:"#2d6a4f", color:"white", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:900, cursor:"pointer", opacity:loading?0.6:1 }}>
          {loading ? "投稿中..." : "投稿する"}
        </button>
      </div>
    </div>
  );
}

function PostCard({ post, onOpen }) {
  return (
    <div onClick={()=>onOpen(post)} style={{ background:"white", borderRadius:14, overflow:"hidden", cursor:"pointer", boxShadow:"0 2px 10px rgba(0,0,0,0.07)", transition:"all 0.15s" }}
      onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.12)"}}
      onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,0.07)"}}>
      {post.image_url && <img src={post.image_url} style={{ width:"100%", height:200, objectFit:"cover", display:"block" }} />}
      <div style={{ padding:"14px 16px" }}>
        {post.text && <div style={{ fontSize:14, color:"#333", lineHeight:1.6, marginBottom:8, display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden" }}>{post.text}</div>}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontSize:11, color:"#bbb" }}>{timeAgo(post.created_at)}</div>
          {post.views>0 && <div style={{ fontSize:11, color:"#bbb" }}>👁 {post.views}</div>}
        </div>
      </div>
    </div>
  );
}

function PostModal({ post, onClose, onViewed }) {
  useEffect(() => { onViewed && onViewed(post.id, post.views); }, []);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 }} onClick={onClose}>
      <div style={{ background:"white", borderRadius:20, width:"100%", maxWidth:520, maxHeight:"90vh", overflow:"auto", animation:"fadeUp 0.2s ease" }} onClick={e=>e.stopPropagation()}>
        <div style={{ position:"relative" }}>
          <button onClick={onClose} style={{ position:"absolute", top:12, right:12, background:"rgba(0,0,0,0.5)", border:"none", color:"white", fontSize:16, width:32, height:32, borderRadius:"50%", cursor:"pointer", zIndex:1 }}>✕</button>
          {post.image_url && <img src={post.image_url} style={{ width:"100%", display:"block", borderRadius:"20px 20px 0 0" }} />}
        </div>
        <div style={{ padding:20 }}>
          <div style={{ fontSize:15, color:"#333", lineHeight:1.8, marginBottom:14, whiteSpace:"pre-wrap" }}>{post.text}</div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#bbb" }}>
            <span>{formatDate(post.created_at)}</span>
            <span>👁 {(post.views||0)+1} 閲覧</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function BlogTab() {
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [openPost, setOpenPost] = useState(null);

  const load = async () => {
    setLoading(true);
    try { const data = await api.listPosts(); setPosts(data); }
    catch(e) {} finally { setLoading(false); }
  };
  useEffect(() => { load(); }, []);

  const handlePost = post => { setPosts(p=>[post,...p]); setShowForm(false); };
  const handleView = async (id, currentViews) => {
    try { const updated = await api.incrementViews(id, currentViews); setPosts(p=>p.map(x=>x.id===id?updated:x)); } catch(e) {}
  };

  return (
    <div>
      <div style={{ background:"linear-gradient(135deg,#2d6a4f 0%,#40916c 100%)", padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ color:"rgba(255,255,255,0.8)", fontSize:13 }}>鮮魚売り場の情報共有スペース</div>
        <button onClick={()=>setShowForm(f=>!f)} style={{ background:showForm?"#2d5a3d":"#52b788", color:"white", border:"none", borderRadius:10, padding:"9px 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
          {showForm?"✕ 閉じる":"＋ 投稿"}
        </button>
      </div>
      <div style={{ maxWidth:560, margin:"0 auto", padding:"20px 16px" }}>
        {showForm && <NewPostForm onPost={handlePost} onCancel={()=>setShowForm(false)} />}
        {loading ? (
          <div style={{ textAlign:"center", padding:60, color:"#bbb" }}>
            <div style={{ fontSize:36 }}>🐟</div>
            <div style={{ marginTop:8, animation:"pulse 1.5s infinite" }}>読み込み中...</div>
          </div>
        ) : posts.length===0 ? (
          <div style={{ textAlign:"center", padding:80 }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🐟</div>
            <div style={{ fontSize:15, color:"#aaa" }}>まだ投稿がありません</div>
          </div>
        ) : (
          <div style={{ display:"grid", gap:14 }}>
            {posts.map(post=><PostCard key={post.id} post={post} onOpen={p=>setOpenPost(p)} />)}
          </div>
        )}
      </div>
      {openPost && <PostModal post={openPost} onClose={()=>setOpenPost(null)} onViewed={handleView} />}
    </div>
  );
}

            </button>
            {showSample[tpl.id] && (
              <div style={{ background:tpl.lightColor, border:`2px solid ${tpl.color+"60"}`, borderTop:"none", borderRadius:"0 0 10px 10px", padding:"14px 16px", marginBottom:16 }}>
                <div style={{ fontSize:11, fontWeight:800, color:tpl.color, marginBottom:8 }}>✏️ 記入例</div>
                <pre style={{ fontSize:14, color:"#444", whiteSpace:"pre-wrap", lineHeight:1.9, fontFamily:"inherit", margin:0 }}>{tpl.sample}</pre>
              </div>
            )}
            <button onClick={()=>copyTemplate(tpl.id, tpl.template)}
              style={{ width:"100%", background: copied===tpl.id ? "#16a34a" : tpl.color, color:"white", border:"none", borderRadius:14, padding:"15px", fontSize:16, fontWeight:900, cursor:"pointer", transition:"all 0.25s", boxShadow: copied===tpl.id ? "0 4px 16px rgba(22,163,74,0.35)" : `0 4px 16px ${tpl.color}44`, transform: copied===tpl.id ? "scale(0.98)" : "scale(1)" }}>
              {copied===tpl.id ? "✅ コピーしました！AIに貼り付けてください" : "📋 テンプレートをコピー"}
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Pop Generator Tab ──
function PopGeneratorTab() {
  const [mode, setMode] = useState("new");
  const [size, setSize] = useState("縦");
  const [fields, setFields] = useState({ product:"", usage:"", price:"", appeal:"", mood:"", refProduct:"", refNoShow:"" });
  const [prompt, setPrompt] = useState("");
  const [copied, setCopied] = useState(false);

  const setF = (k, v) => setFields(f => ({...f, [k]: v}));

  const SIZES = [
    { key:"縦", label:"縦A4（210×297mm）" },
    { key:"横", label:"横A4（297×210mm）" },
  ];
  const sizeLabel = SIZES.find(s=>s.key===size).label;

  const generate = () => {
    if (mode === "new") {
      setPrompt(
        `あなたはスーパーの鮮魚売り場専門のデザイナーです。\n` +
        `【商品】${fields.product}\n` +
        `【用途】${fields.usage}\n` +
        `【価格】${fields.price || "表記なし"}\n` +
        `【一言アピール】${fields.appeal}\n` +
        `【サイズ】${sizeLabel}\n` +
        `【雰囲気】${fields.mood}\n` +
        `このPOPの画像を作ってください。`
      );
    } else if (mode === "bg") {
      if (size === "縦") {
        setPrompt(`背景の売り場は必要ないんだ。サイズ縦A4（210×297mm）でポップ部分のみで作成して`);
      } else {
        setPrompt(`背景の売り場は必要なし、サイズは横A4（297×210mm）でポップ部分のみで作成して`);
      }
    } else {
      const p = fields.refProduct || "　";
      const n = fields.refNoShow || p;
      setPrompt(
        `この画像をレイアウト、配色のみを参考に、「${p}」のポップをサイズ${sizeLabel}で作成してください\n※「${n}」の表記はしないでください`
      );
    }
  };

  const copy = () => {
    if (!prompt) return;
    navigator.clipboard.writeText(prompt).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = prompt;
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    });
    setCopied(true);
    setTimeout(() => { setCopied(false); setPrompt(""); }, 2000);
  };

  const inputStyle = { width:"100%", padding:"11px 13px", borderRadius:8, border:"1px solid #3a3a3a", background:"#2a2a2a", color:"white", fontSize:14, outline:"none", fontFamily:"inherit" };
  const labelStyle = { fontSize:12, color:"#999", marginBottom:5 };

  const MODES = [
    { key:"new", label:"① 新規POP作成" },
    { key:"bg",  label:"② 背景修正" },
    { key:"ref", label:"③ 参考画像あり" },
  ];

  return (
    <div style={{ maxWidth:680, margin:"0 auto", padding:"20px 16px 60px" }}>
      <div style={{ background:"#111", borderRadius:16, padding:"24px 22px", color:"white" }}>

        <div style={{ fontSize:16, fontWeight:900, marginBottom:22, color:"#eee" }}>
          🐟 鮮魚売り場 POPジェネレーター
        </div>

        {/* モード選択 */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>モード選択</div>
        <div style={{ display:"flex", gap:8, marginBottom:22 }}>
          {MODES.map(m=>(
            <button key={m.key} onClick={()=>{ setMode(m.key); setPrompt(""); }}
              style={{ flex:1, padding:"12px 6px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: mode===m.key ? "#8B6914" : "#2a2a2a",
                color: mode===m.key ? "white" : "#aaa", transition:"all 0.15s" }}>
              {m.label}
            </button>
          ))}
        </div>

        {/* サイズ選択 */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>サイズ</div>
        <div style={{ display:"flex", gap:8, marginBottom:22 }}>
          {SIZES.map(s=>(
            <button key={s.key} onClick={()=>setSize(s.key)}
              style={{ flex:1, padding:"12px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:700,
                border:`2px solid ${size===s.key ? "#8B6914" : "#3a3a3a"}`,
                background:"#1e1e1e", color: size===s.key ? "white" : "#777", transition:"all 0.15s" }}>
              {s.label}
            </button>
          ))}
        </div>

        {/* モード①：新規POP作成 */}
        {mode === "new" && (
          <>
            <div style={{ fontSize:12, color:"#888", marginBottom:12 }}>入力</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <div style={labelStyle}>商品</div>
                <input value={fields.product} onChange={e=>setF("product",e.target.value)} placeholder="例：天然マダイ（1尾）" style={inputStyle} />
              </div>
              <div>
                <div style={labelStyle}>用途</div>
                <input value={fields.usage} onChange={e=>setF("usage",e.target.value)} placeholder="例：お刺身・塩焼き" style={inputStyle} />
              </div>
              <div>
                <div style={labelStyle}>価格</div>
                <input value={fields.price} onChange={e=>setF("price",e.target.value)} placeholder="例：980円（税込）" style={inputStyle} />
              </div>
              <div>
                <div style={labelStyle}>一言アピール</div>
                <input value={fields.appeal} onChange={e=>setF("appeal",e.target.value)} placeholder="例：産地直送！鮮度抜群" style={inputStyle} />
              </div>
            </div>
            <div style={{ marginBottom:4 }}>
              <div style={labelStyle}>雰囲気</div>
              <input value={fields.mood} onChange={e=>setF("mood",e.target.value)} placeholder="例：夏らしい涼しげなデザイン、和風テイスト" style={inputStyle} />
            </div>
          </>
        )}

        {/* モード②：背景修正 */}
        {mode === "bg" && (
          <div style={{ background:"#1e1e1e", border:"1px solid #3a3a3a", borderRadius:8, padding:"13px 15px", fontSize:13, color:"#aaa", lineHeight:1.8, marginBottom:4 }}>
            💡 Geminiで修正したいPOP画像を貼り付けてから、下のプロンプトをコピーして送信してください。
          </div>
        )}

        {/* モード③：参考画像あり */}
        {mode === "ref" && (
          <>
            <div style={{ background:"#1a2a1a", border:"1px solid #2d4a2d", borderRadius:8, padding:"11px 13px", fontSize:12, color:"#7ec87e", lineHeight:1.75, marginBottom:14 }}>
              💡 Geminiに参考にしたいPOP画像を先にアップロードしてから、生成したプロンプトを貼り付けてください。
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:4 }}>
              <div>
                <div style={labelStyle}>ポップの内容（商品名など）</div>
                <input value={fields.refProduct} onChange={e=>setF("refProduct",e.target.value)} placeholder="例：天然マダイ お刺身用" style={inputStyle} />
              </div>
              <div>
                <div style={labelStyle}>表記しない内容 <span style={{ color:"#555" }}>（空欄の場合は上と同じ）</span></div>
                <input value={fields.refNoShow} onChange={e=>setF("refNoShow",e.target.value)} placeholder="例：天然マダイ" style={inputStyle} />
              </div>
            </div>
          </>
        )}

        {/* 区切り */}
        <div style={{ borderTop:"1px solid #2a2a2a", margin:"18px 0 14px" }} />

        {/* 生成されたプロンプト */}
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>生成されたプロンプト</div>
        <textarea
          value={prompt}
          readOnly
          placeholder="← 上の項目を入力して「プロンプト生成」を押してください"
          rows={5}
          style={{ width:"100%", padding:"12px 13px", borderRadius:8, border:"1px solid #2a2a2a", background:"#1a1a1a",
            color: prompt ? "#eee" : "#555", fontSize:13, resize:"vertical", fontFamily:"inherit", outline:"none", lineHeight:1.75, marginBottom:12 }}
        />

        {/* ボタン */}
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={generate}
            style={{ flex:3, padding:"14px", borderRadius:8, border:"1px solid #3a3a3a", background:"#222",
              color:"#ddd", fontSize:14, fontWeight:700, cursor:"pointer" }}
            onMouseEnter={e=>e.currentTarget.style.background="#2e2e2e"}
            onMouseLeave={e=>e.currentTarget.style.background="#222"}>
            プロンプト生成
          </button>
          <button onClick={copy} disabled={!prompt}
            style={{ flex:1, padding:"14px", borderRadius:8, border:"none",
              background: copied ? "#16a34a" : (prompt ? "#8B6914" : "#333"),
              color:"white", fontSize:14, fontWeight:700,
              cursor: prompt ? "pointer" : "default",
              opacity: !prompt ? 0.4 : 1, transition:"all 0.2s" }}>
            {copied ? "✅" : "コピー"}
          </button>
        </div>

      </div>
    </div>
  );
}

// ── Main App ──
function App() {
  const [tab, setTab] = useState("board");
  const [currentStore, setCurrentStore] = useState(STORES[0]);

  const tabs = [
    { key:"board",  label:"📌 ポップ一覧",       color:"#e05c00" },
    { key:"gen",    label:"🎨 ポップジェネレーター", color:"#8B6914" },
    { key:"ai",     label:"✏️ ポップ作成",         color:"#0077b6" },
    { key:"search", label:"🔍 検索",               color:"#059669" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#f5f5f7" }}>
      <div style={{ background:"white", boxShadow:"0 2px 12px rgba(0,0,0,0.08)", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:1080, margin:"0 auto", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ background:"linear-gradient(135deg,#e05c00,#ff8c42)", width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🐟</div>
            <div>
              <div style={{ fontSize:15, fontWeight:900, color:"#111" }}>GoodDay ポップ共有</div>
              <div style={{ fontSize:10, color:"#aaa" }}>鮮魚売り場</div>
            </div>
          </div>
          <select value={currentStore} onChange={e=>setCurrentStore(e.target.value)}
            style={{ padding:"8px 12px", border:"2px solid #e05c00", borderRadius:10, fontSize:13, fontWeight:700, color:"#e05c00", background:"#fff9f5", cursor:"pointer", outline:"none" }}>
            {STORES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{ maxWidth:1080, margin:"0 auto", padding:"0 16px", display:"flex", overflowX:"auto" }}>
          {tabs.map(({key,label,color})=>(
            <button key={key} onClick={()=>setTab(key)}
              style={{ padding:"10px 16px", fontSize:13, fontWeight:800, border:"none", background:"transparent", cursor:"pointer", borderBottom:`3px solid ${tab===key?color:"transparent"}`, color:tab===key?color:"#aaa", transition:"all 0.15s", whiteSpace:"nowrap", flexShrink:0 }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {tab==="board"  && <BoardTab currentStore={currentStore} />}
      {tab==="gen"    && <PopGeneratorTab />}
      {tab==="ai"     && <AiPopTab />}
      {tab==="search" && <SearchTab />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
